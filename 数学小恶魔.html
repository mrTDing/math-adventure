<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#764ba2">
    <title>数学小恶魔探险记</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
        }
        canvas { display: block; background: #87CEEB; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #questionPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #questionText { font-size: 32px; color: #333; margin-bottom: 20px; }
        .answerBtn {
            display: inline-block;
            width: 80px;
            height: 60px;
            margin: 10px;
            font-size: 24px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(145deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .answerBtn:hover { transform: scale(1.1); }
        #startScreen, #gameOverScreen, #winScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        #gameOverScreen, #winScreen { display: none; }
        h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            background: linear-gradient(145deg, #fa709a 0%, #fee140 100%);
            color: white;
            transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        #instructions { margin-top: 20px; text-align: center; line-height: 1.8; font-size: 16px; }
        #feedback {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            display: none;
            animation: pop 0.5s ease-out;
        }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .correct { color: #4ade80; text-shadow: 0 0 20px #4ade80; }
        .wrong { color: #f87171; text-shadow: 0 0 20px #f87171; }

        /* 移动端触控按钮 */
        #touchControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
        }
        .touchBtn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            backdrop-filter: blur(5px);
        }
        .touchBtn:active { background: rgba(255,255,255,0.5); transform: scale(0.95); }
        .touchLeftRight { display: flex; gap: 15px; }
        #touchJump { background: rgba(236, 72, 153, 0.4); border-color: rgba(236, 72, 153, 0.7); }
        #touchJump:active { background: rgba(236, 72, 153, 0.6); }

        @media (max-width: 768px) {
            body { padding: 0; background: #87CEEB; }
            #gameContainer { border-radius: 0; width: 100vw; height: 100vh; box-shadow: none; }
            canvas { width: 100vw; height: 100vh; }
            h1 { font-size: 32px; }
            .btn { padding: 12px 30px; font-size: 20px; }
            #questionPanel { width: 90%; padding: 20px; }
            #questionText { font-size: 24px; }
            .answerBtn { width: 70px; height: 50px; font-size: 20px; margin: 5px; }
            #instructions { font-size: 14px; padding: 0 20px; }
            #feedback { font-size: 32px; }
            #ui { font-size: 14px; top: 5px; left: 5px; }
            #touchControls { display: flex; }
        }

        #rotateHint {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }
        @media (max-width: 600px) and (orientation: portrait) {
            #rotateHint { display: flex; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div id="ui">
            <div>⭐ 得分: <span id="score">0</span></div>
            <div>🍬 糖果: <span id="candies">0</span></div>
            <div>📖 关卡: <span id="level">1</span></div>
        </div>
        <div id="questionPanel">
            <div id="questionText"></div>
            <div id="answers"></div>
        </div>
        <div id="feedback"></div>
        <div id="startScreen">
            <h1>🎮 数学小恶魔探险记</h1>
            <p style="font-size: 20px; margin-bottom: 30px;">帮助小角仔学习数学，闯关冒险！</p>
            <button class="btn" onclick="game.start()">开始游戏</button>
            <div id="instructions">
                <p>⬅️ ➡️ 左右移动 | 空格键 跳跃（可二段跳）</p>
                <p>碰到问号方块答题，收集糖果，到达旗帜过关！</p>
                <p style="color: #FCD34D; margin-top: 10px;">📱 手机上使用屏幕下方按钮控制</p>
            </div>
        </div>
        <div id="gameOverScreen">
            <h1>😢 游戏结束</h1>
            <p style="font-size: 24px; margin: 20px;">最终得分: <span id="finalScore">0</span></p>
            <button class="btn" onclick="game.restart()">重新挑战</button>
        </div>
        <div id="winScreen">
            <h1>🎉 恭喜通关！</h1>
            <p style="font-size: 24px; margin: 20px;">你真是个数学小天才！</p>
            <p style="font-size: 20px; margin: 10px;">最终得分: <span id="winScore">0</span></p>
            <button class="btn" onclick="game.restart()">再玩一次</button>
        </div>
        <div id="touchControls">
            <div class="touchLeftRight">
                <div class="touchBtn" id="touchLeft">⬅️</div>
                <div class="touchBtn" id="touchRight">➡️</div>
            </div>
            <div class="touchBtn" id="touchJump">⬆️</div>
        </div>
    </div>
    <div id="rotateHint">
        <div style="font-size: 60px; margin-bottom: 20px;">📱</div>
        <h2>请横屏游玩</h2>
        <p>将手机旋转至横屏获得最佳体验</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRAVITY = 0.6, JUMP_FORCE = -14, MOVE_SPEED = 5, WORLD_WIDTH = 2700;

        class Game {
            constructor() {
                this.state = 'start';
                this.score = 0; this.candies = 0; this.level = 1;
                this.camera = { x: 0, y: 0 };
                this.keys = {};
                this.platforms = [];
                this.candyItems = [];
                this.questionBlocks = [];
                this.particles = [];
                this.flag = null;
                this.player = null;
                this.currentQuestion = null;
                this.setupInput();
            }
            setupInput() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    if (e.code === 'Space') { e.preventDefault(); if (this.state === 'playing') this.player.jump(); }
                });
                document.addEventListener('keyup', (e) => { this.keys[e.code] = false; });
            }
            start() {
                document.getElementById('startScreen').style.display = 'none';
                this.state = 'playing';
                this.score = 0; this.candies = 0; this.level = 1;
                this.initLevel();
                this.gameLoop();
            }
            restart() {
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('winScreen').style.display = 'none';
                this.start();
            }
            initLevel() {
                this.player = new Player(100, 400);
                this.camera = { x: 0, y: 0 };
                this.generateLevel();
            }
            generateLevel() {
                this.platforms = []; this.candyItems = []; this.questionBlocks = []; this.particles = [];
                this.platforms.push(new Platform(0, 550, 900, 50));
                this.platforms.push(new Platform(1000, 550, 600, 50));
                this.platforms.push(new Platform(1800, 550, 900, 50));
                if (this.level === 1) {
                    [[300,420],[500,320],[750,420],[1200,400],[1400,300],[1600,400],[2100,420],[2350,320]].forEach(p => {
                        this.platforms.push(new Platform(p[0], p[1], 120, 20));
                    });
                    [350,550,800,1240,1440,2160,2410].forEach((x,i) => {
                        const y = [370,270,370,350,250,370,270][i];
                        this.candyItems.push(new Candy(x, y));
                    });
                    this.questionBlocks.push(new QuestionBlock(540, 220, { type: 'add', max: 10 }));
                    this.questionBlocks.push(new QuestionBlock(1430, 200, { type: 'add', max: 15 }));
                    this.questionBlocks.push(new QuestionBlock(2400, 220, { type: 'compare', max: 20 }));
                } else if (this.level === 2) {
                    [[250,450],[450,350],[650,250],[850,350],[1150,400],[1350,300],[1550,200],[1750,300],[2000,400],[2250,300],[2500,200]].forEach(p => {
                        this.platforms.push(new Platform(p[0], p[1], 100, 20));
                    });
                    [300,500,700,900,1200,1400,1600,2050,2300,2550].forEach(x => {
                        this.candyItems.push(new Candy(x, this.getPlatformY(x) - 60));
                    });
                    this.questionBlocks.push(new QuestionBlock(690, 150, { type: 'mixed', max: 20 }));
                    this.questionBlocks.push(new QuestionBlock(1570, 100, { type: 'subtract', max: 15 }));
                    this.questionBlocks.push(new QuestionBlock(2540, 100, { type: 'mixed', max: 20 }));
                }
                this.flag = { x: WORLD_WIDTH - 150, y: 450, width: 60, height: 100 };
            }
            getPlatformY(x) {
                for (let p of this.platforms) if (x >= p.x && x <= p.x + p.width) return p.y;
                return 550;
            }
            update() {
                if (this.state !== 'playing') return;
                if (this.keys['ArrowLeft']) this.player.vx = -MOVE_SPEED;
                else if (this.keys['ArrowRight']) this.player.vx = MOVE_SPEED;
                else this.player.vx *= 0.8;
                this.player.update();
                this.checkCollisions();
                this.checkCandyCollection();
                this.checkQuestionBlocks();
                this.checkWin();
                this.camera.x = Math.max(0, Math.min(this.player.x - 450, WORLD_WIDTH - 900));
                this.particles = this.particles.filter(p => { p.update(); return p.life > 0; });
                if (this.player.y > 700) this.gameOver();
            }
            checkCollisions() {
                const p = this.player; p.grounded = false;
                for (let platform of this.platforms) {
                    if (p.x + p.radius > platform.x && p.x - p.radius < platform.x + platform.width &&
                        p.y + p.radius > platform.y && p.y - p.radius < platform.y + platform.height) {
                        if (p.vy > 0 && p.y - p.radius < platform.y) {
                            p.y = platform.y - p.radius; p.vy = 0; p.grounded = true; p.jumps = 0;
                        } else if (p.vy < 0 && p.y + p.radius > platform.y + platform.height) {
                            p.y = platform.y + platform.height + p.radius; p.vy = 0;
                        } else if (p.vx > 0) { p.x = platform.x - p.radius; p.vx = 0; }
                        else if (p.vx < 0) { p.x = platform.x + platform.width + p.radius; p.vx = 0; }
                    }
                }
            }
            checkCandyCollection() {
                for (let i = this.candyItems.length - 1; i >= 0; i--) {
                    const candy = this.candyItems[i];
                    if (!candy.collected) {
                        const dist = Math.sqrt((this.player.x - candy.x)**2 + (this.player.y - candy.y)**2);
                        if (dist < this.player.radius + 20) {
                            candy.collected = true; this.candies++; this.score += 10;
                            this.createParticles(candy.x, candy.y, '#FFD700'); this.updateUI();
                        }
                    }
                }
            }
            checkQuestionBlocks() {
                for (let block of this.questionBlocks) {
                    if (!block.answered) {
                        const dist = Math.sqrt((this.player.x - block.x)**2 + (this.player.y - block.y)**2);
                        if (dist < this.player.radius + 30) this.showQuestion(block);
                    }
                }
            }
            showQuestion(block) {
                this.state = 'question'; this.currentQuestion = block; const q = block.question;
                document.getElementById('questionText').textContent = q.text;
                const answersDiv = document.getElementById('answers');
                answersDiv.innerHTML = '';
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'answerBtn'; btn.textContent = opt;
                    btn.onclick = () => this.answerQuestion(opt, q.answer);
                    answersDiv.appendChild(btn);
                });
                document.getElementById('questionPanel').style.display = 'block';
            }
            answerQuestion(selected, correct) {
                const feedback = document.getElementById('feedback');
                if (selected === correct) {
                    this.currentQuestion.answered = true; this.score += 50; this.candies += 3;
                    this.createParticles(this.currentQuestion.x, this.currentQuestion.y, '#4ade80');
                    feedback.textContent = '🎉 答对了！'; feedback.className = 'correct'; feedback.style.display = 'block';
                    setTimeout(() => {
                        feedback.style.display = 'none';
                        document.getElementById('questionPanel').style.display = 'none';
                        this.state = 'playing'; this.updateUI();
                    }, 1000);
                } else {
                    feedback.textContent = '😢 再想想看'; feedback.className = 'wrong'; feedback.style.display = 'block';
                    setTimeout(() => { feedback.style.display = 'none'; }, 1000);
                }
            }
            checkWin() {
                const f = this.flag;
                if (this.player.x > f.x && this.player.x < f.x + f.width &&
                    this.player.y > f.y - 50 && this.player.y < f.y + f.height) {
                    if (this.level < 2) { this.level++; this.score += 100; this.initLevel(); this.showLevelComplete(); }
                    else this.gameWin();
                }
            }
            showLevelComplete() {
                const feedback = document.getElementById('feedback');
                feedback.textContent = '🌟 关卡完成！'; feedback.className = 'correct'; feedback.style.display = 'block';
                setTimeout(() => { feedback.style.display = 'none'; }, 1500); this.updateUI();
            }
            gameOver() {
                this.state = 'gameover';
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
            gameWin() {
                this.state = 'win';
                document.getElementById('winScore').textContent = this.score;
                document.getElementById('winScreen').style.display = 'flex';
            }
            createParticles(x, y, color) {
                for (let i = 0; i < 10; i++) this.particles.push(new Particle(x, y, color));
            }
            draw() {
                ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                this.drawClouds(); ctx.save(); ctx.translate(-this.camera.x, -this.camera.y);
                for (let p of this.platforms) p.draw();
                for (let c of this.candyItems) c.draw();
                for (let b of this.questionBlocks) b.draw();
                this.drawFlag(); this.player.draw();
                for (let p of this.particles) p.draw(); ctx.restore();
            }
            drawClouds() {
                ctx.fillStyle = 'rgba(255,255,255,0.6)'; const co = this.camera.x * 0.3;
                [[100,80,60],[400,120,80],[700,60,50],[1000,100,70],[1400,70,65]].forEach(c => {
                    const x = c[0] - co % 1000 + (c[0]>400 ? Math.floor(co/1000)*200 : 0);
                    ctx.beginPath(); ctx.arc(x, c[1], c[2]*0.5, 0, Math.PI*2);
                    ctx.arc(x+c[2]*0.4, c[1]-c[2]*0.1, c[2]*0.4, 0, Math.PI*2);
                    ctx.arc(x+c[2]*0.7, c[1]+c[2]*0.1, c[2]*0.35, 0, Math.PI*2);
                    ctx.arc(x+c[2]*0.3, c[1]+c[2]*0.2, c[2]*0.3, 0, Math.PI*2); ctx.fill();
                });
            }
            drawFlag() {
                const f = this.flag;
                ctx.fillStyle = '#8B4513'; ctx.fillRect(f.x, f.y, 10, f.height);
                ctx.fillStyle = '#FF6B6B'; ctx.beginPath();
                ctx.moveTo(f.x+10, f.y); ctx.lineTo(f.x+60, f.y+25); ctx.lineTo(f.x+10, f.y+50); ctx.fill();
                ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(f.x+5, f.y, 8, 0, Math.PI*2); ctx.fill();
            }
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('candies').textContent = this.candies;
                document.getElementById('level').textContent = this.level;
            }
            gameLoop() {
                if (this.state !== 'start') { this.update(); this.draw(); }
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        class Player {
            constructor(x, y) {
                this.x = x; this.y = y; this.vx = 0; this.vy = 0;
                this.radius = 25; this.grounded = false; this.jumps = 0;
                this.squash = 1; this.stretch = 1; this.faceOffset = 0;
            }
            jump() {
                if (this.jumps < 2) {
                    this.vy = JUMP_FORCE; this.jumps++;
                    this.squash = 0.7; this.stretch = 1.3;
                    if (this.jumps === 2) game.createParticles(this.x, this.y + this.radius, '#A78BFA');
                }
            }
            update() {
                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                this.squash += (1 - this.squash) * 0.1; this.stretch += (1 - this.stretch) * 0.1;
                this.faceOffset = this.vx * 0.5;
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.squash, this.stretch);
                const g = ctx.createRadialGradient(-5, -5, 0, 0, 0, this.radius);
                g.addColorStop(0, '#F472B6'); g.addColorStop(0.7, '#EC4899'); g.addColorStop(1, '#BE185D');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#8B5CF6';
                ctx.beginPath(); ctx.moveTo(-15, -20); ctx.lineTo(-20, -35); ctx.lineTo(-8, -22); ctx.fill();
                ctx.beginPath(); ctx.moveTo(15, -20); ctx.lineTo(20, -35); ctx.lineTo(8, -22); ctx.fill();
                ctx.strokeStyle = '#EC4899'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.beginPath();
                ctx.moveTo(this.radius-5, 5); ctx.quadraticCurveTo(this.radius+15, 10, this.radius+10, -5); ctx.stroke();
                ctx.fillStyle = '#8B5CF6'; ctx.beginPath();
                ctx.moveTo(this.radius+10, -5); ctx.lineTo(this.radius+15, -2); ctx.lineTo(this.radius+12, 2); ctx.fill();
                ctx.restore();
                ctx.save(); ctx.translate(this.x + this.faceOffset, this.y);
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.ellipse(-8, -5, 8, 10, 0, 0, Math.PI*2); ctx.ellipse(8, -5, 8, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#1F2937'; ctx.beginPath(); ctx.arc(-8+this.vx*0.5, -5, 4, 0, Math.PI*2); ctx.arc(8+this.vx*0.5, -5, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(-10+this.vx*0.5, -8, 2, 0, Math.PI*2); ctx.arc(6+this.vx*0.5, -8, 2, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#1F2937'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.beginPath();
                if (this.grounded) ctx.arc(0, 5, 5, 0.2, Math.PI-0.2);
                else { ctx.ellipse(0, 8, 4, 6, 0, 0, Math.PI*2); ctx.fillStyle = '#FCA55A'; ctx.fill(); }
                ctx.stroke();
                ctx.fillStyle = 'rgba(255, 182, 193, 0.5)'; ctx.beginPath(); ctx.ellipse(-18, 5, 5, 3, 0, 0, Math.PI*2); ctx.ellipse(18, 5, 5, 3, 0, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        class Platform {
            constructor(x, y, w, h) { this.x = x; this.y = y; this.width = w; this.height = h; }
            draw() {
                ctx.fillStyle = '#4ADE80'; ctx.fillRect(this.x, this.y, this.width, 10);
                const g = ctx.createLinearGradient(0, this.y+10, 0, this.y+this.height);
                g.addColorStop(0, '#D97706'); g.addColorStop(1, '#92400E'); ctx.fillStyle = g;
                ctx.fillRect(this.x, this.y+10, this.width, this.height-10);
                ctx.strokeStyle = '#22C55E'; ctx.lineWidth = 2;
                for (let i = this.x+10; i < this.x+this.width; i += 30) {
                    ctx.beginPath(); ctx.moveTo(i, this.y); ctx.lineTo(i-3, this.y-8); ctx.moveTo(i, this.y); ctx.lineTo(i+3, this.y-6); ctx.stroke();
                }
            }
        }

        class Candy {
            constructor(x, y) { this.x = x; this.y = y; this.collected = false; this.bounce = 0; }
            draw() {
                if (this.collected) return; this.bounce += 0.1; const oy = Math.sin(this.bounce)*5;
                ctx.save(); ctx.translate(this.x, this.y + oy);
                const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 18);
                g.addColorStop(0, '#FEF3C7'); g.addColorStop(0.5, '#FCD34D'); g.addColorStop(1, '#F59E0B'); ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(-5, -5, 5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#92400E'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('1', 0, 0); ctx.restore();
            }
        }

        class QuestionBlock {
            constructor(x, y, cfg) {
                this.x = x; this.y = y; this.width = 50; this.height = 50;
                this.answered = false; this.config = cfg; this.bounce = 0;
                this.question = this.genQuestion();
            }
            genQuestion() {
                const max = this.config.max; let text, ans, opts;
                switch(this.config.type) {
                    case 'add':
                        const a1 = Math.floor(Math.random()*(max-1))+1, b1 = Math.floor(Math.random()*(max-a1))+1;
                        text = `${a1} + ${b1} = ?`; ans = a1+b1; break;
                    case 'subtract':
                        const a2 = Math.floor(Math.random()*max)+1, b2 = Math.floor(Math.random()*a2);
                        text = `${a2} - ${b2} = ?`; ans = a2-b2; break;
                    case 'compare':
                        const a3 = Math.floor(Math.random()*max)+1, b3 = Math.floor(Math.random()*max)+1;
                        text = `${a3} 〇 ${b3}`;
                        if (a3>b3) ans='>'; else if (a3<b3) ans='<'; else ans='=';
                        return {text, answer:ans, options:['>','<','=']};
                    case 'mixed':
                        if (Math.random()>0.5) {
                            const m1 = Math.floor(Math.random()*(max-1))+1, m2 = Math.floor(Math.random()*(max-m1))+1;
                            text = `${m1} + ${m2} = ?`; ans = m1+m2;
                        } else {
                            const s1 = Math.floor(Math.random()*max)+1, s2 = Math.floor(Math.random()*s1);
                            text = `${s1} - ${s2} = ?`; ans = s1-s2;
                        } break;
                    default: text='1 + 1 = ?'; ans=2;
                }
                opts = [ans]; while(opts.length<3) { const w=ans+Math.floor(Math.random()*10)-5; if(w!==ans&&w>=0&&!opts.includes(w)) opts.push(w); }
                opts.sort(()=>Math.random()-0.5); return {text, answer:ans, options:opts};
            }
            draw() {
                this.bounce += 0.05; const sc = this.answered ? 0.8 : 1+Math.sin(this.bounce)*0.05;
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(sc, sc);
                if (this.answered) ctx.fillStyle = '#9CA3AF';
                else { const g = ctx.createLinearGradient(-25,-25,25,25); g.addColorStop(0,'#FBBF24'); g.addColorStop(0.5,'#F59E0B'); g.addColorStop(1,'#D97706'); ctx.fillStyle = g; }
                ctx.fillRect(-25,-25,50,50); ctx.strokeStyle = this.answered ? '#6B7280' : '#B45309'; ctx.lineWidth = 3; ctx.strokeRect(-25,-25,50,50);
                ctx.fillStyle = this.answered ? '#6B7280' : 'white'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.answered?'✓':'?',0,2); ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, c) { this.x=x; this.y=y; this.vx=(Math.random()-0.5)*8; this.vy=(Math.random()-0.5)*8; this.life=1; this.color=c; this.size=Math.random()*8+4; }
            update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.3; this.life-=0.02; this.size*=0.98; }
            draw() { ctx.save(); ctx.globalAlpha=this.life; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); ctx.restore(); }
        }

        const game = new Game();

        // 触控支持
        (function() {
            const tl = document.getElementById('touchLeft'), tr = document.getElementById('touchRight'), tj = document.getElementById('touchJump');
            function handle(btn, key) {
                btn.addEventListener('touchstart', e => { e.preventDefault(); game.keys[key]=true; btn.style.transform='scale(0.9)'; if(key==='Space'&&game.state==='playing') game.player.jump(); }, {passive:false});
                btn.addEventListener('touchend', e => { e.preventDefault(); game.keys[key]=false; btn.style.transform='scale(1)'; });
                btn.addEventListener('mousedown', () => { game.keys[key]=true; if(key==='Space'&&game.state==='playing') game.player.jump(); });
                btn.addEventListener('mouseup', () => game.keys[key]=false);
                btn.addEventListener('mouseleave', () => game.keys[key]=false);
            }
            handle(tl, 'ArrowLeft'); handle(tr, 'ArrowRight'); handle(tj, 'Space');
        })();

        // 响应式画布
        function resize() {
            const isMobile = window.innerWidth <= 768;
            canvas.width = isMobile ? window.innerWidth : 900;
            canvas.height = isMobile ? window.innerHeight : 600;
        }
        window.addEventListener('resize', resize); resize();

        // 阻止默认触摸行为
        document.addEventListener('touchmove', e => { if (e.target.closest('#gameContainer')) e.preventDefault(); }, {passive:false});
        let lte = 0;
        document.addEventListener('touchend', e => { const now = Date.now(); if (now-lte <= 300) e.preventDefault(); lte = now; }, false);
    </script>
</body>
</html>
