<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学小恶魔对战版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Microsoft YaHei', sans-serif; }
        #game { position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; }
        canvas { display: block; background: #87CEEB; }
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; color: white; font-size: 16px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.95); padding: 30px; border-radius: 20px; text-align: center; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 100; }
        #qtext { font-size: 32px; color: #333; margin-bottom: 20px; }
        .ans { width: 70px; height: 55px; margin: 8px; font-size: 24px; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(145deg, #f093fb 0%, #f5576c 100%); color: white; transition: transform 0.2s; }
        .ans:hover { transform: scale(1.1); }
        #start, #over, #modeSelect, #customize { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; overflow-y: auto; }
        #over, #modeSelect, #customize { display: none; }
        h1 { font-size: 36px; margin-bottom: 15px; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        h2 { font-size: 24px; margin-bottom: 15px; color: #FCD34D; }
        button { padding: 12px 30px; font-size: 20px; border: none; border-radius: 25px; cursor: pointer; background: linear-gradient(145deg, #fa709a 0%, #fee140 100%); color: white; margin: 8px; transition: transform 0.2s; min-width: 200px; }
        button:hover { transform: scale(1.05); }
        .btn-small { padding: 8px 20px; font-size: 16px; min-width: auto; }

        /* 模式选择 */
        .mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 500px; }
        .mode-card { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .mode-card:hover { background: rgba(236, 72, 153, 0.4); border-color: #EC4899; transform: scale(1.05); }
        .mode-icon { font-size: 48px; margin-bottom: 10px; }
        .mode-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .mode-desc { font-size: 12px; color: #ccc; }

        /* 对战UI */
        #battleUI { position: absolute; top: 50px; left: 0; width: 100%; display: none; justify-content: space-around; padding: 0 50px; }
        .hp-bar { width: 150px; height: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; border: 2px solid white; }
        .hp-fill { height: 100%; transition: width 0.3s; }
        .hp-player { background: linear-gradient(90deg, #4ade80, #22c55e); }
        .hp-enemy { background: linear-gradient(90deg, #f87171, #dc2626); }
        .hp-label { text-align: center; color: white; font-size: 14px; margin-top: 5px; text-shadow: 1px 1px 2px black; }

        /* 计时器 */
        #timer { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 36px; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); display: none; }

        /* 提示信息 */
        #hint { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: bold; color: #FFD700; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); display: none; pointer-events: none; animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }

        /* 变身效果 */
        #transformHint { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 36px; font-weight: bold; color: #8B0000; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); display: none; animation: shake 0.5s ease-in-out; pointer-events: none; }
        @keyframes shake { 0%, 100% { transform: translate(-50%, -50%) rotate(0deg); } 25% { transform: translate(-50%, -50%) rotate(-5deg); } 75% { transform: translate(-50%, -50%) rotate(5deg); } }

        /* 手机触控 */
        #touch { position: absolute; bottom: 15px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 15px; pointer-events: none; }
        .tbtn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 3px solid rgba(255,255,255,0.6); display: flex; justify-content: center; align-items: center; font-size: 24px; pointer-events: auto; user-select: none; touch-action: none; }
        .tbtn:active { background: rgba(255,255,255,0.5); transform: scale(0.95); }

        @media (max-width: 768px) {
            body { background: #87CEEB; }
            #game { border-radius: 0; box-shadow: none; }
            canvas { width: 100vw; height: 100vh; border-radius: 0; }
            h1 { font-size: 28px; }
            h2 { font-size: 20px; }
            .mode-grid { grid-template-columns: 1fr; }
            #touch { display: flex; }
            #panel { width: 90%; padding: 20px; }
            #qtext { font-size: 24px; }
            .ans { width: 60px; height: 50px; font-size: 20px; margin: 5px; }
            .hp-bar { width: 120px; height: 15px; }
            #timer { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="cvs" width="900" height="600"></canvas>

        <!-- 主UI -->
        <div id="ui">
            <span>🎮 关卡: <span id="lvl">1</span></span>
            <span>⭐ 得分: <span id="score">0</span></span>
            <span>🍬 糖果: <span id="candy">0</span></span>
        </div>

        <!-- 对战UI -->
        <div id="battleUI">
            <div>
                <div class="hp-bar"><div class="hp-fill hp-player" id="playerHP" style="width: 100%"></div></div>
                <div class="hp-label">😊 小角仔 HP</div>
            </div>
            <div>
                <div class="hp-bar"><div class="hp-fill hp-enemy" id="enemyHP" style="width: 100%"></div></div>
                <div class="hp-label" id="enemyName">😈 坏蛋 HP</div>
            </div>
        </div>

        <!-- 计时器 -->
        <div id="timer">60</div>

        <!-- 答题面板 -->
        <div id="panel">
            <div id="qtext"></div>
            <div id="btns"></div>
        </div>

        <!-- 提示 -->
        <div id="hint"></div>
        <div id="transformHint">😈 变身坏蛋!</div>

        <!-- 开始界面 -->
        <div id="start">
            <h1>🎮 数学小恶魔</h1>
            <p style="margin-bottom: 20px; font-size: 18px;">多种模式，数学对战！</p>
            <button onclick="showModeSelect()">开始游戏</button>
            <div style="margin-top: 20px; text-align: center; font-size: 14px; line-height: 1.8;">
                <p>🏃 冒险模式 - 经典闯关</p>
                <p>⚔️ 对战模式 - 答题比拼</p>
                <p>🏃‍♂️ 追逐模式 - 逃离怪兽</p>
                <p>👑 Boss战 - 击败数学魔王</p>
            </div>
        </div>

        <!-- 模式选择 -->
        <div id="modeSelect">
            <h2>🎮 选择游戏模式</h2>
            <div class="mode-grid">
                <div class="mode-card" onclick="startMode('adventure')">
                    <div class="mode-icon">🏃</div>
                    <div class="mode-name">冒险模式</div>
                    <div class="mode-desc">经典闯关，收集糖果</div>
                </div>
                <div class="mode-card" onclick="startMode('battle')">
                    <div class="mode-icon">⚔️</div>
                    <div class="mode-name">对战模式</div>
                    <div class="mode-desc">和坏蛋比赛答题速度</div>
                </div>
                <div class="mode-card" onclick="startMode('chase')">
                    <div class="mode-icon">🏃‍♂️</div>
                    <div class="mode-name">追逐模式</div>
                    <div class="mode-desc">答对题目才能逃脱怪兽</div>
                </div>
                <div class="mode-card" onclick="startMode('boss')">
                    <div class="mode-icon">👑</div>
                    <div class="mode-name">Boss战</div>
                    <div class="mode-desc">连续答题击败数学魔王</div>
                </div>
            </div>
            <button class="btn-small" onclick="backToStart()">← 返回</button>
        </div>

        <!-- 游戏结束 -->
        <div id="over">
            <h1 id="endTitle">🏆 游戏结束</h1>
            <p style="font-size: 22px; margin: 15px;"><span id="resultText">最终得分</span>: <span id="final">0</span></p>
            <p style="font-size: 16px; margin: 10px; color: #FCD34D;" id="finalStats"></p>
            <div style="margin-top: 20px;">
                <button onclick="restart()">🔄 再玩一次</button>
                <button class="btn-small" onclick="backToMode()">← 选择模式</button>
            </div>
        </div>

        <!-- 触控 -->
        <div id="touch">
            <div style="display: flex; gap: 10px;">
                <div class="tbtn" id="l">⬅️</div>
                <div class="tbtn" id="r">➡️</div>
            </div>
            <div class="tbtn" id="j">⬆️</div>
        </div>
    </div>

<script>
const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let state = 'start', gameMode = 'adventure';
let score = 0, candies = 0, level = 1, keys = {};
let player, enemy, blocks = [], coins = [], questions = [], flag, cam = 0;
let isVillain = false, villainTime = 0;

// 对战模式变量
let playerHP = 100, enemyHP = 100;
let battleTimer = 60;
let chaseDistance = 0;
let bossPhase = 1;

// ==================== 游戏模式 ====================

function showModeSelect() {
    document.getElementById('start').style.display = 'none';
    document.getElementById('modeSelect').style.display = 'flex';
}

function backToStart() {
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('start').style.display = 'flex';
}

function backToMode() {
    document.getElementById('over').style.display = 'none';
    showModeSelect();
}

function startMode(mode) {
    gameMode = mode;
    document.getElementById('modeSelect').style.display = 'none';
    state = 'play';
    score = 0; candies = 0; level = 1;
    playerHP = 100; enemyHP = 100;
    isVillain = false;

    // 根据模式设置UI
    if (mode === 'battle' || mode === 'boss') {
        document.getElementById('battleUI').style.display = 'flex';
        document.getElementById('ui').style.display = 'none';
    } else {
        document.getElementById('battleUI').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
    }

    if (mode === 'chase') {
        document.getElementById('timer').style.display = 'block';
        battleTimer = 60;
    } else {
        document.getElementById('timer').style.display = 'none';
    }

    init();
    loop();
}

// ==================== 玩家类 ====================

class Player {
    constructor() {
        this.x = 100; this.y = 300; this.vx = 0; this.vy = 0;
        this.r = 22; this.g = false; this.j = 0;
    }
    jump() { if (this.j < 2) { this.vy = -12; this.j++; } }
    update() {
        let speed = isVillain ? 3 : 4;
        if (gameMode === 'chase') speed = 5; // 追逐模式更快

        if (keys['ArrowLeft']) this.vx = -speed;
        else if (keys['ArrowRight']) this.vx = speed;
        else this.vx *= 0.8;

        this.vy += 0.5; this.x += this.vx; this.y += this.vy; this.g = false;

        for (let b of blocks) {
            if (this.x+this.r>b[0] && this.x-this.r<b[0]+b[2] && this.y+this.r>b[1] && this.y-this.r<b[1]+b[3]) {
                if (this.vy > 0 && this.y-this.r < b[1]) { this.y = b[1]-this.r; this.vy = 0; this.g = true; this.j = 0; }
            }
        }

        const maxX = gameMode === 'boss' ? 1500 : 2500;
        if (this.x < this.r) this.x = this.r;
        if (this.x > maxX) this.x = maxX;
        if (this.y > 600) restart();

        if (isVillain) { villainTime--; if (villainTime <= 0) isVillain = false; }
    }
    draw() {
        const x = this.x - cam, y = this.y;
        if (isVillain) this.drawVillain(x, y);
        else this.drawNormal(x, y);
    }
    drawNormal(x, y) {
        const g = ctx.createRadialGradient(x-5, y-5, 0, x, y, this.r);
        g.addColorStop(0, '#F472B6'); g.addColorStop(1, '#EC4899'); ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, this.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#8B5CF6';
        ctx.beginPath(); ctx.moveTo(x-12, y-15); ctx.lineTo(x-18, y-30); ctx.lineTo(x-6, y-18); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+12, y-15); ctx.lineTo(x+18, y-30); ctx.lineTo(x+6, y-18); ctx.fill();
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x-8, y-3, 6, 0, Math.PI*2); ctx.arc(x+8, y-3, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(x-8, y-3, 3, 0, Math.PI*2); ctx.arc(x+8, y-3, 3, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y+8, 4, 0.2, Math.PI-0.2); ctx.stroke();
    }
    drawVillain(x, y) {
        const g = ctx.createRadialGradient(x-5, y-5, 0, x, y, this.r);
        g.addColorStop(0, '#8B4513'); g.addColorStop(1, '#5D3A1A'); ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, this.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.moveTo(x-12, y-15); ctx.lineTo(x-18, y-30); ctx.lineTo(x-6, y-18); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+12, y-15); ctx.lineTo(x+18, y-30); ctx.lineTo(x+6, y-18); ctx.fill();
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x-8, y-3, 6, 0, Math.PI*2); ctx.arc(x+8, y-3, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(x-8, y-3, 3, 0, Math.PI*2); ctx.arc(x+8, y-3, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.moveTo(x-5, y+12); ctx.lineTo(x-2, y+18); ctx.lineTo(x+1, y+12); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+2, y+12); ctx.lineTo(x+5, y+18); ctx.lineTo(x+8, y+12); ctx.fill();
        ctx.fillStyle = 'rgba(255,0,0,0.3)'; ctx.beginPath(); ctx.arc(x-12, y+5, 6, 0, Math.PI*2); ctx.arc(x+12, y+5, 6, 0, Math.PI*2); ctx.fill();
    }
}

// ==================== 敌人类（对战模式） ====================

class Enemy {
    constructor() {
        this.x = 400; this.y = 300;
        this.targetX = 400;
        this.answering = false;
        this.answerTimer = 0;
    }
    update() {
        // AI移动 - 向玩家靠近
        if (gameMode === 'battle') {
            if (player.x > this.x + 200) this.targetX = player.x - 150;
            else if (player.x < this.x - 200) this.targetX = player.x + 150;
            this.x += (this.targetX - this.x) * 0.02;
        }

        // AI答题
        if (this.answering) {
            this.answerTimer--;
            if (this.answerTimer <= 0) {
                this.answering = false;
                return true; // 答完了
            }
        }
        return false;
    }
    startAnswering(difficulty) {
        this.answering = true;
        // 根据难度决定答题时间（越难越快）
        const baseTime = 120; // 2秒
        this.answerTimer = baseTime - difficulty * 20 + Math.random() * 60;
    }
    draw() {
        const x = this.x - cam, y = this.y;
        // 坏蛋形象
        ctx.fillStyle = '#4B0082'; ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2D1B4E';
        ctx.beginPath(); ctx.moveTo(x-12, y-15); ctx.lineTo(x-20, y-35); ctx.lineTo(x-4, y-18); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+12, y-15); ctx.lineTo(x+20, y-35); ctx.lineTo(x+4, y-18); ctx.fill();
        ctx.fillStyle = '#FF4500'; ctx.beginPath(); ctx.arc(x-8, y-3, 7, 0, Math.PI*2); ctx.arc(x+8, y-3, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(x-8, y-3, 3, 0, Math.PI*2); ctx.arc(x+8, y-3, 3, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y+10, 5, 0, Math.PI, true); ctx.stroke();
        // 答题指示
        if (this.answering) {
            ctx.fillStyle = 'yellow'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
            ctx.fillText('❓', x, y - 35);
        }
    }
}

// ==================== 追逐模式怪兽 ====================

class Monster {
    constructor() {
        this.x = -200; this.y = 380;
        this.speed = 2;
        this.active = false;
    }
    update() {
        if (!this.active) return;

        // 怪兽追逐玩家
        const dist = player.x - this.x;
        if (dist > 100) this.x += this.speed;
        else if (dist < 80) this.x -= this.speed;

        // 距离显示
        chaseDistance = Math.floor((player.x - this.x) / 10);

        // 抓到玩家
        if (Math.abs(player.x - this.x) < 30) {
            playerHP -= 2;
            updateHP();
            if (playerHP <= 0) gameOver(false);
        }
    }
    draw() {
        const x = this.x - cam, y = this.y;
        // 怪兽身体
        ctx.fillStyle = '#2D5016'; ctx.beginPath(); ctx.ellipse(x, y, 40, 30, 0, 0, Math.PI*2); ctx.fill();
        // 眼睛
        ctx.fillStyle = '#FF0000'; ctx.beginPath(); ctx.arc(x-15, y-10, 8, 0, Math.PI*2); ctx.arc(x+15, y-10, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(x-15, y-10, 3, 0, Math.PI*2); ctx.arc(x+15, y-10, 3, 0, Math.PI*2); ctx.fill();
        // 嘴巴
        ctx.fillStyle = '#8B0000'; ctx.beginPath(); ctx.moveTo(x-20, y+5); ctx.lineTo(x, y+20); ctx.lineTo(x+20, y+5); ctx.fill();
        // 尖牙
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.moveTo(x-15, y+8); ctx.lineTo(x-12, y+18); ctx.lineTo(x-9, y+8); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+9, y+8); ctx.lineTo(x+12, y+18); ctx.lineTo(x+15, y+8); ctx.fill();
    }
}

// ==================== Boss类 ====================

class Boss {
    constructor() {
        this.x = 1200; this.y = 300;
        this.maxHP = 100;
        this.hp = 100;
        this.phase = 1;
        this.attackTimer = 0;
        this.attacking = false;
    }
    update() {
        // Boss悬浮动画
        this.y = 300 + Math.sin(Date.now() / 500) * 20;

        // 攻击计时
        if (!this.attacking) {
            this.attackTimer++;
            if (this.attackTimer > 180) { // 3秒攻击一次
                this.attacking = true;
                this.attackTimer = 0;
            }
        } else {
            this.attackTimer++;
            if (this.attackTimer > 60) { // 攻击持续1秒
                this.attacking = false;
                this.attackTimer = 0;
                // 造成伤害
                if (Math.abs(player.x - this.x) < 100) {
                    playerHP -= 15;
                    updateHP();
                    showHint('💥 受到攻击！', '#f87171');
                }
            }
        }

        // 根据血量切换阶段
        if (this.hp <= 66 && this.phase === 1) {
            this.phase = 2;
            showHint('😈 Boss狂暴了！', '#ff0000');
        }
        if (this.hp <= 33 && this.phase === 2) {
            this.phase = 3;
            showHint('👿 Boss进入最终形态！', '#8b0000');
        }
    }
    draw() {
        const x = this.x - cam, y = this.y;
        const size = 30 + this.phase * 5;

        // 身体
        ctx.fillStyle = this.phase === 3 ? '#4B0082' : (this.phase === 2 ? '#6B0082' : '#8B0082');
        ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();

        // 角
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.moveTo(x-15, y-size+5); ctx.lineTo(x-25, y-size-30); ctx.lineTo(x-5, y-size+5); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+15, y-size+5); ctx.lineTo(x+25, y-size-30); ctx.lineTo(x+5, y-size+5); ctx.fill();

        // 眼睛
        ctx.fillStyle = this.attacking ? '#FF0000' : '#FFD700';
        ctx.beginPath(); ctx.arc(x-10, y-5, 8, 0, Math.PI*2); ctx.arc(x+10, y-5, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(x-10, y-5, 3, 0, Math.PI*2); ctx.arc(x+10, y-5, 3, 0, Math.PI*2); ctx.fill();

        // 攻击范围
        if (this.attacking) {
            ctx.fillStyle = 'rgba(255,0,0,0.3)'; ctx.beginPath(); ctx.arc(x, y+50, 100, 0, Math.PI*2); ctx.fill();
        }

        // 血条
        const barW = 60;
        ctx.fillStyle = 'black'; ctx.fillRect(x-barW/2, y-size-20, barW, 8);
        ctx.fillStyle = '#f87171'; ctx.fillRect(x-barW/2+1, y-size-19, (this.hp/this.maxHP)*(barW-2), 6);
    }
}

// ==================== 其他类 ====================

class Coin {
    constructor(x, y) { this.x = x; this.y = y; this.t = Math.random(); this.get = false; }
    draw() {
        if (this.get) return; this.t += 0.05;
        ctx.save(); ctx.translate(this.x - cam, this.y + Math.sin(this.t) * 3);
        ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#B8860B'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.fillText('1', 0, 4);
        ctx.restore();
    }
}

class QBlock {
    constructor(x, y, diff) { this.x = x; this.y = y; this.done = false; this.diff = diff; this.q = this.makeQ(); }
    makeQ() {
        let text, ans, type;
        if (this.diff === 1) type = 'add_easy';
        else if (this.diff === 2) type = Math.random() > 0.5 ? 'add' : 'sub';
        else type = ['add', 'sub', 'compare', 'mul'][Math.floor(Math.random() * 4)];

        switch(type) {
            case 'add_easy': { const a = Math.floor(Math.random() * 5) + 1, b = Math.floor(Math.random() * 5) + 1; text = `${a} + ${b} = ?`; ans = a + b; } break;
            case 'add': { const a = Math.floor(Math.random() * 15) + 5, b = Math.floor(Math.random() * 10) + 1; text = `${a} + ${b} = ?`; ans = a + b; } break;
            case 'sub': { const a = Math.floor(Math.random() * 20) + 10, b = Math.floor(Math.random() * a); text = `${a} - ${b} = ?`; ans = a - b; } break;
            case 'compare': { const a = Math.floor(Math.random() * 20) + 1, b = Math.floor(Math.random() * 20) + 1; text = `${a} ○ ${b}`; ans = a > b ? '>' : (a < b ? '<' : '='); return { text, ans, opts: ['>', '<', '='] }; }
            case 'mul': { const a = Math.floor(Math.random() * 9) + 2, b = Math.floor(Math.random() * 9) + 2; text = `${a} × ${b} = ?`; ans = a * b; } break;
        }
        let opts = [ans];
        while (opts.length < 3) { const w = ans + Math.floor(Math.random() * 10) - 5; if (w >= 0 && w !== ans && !opts.includes(w)) opts.push(w); }
        opts.sort(() => Math.random() - 0.5); return { text, ans, opts };
    }
    draw() {
        ctx.save(); ctx.translate(this.x - cam, this.y);
        ctx.fillStyle = this.done ? '#9CA3AF' : '#F59E0B'; ctx.fillRect(-20, -20, 40, 40); ctx.strokeStyle = '#B45309'; ctx.lineWidth = 2; ctx.strokeRect(-20, -20, 40, 40);
        ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center'; ctx.fillText(this.done ? '✓' : '?', 0, 5);
        ctx.restore();
    }
}

// ==================== 游戏逻辑 ====================

function init() {
    player = new Player(); cam = 0; blocks = []; coins = []; questions = [];

    if (gameMode === 'adventure') {
        initAdventure();
    } else if (gameMode === 'battle') {
        initBattle();
    } else if (gameMode === 'chase') {
        initChase();
    } else if (gameMode === 'boss') {
        initBoss();
    }
}

function initAdventure() {
    blocks = [[0, 450, 2500, 50], [150, 380, 80, 20], [300, 320, 80, 20], [500, 380, 80, 20], [700, 280, 100, 20], [900, 350, 80, 20], [1150, 300, 80, 20], [1400, 380, 80, 20], [1700, 320, 100, 20]];
    [180, 340, 340, 260, 540, 550, 750, 240, 940, 310, 1200, 260, 1450, 340, 1750, 280].forEach((v, i, arr) => { if (i % 2 === 0) coins.push(new Coin(v, arr[i + 1])); });
    questions = [new QBlock(350, 250, 1), new QBlock(750, 200, 1), new QBlock(1200, 220, 1)];
    flag = { x: 2000, y: 350 };
}

function initBattle() {
    // 对战模式 - 平台和问题方块
    blocks = [[0, 450, 1000, 50]];
    questions = [new QBlock(300, 350, 2), new QBlock(500, 300, 2), new QBlock(700, 350, 2)];
    enemy = new Enemy();
    updateHP();
}

function initChase() {
    // 追逐模式 - 长跑道
    blocks = [[0, 450, 3000, 50], [200, 380, 60, 20], [400, 320, 60, 20], [600, 380, 60, 20], [800, 300, 80, 20], [1000, 380, 60, 20], [1200, 320, 60, 20], [1400, 380, 60, 20], [1600, 300, 80, 20], [1800, 380, 60, 20], [2200, 350, 100, 20], [2500, 300, 100, 20]];
    for (let i = 250; i < 2800; i += 300) coins.push(new Coin(i, 400));
    questions = [];
    for (let i = 400; i < 2500; i += 400) questions.push(new QBlock(i, 300, 2));
    enemy = new Monster();
    enemy.active = true;
    flag = { x: 2800, y: 350 };
}

function initBoss() {
    // Boss战
    blocks = [[0, 450, 1500, 50], [300, 350, 80, 20], [600, 300, 80, 20], [900, 350, 80, 20]];
    questions = [];
    enemy = new Boss();
    updateHP();
}

function update() {
    if (state !== 'play') return;

    player.update();

    // 相机
    let maxCam = 1700;
    if (gameMode === 'chase') maxCam = 2200;
    else if (gameMode === 'boss') maxCam = 700;
    cam = Math.max(0, Math.min(player.x - 200, maxCam));

    // 更新敌人
    if (gameMode === 'battle' && enemy) {
        const answered = enemy.update();
        if (answered && !isVillain) {
            // AI答对，玩家受伤
            playerHP -= 10;
            updateHP();
            showHint('😈 坏蛋答对了！你受到攻击！', '#f87171');
            if (playerHP <= 0) gameOver(false);
        }
    } else if (gameMode === 'chase' && enemy) {
        enemy.update();
        // 计时器
        battleTimer -= 1/60;
        document.getElementById('timer').textContent = Math.ceil(battleTimer);
        if (battleTimer <= 0) gameOver(false);
    } else if (gameMode === 'boss' && enemy) {
        enemy.update();
        if (enemy.hp <= 0) gameOver(true);
    }

    // 收集糖果
    for (let c of coins) {
        if (!c.get && Math.hypot(player.x - c.x, player.y - c.y) < 30) {
            c.get = true; candies++; score += 10;
            if (gameMode === 'chase') {
                // 追逐模式吃糖果可以加速
                player.x += 50;
                showHint('⚡ 加速！', '#4ade80');
            }
            updateUI();
        }
    }

    // 答题
    for (let q of questions) {
        if (!q.done && Math.hypot(player.x - q.x, player.y - q.y) < 40) showQ(q);
    }

    // 过关/胜利条件
    if (gameMode === 'adventure' && Math.abs(player.x - flag.x) < 40 && Math.abs(player.y - flag.y) < 60) win();
    else if (gameMode === 'chase' && Math.abs(player.x - flag.x) < 40) win();
}

function showQ(block) {
    state = 'q';
    document.getElementById('qtext').textContent = block.q.text;
    const btns = document.getElementById('btns'); btns.innerHTML = '';
    block.q.opts.forEach(opt => {
        const b = document.createElement('button'); b.className = 'ans'; b.textContent = opt;
        b.onclick = () => answer(block, opt);
        btns.appendChild(b);
    });
    document.getElementById('panel').style.display = 'block';

    // 对战/Boss模式：AI也开始答题
    if ((gameMode === 'battle' || gameMode === 'boss') && enemy && !enemy.answering) {
        enemy.startAnswering(block.diff);
    }

    // 追逐模式：怪兽暂停
    if (gameMode === 'chase' && enemy) enemy.speed = 0;
}

function answer(block, sel) {
    const correct = sel === block.q.ans;

    if (correct) {
        block.done = true; score += 50; candies += 2;

        if (gameMode === 'battle' && enemy) {
            // 对战模式：攻击敌人
            enemyHP -= 15;
            updateHP();
            showHint('⚔️ 攻击成功！', '#4ade80');
            enemy.answering = false;
            if (enemyHP <= 0) gameOver(true);
        } else if (gameMode === 'boss' && enemy) {
            // Boss战：造成伤害
            let damage = 15;
            if (isVillain) damage = 25; // 坏蛋形态伤害更高
            enemy.hp -= damage;
            updateHP();
            showHint(`💥 造成 ${damage} 点伤害！`, '#4ade80');
            enemy.answering = false;
            // 生成新的问题
            setTimeout(() => {
                questions = [new QBlock(player.x + 200, 350, enemy.phase === 3 ? 3 : enemy.phase)];
            }, 1000);
        } else if (gameMode === 'chase' && enemy) {
            // 追逐模式：击退怪兽
            enemy.x -= 200;
            enemy.speed = 2;
            showHint('⚡ 击退怪兽！', '#4ade80');
        }

        if (isVillain) { isVillain = false; villainTime = 0; }
    } else {
        // 答错
        if (gameMode === 'battle' || gameMode === 'boss') {
            // 对战/Boss模式：变身坏蛋，但答错会受到惩罚
            isVillain = true; villainTime = 180;
            const hint = document.getElementById('transformHint');
            hint.style.display = 'block';
            setTimeout(() => hint.style.display = 'none', 1500);
            showHint('❌ 答错了！变身坏蛋！', '#f87171');
        } else {
            isVillain = true; villainTime = 300;
            const hint = document.getElementById('transformHint');
            hint.style.display = 'block';
            setTimeout(() => hint.style.display = 'none', 1500);
        }

        if (gameMode === 'chase' && enemy) {
            enemy.speed = 4; // 怪兽加速
            enemy.x += 50;
        }
    }

    if (gameMode === 'chase' && enemy) enemy.speed = 2;
    document.getElementById('panel').style.display = 'none';
    state = 'play';
    updateUI();
}

function showHint(text, color) {
    const hint = document.getElementById('hint');
    hint.textContent = text;
    hint.style.color = color;
    hint.style.display = 'block';
    setTimeout(() => hint.style.display = 'none', 1500);
}

function updateHP() {
    document.getElementById('playerHP').style.width = Math.max(0, playerHP) + '%';
    if (enemy) document.getElementById('enemyHP').style.width = Math.max(0, (gameMode === 'boss' ? enemy.hp : enemyHP)) + '%';
}

function updateUI() {
    document.getElementById('lvl').textContent = level;
    document.getElementById('score').textContent = score;
    document.getElementById('candy').textContent = candies;
}

function draw() {
    ctx.fillStyle = gameMode === 'boss' ? '#2D1B4E' : '#87CEEB';
    if (gameMode === 'chase') {
        // 追逐模式红色警告背景
        const danger = Math.max(0, 1 - chaseDistance / 50);
        ctx.fillStyle = `rgb(${135 + danger * 120}, ${206 - danger * 100}, ${235 - danger * 100})`;
    }
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    // 云
    if (gameMode !== 'boss') {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        for (let [x, y, r] of [[100, 80, 30], [300, 120, 40], [500, 60, 25], [700, 100, 35]]) {
            ctx.beginPath(); ctx.arc(x - cam * 0.3, y, r, 0, Math.PI * 2); ctx.fill();
        }
    }

    // 地面
    const groundLen = gameMode === 'boss' ? 1500 : (gameMode === 'chase' ? 3000 : 2500);
    ctx.fillStyle = gameMode === 'boss' ? '#4B0082' : '#4ADE80';
    ctx.fillRect(0 - cam, 450, groundLen, 10);
    ctx.fillStyle = gameMode === 'boss' ? '#2D1B4E' : '#D97706';
    ctx.fillRect(0 - cam, 460, groundLen, 90);

    // 平台
    ctx.fillStyle = '#8B5CF6';
    for (let b of blocks.slice(1)) ctx.fillRect(b[0] - cam, b[1], b[2], b[3]);

    // 糖果
    for (let c of coins) c.draw();

    // 问题
    for (let q of questions) q.draw();

    // 旗帜（非Boss模式）
    if (gameMode !== 'battle' && gameMode !== 'boss') {
        ctx.fillStyle = '#8B4513'; ctx.fillRect(flag.x - cam, flag.y, 8, 100);
        ctx.fillStyle = '#FF6B6B'; ctx.beginPath(); ctx.moveTo(flag.x - cam + 8, flag.y); ctx.lineTo(flag.x - cam + 50, flag.y + 20); ctx.lineTo(flag.x - cam + 8, flag.y + 40); ctx.fill();
    }

    // 玩家
    player.draw();

    // 敌人
    if (enemy) enemy.draw();

    // 追逐模式距离显示
    if (gameMode === 'chase') {
        ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'left';
        ctx.fillText(`距离怪兽: ${chaseDistance}m`, 20, 100);
    }
}

function loop() { if (state === 'play' || state === 'q') { update(); draw(); } requestAnimationFrame(loop); }

function win() {
    gameOver(true);
}

function gameOver(won) {
    state = 'over';
    document.getElementById('battleUI').style.display = 'none';
    document.getElementById('timer').style.display = 'none';
    document.getElementById('ui').style.display = 'none';

    if (won) {
        document.getElementById('endTitle').textContent = gameMode === 'boss' ? '🏆 击败Boss！' : '🎉 胜利！';
        document.getElementById('resultText').textContent = '最终得分';
    } else {
        document.getElementById('endTitle').textContent = '💀 游戏结束';
        document.getElementById('resultText').textContent = '最终得分';
    }

    document.getElementById('final').textContent = score;

    let stats = '';
    if (gameMode === 'battle') stats = `剩余HP: ${playerHP}%`;
    else if (gameMode === 'chase') stats = `剩余时间: ${Math.ceil(battleTimer)}秒`;
    else if (gameMode === 'boss') stats = won ? 'Boss已被击败！' : '被Boss击败了...';
    else stats = `收集糖果: ${candies}`;
    document.getElementById('finalStats').textContent = stats;

    document.getElementById('over').style.display = 'flex';
}

function restart() {
    document.getElementById('over').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    playerHP = 100; enemyHP = 100;
    battleTimer = 60; chaseDistance = 0;
    startMode(gameMode);
}

// 输入
document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') { e.preventDefault(); if (state === 'play') player.jump(); } });
document.addEventListener('keyup', e => keys[e.code] = false);

function touch(id, key, jump) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; if (jump && state === 'play') player.jump(); });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
}
touch('l', 'ArrowLeft', false); touch('r', 'ArrowRight', false); touch('j', 'Space', true);

if (window.innerWidth <= 768) { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
</script>
