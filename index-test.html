<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学小恶魔</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #667eea; font-family: 'Microsoft YaHei', sans-serif; }
        #game { position: relative; width: 100%; max-width: 800px; height: 100vh; max-height: 500px; }
        canvas { background: #87CEEB; border-radius: 10px; display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 16px; text-shadow: 1px 1px 2px black; }
        #panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; text-align: center; display: none; z-index: 100; }
        #qtext { font-size: 28px; margin-bottom: 15px; color: #333; }
        .ans { width: 60px; height: 50px; margin: 5px; font-size: 20px; border: none; border-radius: 10px; background: #f5576c; color: white; cursor: pointer; }
        .ans:hover { transform: scale(1.1); }
        #start, #over, #pause, #charSelect, #vehicleSelect, #difficultySelect, #settingsSelect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 200; }
        #over, #pause, #charSelect, #vehicleSelect, #difficultySelect, #settingsSelect { display: none; }
        h1 { font-size: 36px; margin-bottom: 20px; }
        button { padding: 12px 30px; font-size: 20px; border: none; border-radius: 20px; background: #fa709a; color: white; cursor: pointer; margin: 8px; }
        button:hover { transform: scale(1.05); }
        .btn-small { padding: 8px 20px; font-size: 16px; }
        #tips { margin-top: 15px; font-size: 14px; text-align: center; line-height: 1.6; }
        #modeSelect { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        /* 角色选择样式 */
        .char-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; max-width: 600px; }
        .char-option { width: 100px; height: 120px; background: rgba(255,255,255,0.1); border: 3px solid transparent; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
        .char-option:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        .char-option.selected { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .char-emoji { font-size: 50px; margin-bottom: 5px; }
        .char-name { font-size: 14px; }

        /* 载具选择样式 */
        .vehicle-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; max-width: 600px; }
        .vehicle-option { width: 120px; height: 130px; background: rgba(255,255,255,0.1); border: 3px solid transparent; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
        .vehicle-option:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        .vehicle-option.selected { border-color: #00CED1; background: rgba(0,206,209,0.2); }
        .vehicle-emoji { font-size: 45px; margin-bottom: 5px; }
        .vehicle-name { font-size: 14px; }
        .vehicle-stat { font-size: 11px; color: #aaa; margin-top: 3px; }

        /* 难度选择样式 */
        .difficulty-grid { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; width: 100%; max-width: 500px; padding: 0 20px; }
        .difficulty-option { padding: 15px 20px; background: rgba(255,255,255,0.1); border: 3px solid transparent; border-radius: 15px; cursor: pointer; display: flex; align-items: center; transition: all 0.2s; }
        .difficulty-option:hover { transform: scale(1.02); background: rgba(255,255,255,0.2); }
        .difficulty-option.selected { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .difficulty-emoji { font-size: 35px; margin-right: 15px; }
        .difficulty-info { flex: 1; text-align: left; }
        .difficulty-name { font-size: 18px; font-weight: bold; }
        .difficulty-desc { font-size: 13px; color: #aaa; margin-top: 3px; }

        /* 设置选择样式 */
        .settings-grid { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; width: 100%; max-width: 500px; padding: 0 20px; }
        .setting-option { padding: 18px 20px; background: rgba(255,255,255,0.1); border: 3px solid transparent; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; }
        .setting-option:hover { background: rgba(255,255,255,0.2); }
        .setting-option.selected { border-color: #4ade80; background: rgba(74,222,128,0.2); }
        .setting-info { text-align: left; }
        .setting-name { font-size: 18px; font-weight: bold; }
        .setting-desc { font-size: 13px; color: #aaa; margin-top: 3px; }
        .setting-check { font-size: 28px; color: #4ade80; }

        /* 当前选择显示 */
        .current-selection { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .selection-label { font-size: 12px; color: #aaa; }
        .selection-value { font-size: 20px; }

        /* 进度条 */
        .progress-bar { position: absolute; top: 40px; left: 10px; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; color: white; font-size: 14px; display: none; }
        .progress-fill { display: inline-block; width: 100px; height: 10px; background: rgba(255,255,255,0.3); border-radius: 5px; margin-left: 10px; overflow: hidden; vertical-align: middle; }
        .progress-fill-inner { height: 100%; background: linear-gradient(90deg, #4ade80, #FFD700); transition: width 0.3s; }

        /* 消消乐界面 */
        #elimTarget { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); padding: 10px 30px; border-radius: 20px; display: none; z-index: 50; }
        #elimTarget .label { font-size: 14px; color: #666; }
        #elimTarget .num { font-size: 36px; font-weight: bold; color: #f5576c; }

        /* 手机触控 */
        #touch { position: absolute; bottom: 15px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 15px; pointer-events: none; }
        .tbtn { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid white; display: flex; justify-content: center; align-items: center; font-size: 24px; pointer-events: auto; }
        .tbtn:active { background: rgba(255,255,255,0.5); }
        #touch.elim-mode { display: none !important; }

        @media (max-width: 768px) {
            html, body { background: #87CEEB; overflow: hidden; margin: 0; padding: 0; height: 100%; width: 100%; }
            body { display: block; min-height: 100%; min-height: -webkit-fill-available; }
            #game { max-width: 100%; max-height: none; height: 100%; height: 100svh; width: 100%; border-radius: 0; position: fixed; top: 0; left: 0; bottom: 0; }
            canvas { border-radius: 0; width: 100%; height: 100%; display: block; }
            h1 { font-size: 24px; }
            #touch { display: flex; bottom: max(10px, env(safe-area-inset-bottom)); }
            #touch.elim-mode { display: none !important; }
            #tips { font-size: 11px; padding: 0 10px; }
            .char-option { width: 80px; height: 100px; }
            .char-emoji { font-size: 40px; }
            .vehicle-option { width: 100px; height: 110px; }
            .vehicle-emoji { font-size: 35px; }
            .difficulty-option { padding: 12px 15px; }
            .difficulty-emoji { font-size: 28px; }
            .difficulty-name { font-size: 16px; }
            .progress-bar { font-size: 12px; top: 35px; }
        }

        /* 动画 */
        @keyframes trophyBounce { 0%, 100% { transform: scale(1) rotate(-5deg); } 50% { transform: scale(1.1) rotate(5deg); } }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0.3; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>

<script>
// ==================== 音效系统 ====================
const AudioSys = {
    ctx: null, isMuted: false, bgmOscillators: [], bgmGain: null, isBGMPlaying: false,
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },
    playJump() { this.playTone(200, 600, 0.1, 'sine'); },
    playCoin() { this.playTone(1200, 1600, 0.15, 'sine'); },
    playWin() { this.playChord([523, 659, 784, 1046], 0.4); },
    playFail() { this.playTone(400, 100, 0.5, 'sawtooth'); },
    playClick() { this.playTone(800, 800, 0.05, 'sine'); },
    playFire() { this.playTone(600, 400, 0.1, 'square'); },
    playHit() { this.playTone(150, 100, 0.1, 'sawtooth'); },
    playTransform() {
        const notes = [523, 659, 784, 1046];
        notes.forEach((f, i) => setTimeout(() => this.playTone(f, f, 0.1, 'square'), i * 50));
    },
    playTone(startFreq, endFreq, duration, type = 'sine') {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(startFreq, this.ctx.currentTime);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    playChord(freqs, duration) {
        freqs.forEach(f => this.playTone(f, f, duration, 'triangle'));
    },
    // 背景音乐系统 - 轻松欢快的旋律
    startBGM() {
        if (this.isBGMPlaying || this.isMuted || !this.ctx) return;
        this.isBGMPlaying = true;
        this.bgmGain = this.ctx.createGain();
        this.bgmGain.gain.value = 0.08; // 背景音量较小
        this.bgmGain.connect(this.ctx.destination);
        this.playBGMSequence();
    },
    stopBGM() {
        this.isBGMPlaying = false;
        this.bgmOscillators.forEach(osc => {
            try { osc.stop(); } catch(e) {}
        });
        this.bgmOscillators = [];
        if (this.bgmGain) {
            this.bgmGain.disconnect();
            this.bgmGain = null;
        }
    },
    playBGMSequence() {
        if (!this.isBGMPlaying) return;
        // 轻松欢快的音符序列 (C大调)
        const melody = [
            {n: 523, d: 0.4}, {n: 587, d: 0.4}, {n: 659, d: 0.4}, {n: 784, d: 0.4},
            {n: 659, d: 0.4}, {n: 587, d: 0.4}, {n: 523, d: 0.4}, {n: 0, d: 0.2},
            {n: 659, d: 0.3}, {n: 784, d: 0.3}, {n: 880, d: 0.3}, {n: 1046, d: 0.6},
            {n: 880, d: 0.3}, {n: 784, d: 0.3}, {n: 659, d: 0.3}, {n: 0, d: 0.2},
            {n: 523, d: 0.4}, {n: 659, d: 0.4}, {n: 587, d: 0.4}, {n: 523, d: 0.4},
            {n: 587, d: 0.4}, {n: 659, d: 0.4}, {n: 523, d: 0.8}, {n: 0, d: 0.2}
        ];
        let time = this.ctx.currentTime;
        melody.forEach(note => {
            if (note.n > 0) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = note.n;
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(0.06, time + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, time + note.d - 0.05);
                osc.connect(gain);
                gain.connect(this.bgmGain);
                osc.start(time);
                osc.stop(time + note.d);
                this.bgmOscillators.push(osc);
            }
            time += note.d;
        });
        // 循环播放
        const totalDuration = melody.reduce((sum, n) => sum + n.d, 0);
        this.bgmTimeout = setTimeout(() => this.playBGMSequence(), totalDuration * 1000 - 100);
    },
    toggleMute() {
        this.isMuted = !this.isMuted;
        if (this.isMuted) {
            this.stopBGM();
        } else {
            this.startBGM();
        }
        return this.isMuted;
    },
    speak(text, lang = 'zh-CN') {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = lang;
            utter.rate = 1.0;
            utter.pitch = 1.0;
            utter.volume = 0.9;
            const voices = window.speechSynthesis.getVoices();
            const zhVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Ting') || v.name.includes('Yaoyao') || v.name.includes('Meijia') || v.name.includes('Google')));
            if (zhVoice) utter.voice = zhVoice;
            window.speechSynthesis.speak(utter);
        }
    },
    speakPraise(praise) {
        const praiseMap = { 'GOOD!': '棒', 'GREAT!': '真棒', 'PERFECT!': '完美', 'AWESOME!': '厉害', 'EXCELLENT!': '优秀' };
        this.playWin();
        setTimeout(() => this.speak(praiseMap[praise] || '棒'), 100);
    }
};

// ==================== 玩家类（优化版）====================
class Player {
    constructor() {
        this.x = 100; this.y = 300; this.vx = 0; this.vy = 0; this.r = 22;
        this.g = false; this.j = 0;
        this.isBig = false; this.invincible = 0;
        this.flashFrame = 0;
        this.transformTimer = 0; // 变身倒计时
        this.isTransformed = false; // 是否处于变身状态
        // 耀西特殊属性
        this.yoshiTongueOut = false; // 舌头是否伸出
        this.yoshiTongueTimer = 0; // 舌头伸出计时
        this.yoshiTongueLength = 0; // 舌头当前长度
        this.yoshiMouthEnemy = null; // 嘴里吃掉的敌人类型
        this.yoshiEggAmmo = 0; // 耀西的蛋弹药数量
        this.yoshiFacingRight = true; // 耀西朝向
    }

    jump() {
        if (this.j < 2) {
            const jumpPower = -12 * (selectedVehicle?.jump || 1);
            this.vy = jumpPower;
            this.j++;
            AudioSys.playJump();
        }
    }

    update() {
        const speedMultiplier = selectedVehicle?.speed || 1;

        if (keys['ArrowLeft']) this.vx = -4 * speedMultiplier;
        else if (keys['ArrowRight']) this.vx = 4 * speedMultiplier;
        else this.vx *= 0.8;

        this.vy += 0.5;
        this.x += this.vx;
        this.y += this.vy;
        this.g = false;

        const px = this.x, py = this.y, pr = this.r;
        // 普通平台碰撞
        for (let i = 0; i < blocks.length; i++) {
            const p = blocks[i];
            if (px + pr > p[0] && px - pr < p[0] + p[2] && py + pr > p[1] && py - pr < p[1] + p[3]) {
                if (this.vy > 0 && py - pr < p[1]) {
                    this.y = p[1] - pr;
                    this.vy = 0;
                    this.g = true;
                    this.j = 0;
                }
            }
        }

        // 浮动云朵平台碰撞
        for (let cloud of clouds) {
            const bounds = cloud.getBounds();
            // 只检测从上方落下
            if (this.vy > 0 &&
                px + pr > bounds.x && px - pr < bounds.x + bounds.width &&
                py + pr >= bounds.y && py - pr < bounds.y + bounds.height) {
                // 确保是从上方落下来的（前一帧在云朵上方）
                if (py - pr - this.vy <= bounds.y) {
                    this.y = bounds.y - pr;
                    this.vy = 0;
                    this.g = true;
                    this.j = 0;
                    // 站在移动云朵上要跟随移动
                    if (cloud.moveRange > 0) {
                        this.x += Math.cos(cloud.moveOffset) * cloud.moveRange * 0.02 * cloud.moveSpeed;
                    }
                }
            }
        }

        // 边界 - 根据新关卡长度调整
        const maxX = level === 1 ? 15000 : (level === 2 ? 20000 : 25000);
        if (this.x < this.r) this.x = this.r;
        if (this.x > maxX) this.x = maxX;
        // 顶部边界，防止跳出画面（限制在画面内）
        if (this.y < 150) { this.y = 150; this.vy = 0.5; }
        if (this.y > 600) {
            AudioSys.playFail();
            state = 'over';
            setTimeout(() => restart(), 50);
            return;
        }

        if (this.invincible > 0) {
            this.invincible--;
            this.flashFrame = (this.flashFrame + 1) % 10;
        }

        // 变身倒计时
        if (this.transformTimer > 0) {
            this.transformTimer--;
            if (this.transformTimer <= 0) {
                this.isTransformed = false;
                showHint('变身结束！');
            }
        }

        // 耀西舌头逻辑
        if (selectedChar?.id === 'yoshi') {
            this.updateYoshiTongue();
        }
    }

    // 耀西吐舌头吃敌人
    updateYoshiTongue() {
        // 更新朝向
        if (this.vx > 0.1) this.yoshiFacingRight = true;
        if (this.vx < -0.1) this.yoshiFacingRight = false;

        // 舌头伸出逻辑
        if (this.yoshiTongueOut) {
            this.yoshiTongueTimer++;

            // 舌头伸出阶段 (0-10帧)
            if (this.yoshiTongueTimer <= 10) {
                this.yoshiTongueLength = (this.yoshiTongueTimer / 10) * 80;
            }
            // 舌头收回阶段 (11-20帧)
            else if (this.yoshiTongueTimer <= 20) {
                this.yoshiTongueLength = ((20 - this.yoshiTongueTimer) / 10) * 80;
            }
            // 舌头完全收回
            else {
                this.yoshiTongueOut = false;
                this.yoshiTongueLength = 0;
                this.yoshiTongueTimer = 0;
            }

            // 检测是否吃到敌人
            if (this.yoshiTongueTimer <= 10 && !this.yoshiMouthEnemy) {
                const tongueX = this.x + (this.yoshiFacingRight ? 1 : -1) * (30 + this.yoshiTongueLength);
                const tongueY = this.y - 10;

                for (let e of enemies) {
                    if (!e.dead && Math.hypot(tongueX - e.x, tongueY - e.y) < 35) {
                        // 吃到敌人！
                        e.dead = true;
                        this.yoshiMouthEnemy = e.constructor.name; // 记录敌人类型
                        this.yoshiEggAmmo = 1; // 生成一个蛋
                        score += 50;
                        updateUI();
                        AudioSys.playCoin();
                        showHint('🥚 耀西吞下了敌人！');
                        break;
                    }
                }
            }
        }
    }

    // 耀西生成蛋（蛋出现在身后，参考超级马里奥大电影）
    spawnYoshiEgg() {
        if (this.yoshiMouthEnemy) {
            // 在耀西身后生成一个蛋
            const eggX = this.x - (this.yoshiFacingRight ? 40 : -40);
            const egg = new YoshiEgg(eggX, this.y, this.yoshiMouthEnemy);
            yoshiEggs.push(egg);

            this.yoshiMouthEnemy = null;
            this.yoshiEggAmmo = 0;

            AudioSys.playCoin();
            // 只播放音效和动画，不显示提示
            return true;
        }
        return false;
    }

    // 玩家被击中
    hit() {
        if (this.invincible > 0) return false;

        if (this.isBig) {
            this.isBig = false;
            this.invincible = 120;
            AudioSys.playFail();
            return false;
        } else {
            AudioSys.playFail();
            state = 'over';
            playerFireMode = 'normal';
            setTimeout(() => restart(), 50);
            return true;
        }
    }

    draw() {
        ctx.save();
        const scale = this.isBig ? 1.5 : 1;
        const s = 22 * scale;
        ctx.translate(this.x - cam, this.y);

        if (this.invincible > 0 && this.flashFrame < 5) {
            ctx.globalAlpha = 0.5;
        }

        // 如果处于变身状态，绘制炫蓝雷霆
        if (this.isTransformed) {
            this.drawXuanBlueThunder(s);
        } else {
            const char = selectedChar || CHARACTERS[0];

            if (selectedVehicle && selectedVehicle.id !== 'none') {
                this.drawVehicle(s);
            }

            this.drawEggCharacter(s, char);
        }

        ctx.restore();
    }

    drawVehicle(s) {
        const v = selectedVehicle;
        ctx.save();

        switch(v.id) {
            case 'tank':
                ctx.fillStyle = '#556B2F';
                ctx.fillRect(-s*1.2, s*0.5, s*2.4, s*0.8);
                ctx.fillStyle = '#2F4F2F';
                ctx.fillRect(-s*1.3, s*1.2, s*0.4, s*0.4);
                ctx.fillRect(s*0.9, s*1.2, s*0.4, s*0.4);
                // 炮管（改为长条形而不是圆点）
                ctx.fillStyle = '#3D3D3D';
                ctx.fillRect(s*0.2, -s*0.2, s*1.5, s*0.25);
                // 炮口
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(s*1.6, -s*0.25, s*0.15, s*0.35);
                break;

            case 'cannon':
                ctx.fillStyle = '#FF4500';
                ctx.beginPath();
                ctx.ellipse(0, s*1.0, s*1.3, s*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(-s*1.5, s*0.3, s*0.5, s*0.4);
                // 炮弹装饰（改为小方块而不是圆点）
                ctx.fillStyle = '#FF6347';
                for(let i=0; i<3; i++) {
                    const yOffset = Math.sin(frameCount*0.3+i)*s*0.1;
                    ctx.fillRect(-s*(1.55+i*0.2), s*0.4 + yOffset, s*0.12, s*0.12);
                }
                break;

            case 'rocket':
                ctx.fillStyle = '#C0C0C0';
                ctx.beginPath();
                ctx.moveTo(0, -s*1.5);
                ctx.quadraticCurveTo(s*0.6, -s*0.5, s*0.5, s*0.5);
                ctx.lineTo(-s*0.5, s*0.5);
                ctx.quadraticCurveTo(-s*0.6, -s*0.5, 0, -s*1.5);
                ctx.fill();
                ctx.fillStyle = '#FF4500';
                for(let i=0; i<4; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-s*0.3 + i*s*0.15, s*0.5);
                    ctx.lineTo(-s*0.2 + i*s*0.15, s*(1.2 + Math.sin(frameCount*0.5+i)*0.3));
                    ctx.lineTo(-s*0.1 + i*s*0.15, s*0.5);
                    ctx.fill();
                }
                break;

            case 'ufo':
                ctx.fillStyle = '#C0C0C0';
                ctx.beginPath();
                ctx.ellipse(0, s*0.3, s*1.2, s*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#00CED1';
                ctx.beginPath();
                ctx.ellipse(0, s*0.1, s*0.6, s*0.25, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = `rgba(0,206,209,${0.3 + Math.sin(frameCount*0.1)*0.2})`;
                ctx.fillRect(-s*1.5, s*0.8, s*3, s*0.1);
                break;

            case 'car':
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.moveTo(-s*1.2, s*0.8);
                ctx.lineTo(-s*0.8, s*0.2);
                ctx.lineTo(s*0.4, s*0.2);
                ctx.lineTo(s*1.0, s*0.8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(-s*0.7, s*0.9, s*0.25, 0, Math.PI*2);
                ctx.arc(s*0.6, s*0.9, s*0.25, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#87CEEB';
                ctx.beginPath();
                ctx.moveTo(-s*0.5, s*0.25);
                ctx.lineTo(-s*0.2, s*0.25);
                ctx.lineTo(s*0.1, s*0.5);
                ctx.lineTo(-s*0.6, s*0.5);
                ctx.closePath();
                ctx.fill();
                break;

            case 'skateboard': // 滑板
                ctx.fillStyle = '#FF6347';
                ctx.beginPath();
                ctx.ellipse(0, s*1.2, s*1.0, s*0.15, 0, 0, Math.PI*2);
                ctx.fill();
                // 轮子
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(-s*0.6, s*1.35, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.6, s*1.35, s*0.12, 0, Math.PI*2);
                ctx.fill();
                // 滑板图案
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, s*1.2, s*0.15, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'mech': // 机甲
                // 机甲身体
                ctx.fillStyle = '#4A5568';
                ctx.fillRect(-s*0.9, s*0.3, s*1.8, s*0.9);
                // 机甲关节
                ctx.fillStyle = '#718096';
                ctx.fillRect(-s*1.0, s*0.5, s*0.3, s*0.4);
                ctx.fillRect(s*0.7, s*0.5, s*0.3, s*0.4);
                // 机甲核心
                ctx.fillStyle = '#00BFFF';
                ctx.beginPath();
                ctx.arc(0, s*0.6, s*0.2, 0, Math.PI*2);
                ctx.fill();
                // 机甲腿
                ctx.fillStyle = '#2D3748';
                ctx.fillRect(-s*0.5, s*1.1, s*0.3, s*0.5);
                ctx.fillRect(s*0.2, s*1.1, s*0.3, s*0.5);
                break;

            case 'dragon': // 飞龙
                // 龙身
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.ellipse(0, s*0.6, s*1.0, s*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                // 龙鳞
                ctx.fillStyle = '#32CD32';
                for(let i = -0.6; i <= 0.6; i += 0.3) {
                    ctx.beginPath();
                    ctx.arc(i*s, s*0.5, s*0.1, 0, Math.PI*2);
                    ctx.fill();
                }
                // 翅膀
                ctx.fillStyle = '#90EE90';
                ctx.beginPath();
                ctx.moveTo(-s*0.8, s*0.3);
                ctx.lineTo(-s*1.5, -s*0.3 + Math.sin(frameCount*0.2)*s*0.1);
                ctx.lineTo(-s*0.5, s*0.4);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(s*0.8, s*0.3);
                ctx.lineTo(s*1.5, -s*0.3 + Math.sin(frameCount*0.2)*s*0.1);
                ctx.lineTo(s*0.5, s*0.4);
                ctx.fill();
                break;

            case 'cloud': // 筋斗云
                ctx.fillStyle = `rgba(255,255,255,${0.8 + Math.sin(frameCount*0.1)*0.1})`;
                // 云朵由多个圆组成
                ctx.beginPath();
                ctx.arc(-s*0.5, s*0.8, s*0.4, 0, Math.PI*2);
                ctx.arc(s*0.5, s*0.8, s*0.4, 0, Math.PI*2);
                ctx.arc(0, s*0.6, s*0.5, 0, Math.PI*2);
                ctx.fill();
                // 云朵光晕
                ctx.fillStyle = 'rgba(255,215,0,0.3)';
                ctx.beginPath();
                ctx.arc(0, s*0.7, s*0.6, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'train': // 小火车
                // 车头
                ctx.fillStyle = '#DC143C';
                ctx.fillRect(-s*0.8, s*0.3, s*1.6, s*0.8);
                // 烟囱
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(s*0.4, -s*0.2, s*0.2, s*0.5);
                // 烟雾（放在烟囱后面，更小更淡）
                ctx.fillStyle = `rgba(220,220,220,${0.3 + Math.sin(frameCount*0.2)*0.1})`;
                ctx.beginPath();
                ctx.arc(s*0.5, -s*0.25, s*0.08, 0, Math.PI*2);
                ctx.fill();
                // 轮子
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(-s*0.5, s*1.1, s*0.2, 0, Math.PI*2);
                ctx.arc(s*0.5, s*1.1, s*0.2, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'balloon': // 热气球
                // 气球
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.3, s*0.7, s*0.9, 0, 0, Math.PI*2);
                ctx.fill();
                // 条纹
                ctx.fillStyle = '#FFD93D';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.3, s*0.4, s*0.9, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.3, s*0.15, s*0.9, 0, 0, Math.PI*2);
                ctx.fill();
                // 吊篮
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(-s*0.3, s*0.5, s*0.6, s*0.4);
                // 绳索
                ctx.strokeStyle = '#666';
                ctx.lineWidth = s*0.02;
                ctx.beginPath();
                ctx.moveTo(-s*0.3, s*0.5);
                ctx.lineTo(-s*0.5, -s*0.8);
                ctx.moveTo(s*0.3, s*0.5);
                ctx.lineTo(s*0.5, -s*0.8);
                ctx.stroke();
                break;
        }
        ctx.restore();
    }

    drawEggCharacter(s, char) {
        // 马里奥和路易吉使用人形绘制
        if (char.id === 'mario' || char.id === 'luigi') {
            this.drawHumanCharacter(s, char);
            return;
        }

        // 耀西使用特殊恐龙绘制
        if (char.id === 'yoshi') {
            this.drawYoshiCharacter(s, char);
            return;
        }

        // 蛋仔派对风格的圆润蛋形身体
        const bodyGradient = ctx.createRadialGradient(-s*0.3, -s*0.4, 0, 0, 0, s*1.3);
        bodyGradient.addColorStop(0, char.secondaryColor || char.color);
        bodyGradient.addColorStop(0.5, char.color);
        bodyGradient.addColorStop(1, char.color);

        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        // 更圆润的蛋形
        ctx.ellipse(0, s*0.1, s*0.95, s*1.15, 0, 0, Math.PI*2);
        ctx.fill();

        // 高光（蛋仔派对标志性的亮面）
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.ellipse(-s*0.35, -s*0.5, s*0.25, s*0.35, -0.4, 0, Math.PI*2);
        ctx.fill();

        // 绘制装饰（耳朵/帽子等）
        this.drawHat(s, char.hat, char.color);

        // 绘制配饰
        this.drawAccessory(s, char.accessory);

        // 根据face类型绘制不同表情
        this.drawFace(s, char.face);

        // 小手（蛋仔风格的小圆手）
        ctx.fillStyle = char.color;
        ctx.beginPath();
        ctx.arc(-s*0.85, s*0.3, s*0.18, 0, Math.PI*2);
        ctx.arc(s*0.85, s*0.3, s*0.18, 0, Math.PI*2);
        ctx.fill();

        // 小脚（蛋仔风格的小脚）
        ctx.beginPath();
        ctx.ellipse(-s*0.35, s*1.2, s*0.22, s*0.12, 0, 0, Math.PI*2);
        ctx.ellipse(s*0.35, s*1.2, s*0.22, s*0.12, 0, 0, Math.PI*2);
        ctx.fill();
    }

    drawYoshiCharacter(s, char) {
        // 耀西 - 绿色恐龙风格绘制
        const bodyColor = '#32CD32';  // 亮绿色身体
        const bellyColor = '#90EE90'; // 浅绿色肚子
        const saddleColor = '#DC143C'; // 红色鞍
        const saddleOutline = '#8B0000'; // 深红色鞍边

        // ===== 尾巴 =====
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.ellipse(-s*0.9, s*0.3, s*0.3, s*0.15, -0.3, 0, Math.PI*2);
        ctx.fill();
        // 尾巴尖刺
        ctx.fillStyle = '#228B22';
        ctx.beginPath();
        ctx.moveTo(-s*1.15, s*0.25);
        ctx.lineTo(-s*1.3, s*0.15);
        ctx.lineTo(-s*1.25, s*0.35);
        ctx.fill();

        // ===== 身体 =====
        // 主体（圆润的蛋形）
        const bodyGradient = ctx.createRadialGradient(-s*0.2, -s*0.3, 0, 0, s*0.2, s*1.1);
        bodyGradient.addColorStop(0, bellyColor);
        bodyGradient.addColorStop(0.6, bodyColor);
        bodyGradient.addColorStop(1, '#228B22');

        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.ellipse(0, s*0.2, s*0.9, s*1.0, 0, 0, Math.PI*2);
        ctx.fill();

        // 绿色肚子区域（和身体同色，略浅）
        const bellyGradient = ctx.createRadialGradient(-s*0.1, s*0.1, 0, 0, s*0.3, s*0.6);
        bellyGradient.addColorStop(0, '#90EE90');  // 浅绿
        bellyGradient.addColorStop(0.6, '#32CD32'); // 中绿
        bellyGradient.addColorStop(1, '#228B22');   // 深绿
        ctx.fillStyle = bellyGradient;
        ctx.beginPath();
        ctx.ellipse(0, s*0.3, s*0.5, s*0.6, 0, 0, Math.PI*2);
        ctx.fill();
        // 肚子边框
        ctx.strokeStyle = '#228B22';
        ctx.lineWidth = 2;
        ctx.stroke();

        // ===== 红色鞍 =====
        ctx.fillStyle = saddleColor;
        ctx.beginPath();
        ctx.ellipse(0, -s*0.1, s*0.55, s*0.4, 0, 0, Math.PI*2);
        ctx.fill();
        // 鞍的边框
        ctx.strokeStyle = saddleOutline;
        ctx.lineWidth = 3;
        ctx.stroke();
        // 鞍的纹理（三个圆形突起）
        ctx.fillStyle = '#FF6347';
        ctx.beginPath();
        ctx.arc(-s*0.3, -s*0.15, s*0.12, 0, Math.PI*2);
        ctx.arc(0, -s*0.25, s*0.12, 0, Math.PI*2);
        ctx.arc(s*0.3, -s*0.15, s*0.12, 0, Math.PI*2);
        ctx.fill();

        // ===== 脖子 =====
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.ellipse(s*0.4, -s*0.6, s*0.35, s*0.5, -0.3, 0, Math.PI*2);
        ctx.fill();

        // ===== 头部 =====
        // 头主体（圆形）
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.arc(s*0.6, -s*1.0, s*0.55, 0, Math.PI*2);
        ctx.fill();

        // 白色下巴
        ctx.fillStyle = '#F0FFF0';
        ctx.beginPath();
        ctx.ellipse(s*0.65, -s*0.75, s*0.35, s*0.25, 0.2, 0, Math.PI*2);
        ctx.fill();

        // ===== 眼睛 =====
        // 眼白（大而圆）
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(s*0.45, -s*1.15, s*0.22, 0, Math.PI*2);
        ctx.arc(s*0.75, -s*1.15, s*0.22, 0, Math.PI*2);
        ctx.fill();

        // 黑色瞳孔（看向玩家移动方向）
        ctx.fillStyle = 'black';
        const lookDir = this.vx >= 0 ? 1 : -1;
        ctx.beginPath();
        ctx.arc(s*0.45 + lookDir*s*0.05, -s*1.15, s*0.1, 0, Math.PI*2);
        ctx.arc(s*0.75 + lookDir*s*0.05, -s*1.15, s*0.1, 0, Math.PI*2);
        ctx.fill();

        // 眼睛高光
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(s*0.42 + lookDir*s*0.05, -s*1.2, s*0.04, 0, Math.PI*2);
        ctx.arc(s*0.72 + lookDir*s*0.05, -s*1.2, s*0.04, 0, Math.PI*2);
        ctx.fill();

        // ===== 鼻子 =====
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.ellipse(s*1.0, -s*0.95, s*0.25, s*0.2, 0.3, 0, Math.PI*2);
        ctx.fill();

        // 鼻孔
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.arc(s*1.05, -s*0.98, s*0.04, 0, Math.PI*2);
        ctx.arc(s*1.12, -s*0.95, s*0.04, 0, Math.PI*2);
        ctx.fill();

        // ===== 舌头 =====
        if (this.yoshiTongueOut && this.yoshiTongueLength > 0) {
            // 舌头伸出状态
            const tongueDir = this.yoshiFacingRight ? 1 : -1;
            const startX = s * 0.9;
            const startY = -s * 0.85;
            const endX = startX + tongueDir * this.yoshiTongueLength * (s / 30);
            const endY = startY;

            // 舌头主体（粉色长条）
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.ellipse((startX + endX) / 2, startY, Math.abs(endX - startX) / 2, s * 0.12, 0, 0, Math.PI * 2);
            ctx.fill();

            // 舌头尖端（圆形）
            ctx.fillStyle = '#FF1493';
            ctx.beginPath();
            ctx.arc(endX, endY, s * 0.15, 0, Math.PI * 2);
            ctx.fill();

            // 舌头上的粘液光泽
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.ellipse((startX + endX) / 2, startY - s * 0.04, Math.abs(endX - startX) / 2.5, s * 0.04, 0, 0, Math.PI * 2);
            ctx.fill();

            // 如果嘴里有敌人，在舌尖绘制一个蛋壳包裹的轮廓
            if (this.yoshiMouthEnemy) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.arc(endX, endY, s * 0.18, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        } else {
            // 舌头收在嘴里（默认状态）
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.ellipse(s*0.95, -s*0.82, s*0.15, s*0.08, 0.3, 0, Math.PI*2);
            ctx.fill();
        }

        // ===== 背刺 =====
        ctx.fillStyle = '#228B22';
        for (let i = 0; i < 3; i++) {
            const spikeX = -s*0.3 + i * s*0.3;
            ctx.beginPath();
            ctx.moveTo(spikeX, -s*0.5);
            ctx.lineTo(spikeX - s*0.1, -s*0.75);
            ctx.lineTo(spikeX + s*0.1, -s*0.75);
            ctx.closePath();
            ctx.fill();
        }

        // ===== 大脚 =====
 ctx.fillStyle = bodyColor;
        // 左脚
        ctx.beginPath();
        ctx.ellipse(-s*0.4, s*1.15, s*0.3, s*0.18, 0, 0, Math.PI*2);
        ctx.fill();
        // 左脚趾甲
        ctx.fillStyle = '#F0FFF0';
        ctx.beginPath();
        ctx.arc(-s*0.55, s*1.1, s*0.06, 0, Math.PI*2);
        ctx.arc(-s*0.45, s*1.05, s*0.06, 0, Math.PI*2);
        ctx.arc(-s*0.35, s*1.05, s*0.06, 0, Math.PI*2);
        ctx.fill();

        // 右脚
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.ellipse(s*0.4, s*1.15, s*0.3, s*0.18, 0, 0, Math.PI*2);
        ctx.fill();
        // 右脚趾甲
        ctx.fillStyle = '#F0FFF0';
        ctx.beginPath();
        ctx.arc(s*0.25, s*1.1, s*0.06, 0, Math.PI*2);
        ctx.arc(s*0.35, s*1.05, s*0.06, 0, Math.PI*2);
        ctx.arc(s*0.45, s*1.05, s*0.06, 0, Math.PI*2);
        ctx.fill();

        // ===== 小手 =====
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.ellipse(-s*0.5, s*0.1, s*0.15, s*0.1, -0.5, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(s*0.2, s*0.0, s*0.15, s*0.1, 0.5, 0, Math.PI*2);
        ctx.fill();
    }

    drawHumanCharacter(s, char) {
        // 人形角色绘制（马里奥/路易吉风格）
        const isMario = char.id === 'mario';
        const shirtColor = isMario ? '#FF0000' : '#00AA00';  // 红色/绿色上衣
        const overallsColor = '#0066CC';  // 蓝色背带裤
        const buttonColor = '#FFD700';    // 金色纽扣

        // ===== 头部 =====
        // 脸（肤色）
        ctx.fillStyle = '#FFCC99';
        ctx.beginPath();
        ctx.ellipse(0, -s*0.45, s*0.5, s*0.45, 0, 0, Math.PI*2);
        ctx.fill();

        // 耳朵
        ctx.fillStyle = '#FFCC99';
        ctx.beginPath();
        ctx.ellipse(-s*0.48, -s*0.4, s*0.12, s*0.15, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(s*0.48, -s*0.4, s*0.12, s*0.15, 0, 0, Math.PI*2);
        ctx.fill();

        // 眼睛
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.ellipse(-s*0.18, -s*0.55, s*0.12, s*0.15, 0, 0, Math.PI*2);
        ctx.ellipse(s*0.18, -s*0.55, s*0.12, s*0.15, 0, 0, Math.PI*2);
        ctx.fill();

        // 蓝色眼珠
        ctx.fillStyle = '#4169E1';
        ctx.beginPath();
        ctx.arc(-s*0.15, -s*0.52, s*0.07, 0, Math.PI*2);
        ctx.arc(s*0.21, -s*0.52, s*0.07, 0, Math.PI*2);
        ctx.fill();

        // 黑色瞳孔
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.arc(-s*0.15, -s*0.52, s*0.035, 0, Math.PI*2);
        ctx.arc(s*0.21, -s*0.52, s*0.035, 0, Math.PI*2);
        ctx.fill();

        // 眼睛高光
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(-s*0.13, -s*0.55, s*0.02, 0, Math.PI*2);
        ctx.arc(s*0.23, -s*0.55, s*0.02, 0, Math.PI*2);
        ctx.fill();

        // 大鼻子（马里奥标志性）
        ctx.fillStyle = '#FFB088';
        ctx.beginPath();
        ctx.ellipse(0, -s*0.35, s*0.18, s*0.14, 0, 0, Math.PI*2);
        ctx.fill();

        // 大胡子
        ctx.fillStyle = '#4a3020';
        ctx.beginPath();
        ctx.ellipse(0, -s*0.18, s*0.35, s*0.12, 0, 0, Math.PI*2);
        ctx.fill();

        // 胡子中间的缝
        ctx.fillStyle = '#FFCC99';
        ctx.beginPath();
        ctx.ellipse(0, -s*0.22, s*0.06, s*0.08, 0, 0, Math.PI*2);
        ctx.fill();

        // 帽子
        this.drawHat(s, char.hat, char.color);

        // ===== 身体 =====
        // 红色/绿色上衣（躯干）
        ctx.fillStyle = shirtColor;
        ctx.beginPath();
        ctx.ellipse(0, s*0.15, s*0.55, s*0.5, 0, 0, Math.PI*2);
        ctx.fill();

        // 蓝色背带裤（下半部分）
        ctx.fillStyle = overallsColor;
        ctx.beginPath();
        ctx.ellipse(0, s*0.6, s*0.5, s*0.45, 0, 0, Math.PI*2);
        ctx.fill();

        // 背带裤的肚子部分（圆形）
        ctx.fillStyle = overallsColor;
        ctx.beginPath();
        ctx.arc(0, s*0.35, s*0.42, 0, Math.PI*2);
        ctx.fill();

        // 背带（两条带子）
        ctx.fillStyle = overallsColor;
        // 左背带
        ctx.fillRect(-s*0.35, s*0.05, s*0.15, s*0.35);
        // 右背带
        ctx.fillRect(s*0.2, s*0.05, s*0.15, s*0.35);

        // 背带纽扣（金色）
        ctx.fillStyle = buttonColor;
        ctx.beginPath();
        ctx.arc(-s*0.28, s*0.12, s*0.06, 0, Math.PI*2);
        ctx.arc(s*0.28, s*0.12, s*0.06, 0, Math.PI*2);
        ctx.fill();

        // ===== 手臂 =====
        // 左臂（红色/绿色袖子）
        ctx.fillStyle = shirtColor;
        ctx.beginPath();
        ctx.ellipse(-s*0.7, s*0.1, s*0.2, s*0.35, -0.3, 0, Math.PI*2);
        ctx.fill();
        // 左手（白色手套）
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(-s*0.9, s*0.25, s*0.18, 0, Math.PI*2);
        ctx.fill();

        // 右臂
        ctx.fillStyle = shirtColor;
        ctx.beginPath();
        ctx.ellipse(s*0.7, s*0.1, s*0.2, s*0.35, 0.3, 0, Math.PI*2);
        ctx.fill();
        // 右手（白色手套）
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(s*0.9, s*0.25, s*0.18, 0, Math.PI*2);
        ctx.fill();

        // ===== 腿部 =====
        // 左腿（蓝色裤子）
        ctx.fillStyle = overallsColor;
        ctx.beginPath();
        ctx.ellipse(-s*0.28, s*1.05, s*0.22, s*0.4, 0, 0, Math.PI*2);
        ctx.fill();
        // 棕色鞋子
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.ellipse(-s*0.28, s*1.45, s*0.28, s*0.15, 0, 0, Math.PI*2);
        ctx.fill();

        // 右腿
        ctx.fillStyle = overallsColor;
        ctx.beginPath();
        ctx.ellipse(s*0.28, s*1.05, s*0.22, s*0.4, 0, 0, Math.PI*2);
        ctx.fill();
        // 棕色鞋子
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.ellipse(s*0.28, s*1.45, s*0.28, s*0.15, 0, 0, Math.PI*2);
        ctx.fill();
    }

    drawFace(s, faceType) {
        switch(faceType) {
            case 'cute': // 可爱表情 - 仔仔熊
                // 大眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(-s*0.3, -s*0.15, s*0.22, s*0.28, 0, 0, Math.PI*2);
                ctx.ellipse(s*0.3, -s*0.15, s*0.22, s*0.28, 0, 0, Math.PI*2);
                ctx.fill();

                // 黑色眼珠
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-s*0.25, -s*0.1, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*0.1, s*0.12, 0, Math.PI*2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-s*0.22, -s*0.15, s*0.04, 0, Math.PI*2);
                ctx.arc(s*0.38, -s*0.15, s*0.04, 0, Math.PI*2);
                ctx.fill();

                // 微笑
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.05;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(0, s*0.1, s*0.15, 0.3, Math.PI-0.3);
                ctx.stroke();
                break;

            case 'happy': // 开心表情 - JK妹
                // 弯弯的笑眼
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.06;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(-s*0.3, -s*0.1, s*0.15, 0.8, Math.PI-0.8);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(s*0.3, -s*0.1, s*0.15, 0.8, Math.PI-0.8);
                ctx.stroke();

                // 腮红
                ctx.fillStyle = 'rgba(255,150,150,0.6)';
                ctx.beginPath();
                ctx.arc(-s*0.5, s*0.05, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.5, s*0.05, s*0.12, 0, Math.PI*2);
                ctx.fill();

                // 大笑的嘴
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(0, s*0.2, s*0.12, s*0.18, 0, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'cheeky': // 俏皮表情 - 仓鼠
                // 圆眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-s*0.25, -s*0.1, s*0.18, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*0.1, s*0.18, 0, Math.PI*2);
                ctx.fill();

                ctx.fillStyle = '#1a1a1a';

                ctx.beginPath();

                ctx.beginPath();

            case 'confident': // 自信表情 - 浪哥

                // 深色瞳孔

                // 眼睛高光

                ctx.beginPath();
                ctx.arc(-s*0.25, -s*0.18, s*0.04, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*0.18, s*0.04, 0, Math.PI*2);
                ctx.fill();

                // 自信微笑
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.05;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(0, s*0.1, s*0.18, 0.2, Math.PI-0.2);

                // 眉毛
                ctx.beginPath();
                ctx.moveTo(-s*0.45, -s*0.4);
                ctx.lineTo(-s*0.15, -s*0.38);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(s*0.15, -s*0.38);

            case 'yoshi': // 耀西表情（恐龙风格）

                // 黑色大眼睛珠

                // 恐龙鼻子

                ctx.ellipse(0, s*0.08, s*0.2, s*0.12, 0, 0, Math.PI*2);
                ctx.fill();
                // 两个小鼻孔
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-s*0.08, s*0.08, s*0.04, 0, Math.PI*2);

                // 开心嘴巴

                ctx.arc(0, s*0.2, s*0.18, 0.2, Math.PI-0.2);

            default:

    drawAccessory(s, accessory) {

                ctx.lineWidth = s*0.03;
                ctx.beginPath();
                ctx.arc(-s*0.3, -s*0.1, s*0.2, 0, Math.PI*2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(s*0.3, -s*0.1, s*0.2, 0, Math.PI*2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-s*0.1, -s*0.1);
                ctx.lineTo(s*0.1, -s*0.1);

            case 'sunglasses': // 墨镜

                ctx.arc(s*0.25, -s*0.12, s*0.06, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'headphones': // 耳机

                ctx.beginPath();
                ctx.moveTo(s*0.7, s*0.2);

                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(s*0.55, s*0.35);
                ctx.lineTo(s*0.7, s*0.25);
                ctx.lineTo(s*0.85, s*0.35);
                ctx.stroke();

            case 'microphone': // 浪哥的麦克风
                // 话筒杆
                ctx.strokeStyle = '#333';

                ctx.beginPath();
                ctx.moveTo(s*0.7, s*0.25);

                // 网罩纹理

                ctx.lineWidth = s*0.02;
                ctx.beginPath();
                ctx.arc(s*0.7, s*0.2, s*0.06, 0, Math.PI*2);

    drawXuanBlueThunder(s) {
        // 炫蓝雷霆王 - 超真实机甲战士（炫卡斗士风格）

        // ===== 头部 - 机甲头盔 =====
        // 头盔主体 - 金属质感渐变
        const helmetGrad = ctx.createLinearGradient(-s*0.5, -s*1.2, s*0.5, -s*0.3);
        helmetGrad.addColorStop(0, '#4A90E2');
        helmetGrad.addColorStop(0.3, '#2E5C8A');
        helmetGrad.addColorStop(0.7, '#1E3A5F');
        helmetGrad.addColorStop(1, '#0F1F33');

        ctx.fillStyle = helmetGrad;
        ctx.beginPath();
        ctx.moveTo(-s*0.5, -s*0.5);
        ctx.lineTo(-s*0.6, -s*1.1);
        ctx.quadraticCurveTo(0, -s*1.4, s*0.6, -s*1.1);
        ctx.lineTo(s*0.5, -s*0.5);
        ctx.closePath();
        ctx.fill();

        // 头盔边缘装甲
        ctx.strokeStyle = '#00D4FF';
        ctx.lineWidth = s*0.04;
        ctx.beginPath();
        ctx.moveTo(-s*0.55, -s*0.55);
        ctx.lineTo(-s*0.65, -s*1.15);
        ctx.quadraticCurveTo(0, -s*1.5, s*0.65, -s*1.15);
        ctx.lineTo(s*0.55, -s*0.55);
        ctx.stroke();

        // 中央金色装饰条
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(-s*0.08, -s*1.35, s*0.16, s*0.7);
        // 装饰条上的能量宝石
        ctx.fillStyle = '#00FFFF';
        ctx.shadowColor = '#00FFFF';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(0, -s*1.0, s*0.08, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 天线
        ctx.strokeStyle = '#666';
        ctx.lineWidth = s*0.03;
        ctx.beginPath();
        ctx.moveTo(-s*0.4, -s*1.2);
        ctx.lineTo(-s*0.5, -s*1.6);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s*0.4, -s*1.2);
        ctx.lineTo(s*0.5, -s*1.6);
        ctx.stroke();
        // 天线顶端红灯
        ctx.fillStyle = '#FF0000';
        ctx.shadowColor = '#FF0000';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(-s*0.5, -s*1.6, s*0.06, 0, Math.PI*2);
        ctx.arc(s*0.5, -s*1.6, s*0.06, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 发光眼罩/护目镜
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(-s*0.45, -s*0.85, s*0.9, s*0.25);
        // 红色发光眼睛
        ctx.fillStyle = '#FF0000';
        ctx.shadowColor = '#FF0000';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.ellipse(-s*0.25, -s*0.72, s*0.12, s*0.08, 0, 0, Math.PI*2);
        ctx.ellipse(s*0.25, -s*0.72, s*0.12, s*0.08, 0, 0, Math.PI*2);
        ctx.fill();
        // 眼睛高光
        ctx.fillStyle = '#FFFFFF';
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(-s*0.22, -s*0.74, s*0.03, 0, Math.PI*2);
        ctx.arc(s*0.28, -s*0.74, s*0.03, 0, Math.PI*2);
        ctx.fill();

        // 嘴部呼吸格栅
        ctx.fillStyle = '#2C3E50';
        ctx.fillRect(-s*0.25, -s*0.5, s*0.5, s*0.15);
        ctx.fillStyle = '#34495E';
        for(let i = -0.15; i <= 0.15; i += 0.1) {
            ctx.fillRect(i*s, -s*0.48, s*0.02, s*0.11);
        }

        // ===== 身体 - 分层装甲 =====
        // 胸部主装甲
        const chestGrad = ctx.createLinearGradient(0, -s*0.4, 0, s*0.6);
        chestGrad.addColorStop(0, '#4A90E2');
        chestGrad.addColorStop(0.5, '#2E5C8A');
        chestGrad.addColorStop(1, '#1E3A5F');

        ctx.fillStyle = chestGrad;
        ctx.beginPath();
        ctx.moveTo(-s*0.6, -s*0.4);
        ctx.lineTo(-s*0.7, s*0.5);
        ctx.lineTo(0, s*0.7);
        ctx.lineTo(s*0.7, s*0.5);
        ctx.lineTo(s*0.6, -s*0.4);
        ctx.closePath();
        ctx.fill();

        // 胸部装甲边缘发光
        ctx.strokeStyle = '#00D4FF';
        ctx.lineWidth = s*0.03;
        ctx.stroke();

        // 中央六边形能量核心
        ctx.fillStyle = '#0a0a0a';
        ctx.beginPath();
        ctx.moveTo(0, -s*0.15);
        ctx.lineTo(s*0.15, -s*0.05);
        ctx.lineTo(s*0.15, s*0.15);
        ctx.lineTo(0, s*0.25);
        ctx.lineTo(-s*0.15, s*0.15);
        ctx.lineTo(-s*0.15, -s*0.05);
        ctx.closePath();
        ctx.fill();

        // 核心内部发光
        const corePulse = 0.7 + Math.sin(frameCount * 0.2) * 0.3;
        ctx.fillStyle = `rgba(0, 255, 255, ${corePulse})`;
        ctx.shadowColor = '#00FFFF';
        ctx.shadowBlur = 25;
        ctx.beginPath();
        ctx.arc(0, s*0.05, s*0.1 * corePulse, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 胸部细节线条
        ctx.strokeStyle = '#5DADE2';
        ctx.lineWidth = s*0.02;
        ctx.beginPath();
        ctx.moveTo(-s*0.4, -s*0.2);
        ctx.lineTo(-s*0.4, s*0.3);
        ctx.moveTo(s*0.4, -s*0.2);
        ctx.lineTo(s*0.4, s*0.3);
        ctx.stroke();

        // ===== 肩部装甲 =====
        // 左肩甲
        const shoulderGrad = ctx.createLinearGradient(-s*1.0, -s*0.3, -s*0.6, s*0.3);
        shoulderGrad.addColorStop(0, '#5DADE2');
        shoulderGrad.addColorStop(0.5, '#2E5C8A');
        shoulderGrad.addColorStop(1, '#1E3A5F');

        ctx.fillStyle = shoulderGrad;
        ctx.beginPath();
        ctx.moveTo(-s*0.6, -s*0.35);
        ctx.lineTo(-s*1.1, -s*0.2);
        ctx.lineTo(-s*1.2, s*0.3);
        ctx.lineTo(-s*0.65, s*0.4);
        ctx.closePath();
        ctx.fill();

        // 右肩甲
        const shoulderGradR = ctx.createLinearGradient(s*0.6, -s*0.3, s*1.0, s*0.3);
        shoulderGradR.addColorStop(0, '#1E3A5F');
        shoulderGradR.addColorStop(0.5, '#2E5C8A');
        shoulderGradR.addColorStop(1, '#5DADE2');

        ctx.fillStyle = shoulderGradR;
        ctx.beginPath();
        ctx.moveTo(s*0.6, -s*0.35);
        ctx.lineTo(s*1.1, -s*0.2);
        ctx.lineTo(s*1.2, s*0.3);
        ctx.lineTo(s*0.65, s*0.4);
        ctx.closePath();
        ctx.fill();

        // 肩甲发光边缘
        ctx.strokeStyle = '#00D4FF';
        ctx.lineWidth = s*0.03;
        ctx.beginPath();
        ctx.moveTo(-s*0.6, -s*0.35);
        ctx.lineTo(-s*1.1, -s*0.2);
        ctx.lineTo(-s*1.2, s*0.3);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s*0.6, -s*0.35);
        ctx.lineTo(s*1.1, -s*0.2);
        ctx.lineTo(s*1.2, s*0.3);
        ctx.stroke();

        // 肩甲上的细节
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(-s*0.9, s*0.1, s*0.06, 0, Math.PI*2);
        ctx.arc(s*0.9, s*0.1, s*0.06, 0, Math.PI*2);
        ctx.fill();

        // ===== 机械手臂 =====
        // 左臂上段
        ctx.fillStyle = '#2E5C8A';
        ctx.fillRect(-s*1.15, s*0.25, s*0.35, s*0.5);
        // 左关节
        ctx.fillStyle = '#5D6D7E';
        ctx.beginPath();
        ctx.arc(-s*0.97, s*0.75, s*0.15, 0, Math.PI*2);
        ctx.fill();
        // 左臂下段
        ctx.fillStyle = '#34495E';
        ctx.fillRect(-s*1.1, s*0.75, s*0.3, s*0.4);
        // 左手拳
        ctx.fillStyle = '#1E3A5F';
        ctx.beginPath();
        ctx.arc(-s*0.95, s*1.15, s*0.18, 0, Math.PI*2);
        ctx.fill();

        // 右臂上段
        ctx.fillStyle = '#2E5C8A';
        ctx.fillRect(s*0.8, s*0.25, s*0.35, s*0.5);
        // 右关节
        ctx.fillStyle = '#5D6D7E';
        ctx.beginPath();
        ctx.arc(s*0.97, s*0.75, s*0.15, 0, Math.PI*2);
        ctx.fill();
        // 右臂下段
        ctx.fillStyle = '#34495E';
        ctx.fillRect(s*0.8, s*0.75, s*0.3, s*0.4);
        // 右手拳
        ctx.fillStyle = '#1E3A5F';
        ctx.beginPath();
        ctx.arc(s*0.95, s*1.15, s*0.18, 0, Math.PI*2);
        ctx.fill();

        // ===== 腰部和腿部 =====
        // 腰部装甲
        ctx.fillStyle = '#2C3E50';
        ctx.fillRect(-s*0.4, s*0.65, s*0.8, s*0.25);
        // 腰部发光条
        ctx.fillStyle = '#00FFFF';
        ctx.fillRect(-s*0.3, s*0.72, s*0.6, s*0.08);

        // 左大腿
        ctx.fillStyle = '#2E5C8A';
        ctx.fillRect(-s*0.5, s*0.9, s*0.35, s*0.45);
        // 左膝盖关节
        ctx.fillStyle = '#5D6D7E';
        ctx.beginPath();
        ctx.arc(-s*0.32, s*1.35, s*0.12, 0, Math.PI*2);
        ctx.fill();
        // 左小腿
        ctx.fillStyle = '#34495E';
        ctx.fillRect(-s*0.45, s*1.35, s*0.28, s*0.4);
        // 左脚
        ctx.fillStyle = '#1E3A5F';
        ctx.beginPath();
        ctx.moveTo(-s*0.55, s*1.75);
        ctx.lineTo(-s*0.15, s*1.75);
        ctx.lineTo(-s*0.1, s*1.9);
        ctx.lineTo(-s*0.6, s*1.9);
        ctx.closePath();
        ctx.fill();

        // 右大腿
        ctx.fillStyle = '#2E5C8A';
        ctx.fillRect(s*0.15, s*0.9, s*0.35, s*0.45);
        // 右膝盖关节
        ctx.fillStyle = '#5D6D7E';
        ctx.beginPath();
        ctx.arc(s*0.32, s*1.35, s*0.12, 0, Math.PI*2);
        ctx.fill();
        // 右小腿
        ctx.fillStyle = '#34495E';
        ctx.fillRect(s*0.17, s*1.35, s*0.28, s*0.4);
        // 右脚
        ctx.fillStyle = '#1E3A5F';
        ctx.beginPath();
        ctx.moveTo(s*0.15, s*1.75);
        ctx.lineTo(s*0.55, s*1.75);
        ctx.lineTo(s*0.6, s*1.9);
        ctx.lineTo(s*0.1, s*1.9);
        ctx.closePath();
        ctx.fill();

        // ===== 背部推进器 =====
        // 推进器主体
        ctx.fillStyle = '#34495E';
        ctx.beginPath();
        ctx.ellipse(-s*0.25, s*1.2, s*0.15, s*0.25, -0.3, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(s*0.25, s*1.2, s*0.15, s*0.25, 0.3, 0, Math.PI*2);
        ctx.fill();

        // 推进器火焰效果
        const flameIntensity = 0.6 + Math.sin(frameCount * 0.3) * 0.4;
        ctx.fillStyle = `rgba(0, 200, 255, ${flameIntensity})`;
        ctx.shadowColor = '#00D4FF';
        ctx.shadowBlur = 20;

        // 左火焰
        ctx.beginPath();
        ctx.moveTo(-s*0.35, s*1.4);
        ctx.lineTo(-s*0.5, s*1.8 + Math.sin(frameCount*0.5)*s*0.1);
        ctx.lineTo(-s*0.15, s*1.4);
        ctx.fill();

        // 右火焰
        ctx.beginPath();
        ctx.moveTo(s*0.15, s*1.4);
        ctx.lineTo(s*0.5, s*1.8 + Math.sin(frameCount*0.5 + 1)*s*0.1);
        ctx.lineTo(s*0.35, s*1.4);
        ctx.fill();

        ctx.shadowBlur = 0;

        // ===== 能量光环 =====
        ctx.strokeStyle = `rgba(0, 212, 255, ${0.3 + Math.sin(frameCount * 0.1) * 0.2})`;
        ctx.lineWidth = s*0.02;
        ctx.beginPath();
        ctx.arc(0, s*0.2, s*1.3, 0, Math.PI*2);
        ctx.stroke();

        // 变身剩余时间指示器
        if (this.transformTimer > 0) {
            ctx.fillStyle = 'rgba(0, 212, 255, 0.9)';
            ctx.font = `bold ${s*0.35}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText(Math.ceil(this.transformTimer / 60), 0, s*2.1);
        }
    }

    drawHat(s, hatType, color) {
        switch(hatType) {
            case 'bear_ears': // 熊耳朵
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(-s*0.5, -s*0.95, s*0.25, 0, Math.PI*2);
                ctx.arc(s*0.5, -s*0.95, s*0.25, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FFCC99';
                ctx.beginPath();
                ctx.arc(-s*0.5, -s*0.95, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.5, -s*0.95, s*0.12, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'hamster_ears': // 仓鼠耳朵
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(-s*0.45, -s*0.9, s*0.18, s*0.25, -0.3, 0, Math.PI*2);
                ctx.ellipse(s*0.45, -s*0.9, s*0.18, s*0.25, 0.3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FFCC99';
                ctx.beginPath();
                ctx.ellipse(-s*0.45, -s*0.9, s*0.08, s*0.12, -0.3, 0, Math.PI*2);
                ctx.ellipse(s*0.45, -s*0.9, s*0.08, s*0.12, 0.3, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'panda_ears': // 熊猫耳朵
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-s*0.5, -s*0.95, s*0.22, 0, Math.PI*2);
                ctx.arc(s*0.5, -s*0.95, s*0.22, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'dino_spikes': // 恐龙背刺
                ctx.fillStyle = '#228B22';
                for (let i = -0.6; i <= 0.6; i += 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(i * s, -s*0.9);
                    ctx.lineTo((i + 0.15) * s, -s*1.2);
                    ctx.lineTo((i + 0.3) * s, -s*0.9);
                    ctx.fill();
                }
                break;

            case 'devil_horns': // 恶魔角
                ctx.fillStyle = '#8B0000';
                ctx.beginPath();
                ctx.moveTo(-s*0.5, -s*0.85);
                ctx.quadraticCurveTo(-s*0.7, -s*1.4, -s*0.3, -s*1.0);
                ctx.quadraticCurveTo(-s*0.4, -s*0.85, -s*0.3, -s*0.75);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(s*0.5, -s*0.85);
                ctx.quadraticCurveTo(s*0.7, -s*1.4, s*0.3, -s*1.0);
                ctx.quadraticCurveTo(s*0.4, -s*0.85, s*0.3, -s*0.75);
                ctx.fill();
                break;

            case 'bow_pink': // 粉色蝴蝶结
                ctx.fillStyle = '#FF69B4';
                ctx.beginPath();
                ctx.moveTo(0, -s*1.1);
                ctx.lineTo(-s*0.35, -s*1.3);
                ctx.quadraticCurveTo(-s*0.4, -s*1.0, -s*0.25, -s*0.9);
                ctx.quadraticCurveTo(-0.1, -s*1.0, 0, -s*1.1);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(0, -s*1.1);
                ctx.lineTo(s*0.35, -s*1.3);
                ctx.quadraticCurveTo(s*0.4, -s*1.0, s*0.25, -s*0.9);
                ctx.quadraticCurveTo(0.1, -s*1.0, 0, -s*1.1);
                ctx.fill();
                ctx.fillStyle = '#FF1493';
                ctx.beginPath();
                ctx.arc(0, -s*1.1, s*0.1, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'mohawk': // 莫西干发型
                ctx.fillStyle = '#FF1493';
                ctx.beginPath();
                ctx.moveTo(-s*0.15, -s*1.1);
                ctx.lineTo(0, -s*1.5);
                ctx.lineTo(s*0.15, -s*1.1);
                ctx.fill();
                break;

            case 'antenna': // 机器人天线
                ctx.strokeStyle = '#666';
                ctx.lineWidth = s*0.04;
                ctx.beginPath();
                ctx.moveTo(0, -s*1.1);
                ctx.lineTo(0, -s*1.4);
                ctx.stroke();
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.arc(0, -s*1.45, s*0.08, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'crown_gold': // 浪哥的金色皇冠
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(-s*0.55, -s*0.9);
                ctx.lineTo(-s*0.35, -s*1.4);
                ctx.lineTo(-s*0.15, -s*1.0);
                ctx.lineTo(0, -s*1.45);
                ctx.lineTo(s*0.15, -s*1.0);
                ctx.lineTo(s*0.35, -s*1.4);
                ctx.lineTo(s*0.55, -s*0.9);
                ctx.closePath();
                ctx.fill();
                // 皇冠上的宝石
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.arc(0, -s*1.2, s*0.08, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#00CED1';
                ctx.beginPath();
                ctx.arc(-s*0.35, -s*1.15, s*0.06, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*1.15, s*0.06, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'mario_cap': // 马里奥红色帽子
                // 帽子主体
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.ellipse(0, -s*1.0, s*0.7, s*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                // 帽檐
                ctx.fillStyle = '#CC0000';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.75, s*0.75, s*0.25, 0, 0, Math.PI*2);
                ctx.fill();
                // 帽子上的M标志
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(0, -s*1.0, s*0.2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FF0000';
                ctx.font = `bold ${s*0.3}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('M', 0, -s*0.9);
                break;

            case 'luigi_cap': // 路易吉绿色帽子
                ctx.fillStyle = '#00AA00';
                ctx.beginPath();
                ctx.ellipse(0, -s*1.0, s*0.7, s*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#008800';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.75, s*0.75, s*0.25, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(0, -s*1.0, s*0.2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#00AA00';
                ctx.font = `bold ${s*0.3}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('L', 0, -s*0.9);
                break;

            case 'yoshi_saddle': // 耀西鞍座
                // 红色鞍座
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.5, s*0.5, s*0.3, 0, 0, Math.PI*2);
                ctx.fill();
                // 鞍座边缘
                ctx.strokeStyle = '#CC0000';
                ctx.lineWidth = s*0.05;
                ctx.stroke();
                // 鞍座上的钉
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(-s*0.3, -s*0.5, s*0.06, 0, Math.PI*2);
                ctx.arc(s*0.3, -s*0.5, s*0.06, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'crown':
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(-s*0.5, -s*0.95);
                ctx.lineTo(-s*0.3, -s*1.4);
                ctx.lineTo(0, -s*1.1);
                ctx.lineTo(s*0.3, -s*1.4);
                ctx.lineTo(s*0.5, -s*0.95);
                ctx.closePath();
                ctx.fill();
                break;
            case 'cap':
                ctx.fillStyle = '#FF6600';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.9, s*0.6, s*0.25, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillRect(-s*0.2, -s*0.9, s*0.6, s*0.1);
                break;
        }
    }
}
