// ==================== 糖果/金币类 ====================
class Coin {
    constructor(x,y,type='COIN') { this.x=x; this.y=y; this.t=Math.random(); this.get=false; this.type=type; }
    draw() {
        if (this.get) return; this.t += 0.05;
        ctx.save(); ctx.translate(this.x-cam, this.y+Math.sin(this.t)*3);
        const item = ITEM_TYPES[this.type] || ITEM_TYPES.COIN;
        if (this.type === 'COIN' || this.type === 'DIAMOND') {
            ctx.fillStyle = this.type === 'DIAMOND' ? '#00CED1' : '#FFD700';
            ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
        } else {
            ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.fillText(item.emoji, 0, 5);
        }
        ctx.restore();
    }
}

// ==================== 问题方块类（支持多种难度）====================
class QBlock {
    constructor(x,y) {
        this.x=x; this.y=y; this.done=false;
        this.type = 'question'; // 'question' | 'item'
        this.q = null;
        this.itemType = null;
        this.itemSpawned = false;

        const rand = Math.random();
        // 互斥逻辑：要么计算题，要么道具
        // 50% 计算题, 50% 道具
        if (rand < 0.50) {
            // 计算题
            this.type = 'question';
            this.q = this.makeQByDifficulty();
        } else if (rand < 0.53) this.setItemType('ELECTRIC');    // 3% 电击弹
        else if (rand < 0.56) this.setItemType('SPREAD');       // 3% 散弹枪
        else if (rand < 0.59) this.setItemType('FLAME');        // 3% 火龙炮
        else if (rand < 0.62) this.setItemType('ICE');          // 3% 冰冻弹
        else if (rand < 0.65) this.setItemType('BUBBLE');       // 3% 水泡泡
        else if (rand < 0.68) this.setItemType('LASER');        // 3% 激光炮
        else if (rand < 0.71) this.setItemType('MISSILE');      // 3% 追踪导弹
        else if (rand < 0.74) this.setItemType('POISON');       // 3% 毒液弹
        else if (rand < 0.77) this.setItemType('RAINBOW');      // 3% 彩虹弹
        else if (rand < 0.84) this.setItemType('STAR');         // 7% 星星
        else if (rand < 0.91) this.setItemType('SUNFLOWER');    // 7% 向日葵
        else if (rand < 0.985) this.setItemType('COIN');        // 7.5% 金币
        else this.setItemType('DIAMOND');                       // 1.5% 钻石
    }

    setItemType(type) {
        this.type = 'item';
        this.itemType = type;
    }

    makeQByDifficulty() {
        const diff = selectedDifficulty?.id || 'normal';

        switch(diff) {
            case 'normal': // 10以内加减法
                return this.makeAddSubEasy();

            case 'hard': // 图形比大小
                return this.makeCompareGraphics();

            case 'extreme': // 20以内加减法
                return this.makeAddSubHard();

            case 'insane': // 乘法口诀
                return this.makeMultiply();

            default:
                return this.makeAddSubEasy();
        }
    }

    makeAddSubEasy() {
        const isAdd = Math.random() > 0.5;
        let text, ans;
        if (isAdd) {
            const a = Math.floor(Math.random() * 6) + 1;
            const b = Math.floor(Math.random() * (10 - a - 1)) + 1;
            text = `${a} + ${b} = ?`;
            ans = a + b;
        } else {
            const a = Math.floor(Math.random() * 6) + 4;
            const b = Math.floor(Math.random() * (a - 1)) + 1;
            text = `${a} - ${b} = ?`;
            ans = a - b;
        }
        return { text, ans, opts: this.makeOptions(ans, 0, 10), type: 'number' };
    }

    makeAddSubHard() {
        const isAdd = Math.random() > 0.5;
        let text, ans;
        if (isAdd) {
            const a = Math.floor(Math.random() * 11) + 5;
            const b = Math.floor(Math.random() * (20 - a - 1)) + 1;
            text = `${a} + ${b} = ?`;
            ans = a + b;
        } else {
            const a = Math.floor(Math.random() * 11) + 10;
            const b = Math.floor(Math.random() * (a - 1)) + 1;
            text = `${a} - ${b} = ?`;
            ans = a - b;
        }
        return { text, ans, opts: this.makeOptions(ans, 0, 20), type: 'number' };
    }

    makeCompareGraphics() {
        const types = ['circle', 'square', 'triangle'];
        const type1 = types[Math.floor(Math.random() * types.length)];
        const type2 = types[Math.floor(Math.random() * types.length)];
        const count1 = Math.floor(Math.random() * 8) + 1;
        const count2 = Math.floor(Math.random() * 8) + 1;

        // 使用表情符号表示图形
        const shapeEmojis = { circle: '🔵', square: '🟦', triangle: '🔺' };

        const text = `${shapeEmojis[type1]}x${count1} ○ ${shapeEmojis[type2]}x${count2}`;

        let ans;
        if (count1 > count2) ans = '>';
        else if (count1 < count2) ans = '<';
        else ans = '=';

        return { text, ans, opts: ['>', '<', '='], type: 'compare', compare: { count1, count2, shape1: shapeEmojis[type1], shape2: shapeEmojis[type2] } };
    }

    makeMultiply() {
        // 乘法口诀表 (1-9)
        const a = Math.floor(Math.random() * 9) + 1;
        const b = Math.floor(Math.random() * 9) + 1;
        const text = `${a} × ${b} = ?`;
        const ans = a * b;
        return { text, ans, opts: this.makeOptions(ans, 1, 81), type: 'number' };
    }

    makeOptions(ans, min, max) {
        let opts = [ans];
        while(opts.length < 3) {
            const w = ans + Math.floor(Math.random() * 10) - 5;
            if(w >= min && w <= max && w !== ans && !opts.includes(w)) opts.push(w);
        }
        opts.sort(() => Math.random() - 0.5);
        return opts;
    }

    draw() {
        ctx.save(); ctx.translate(this.x-cam, this.y);

        // 如果已完成且是强制解锁模式，显示特殊标记
        if (this.done && requireAllBoxes) {
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(-22, -22, 44, 44);
            ctx.strokeStyle = '#B45309'; ctx.lineWidth = 2; ctx.strokeRect(-22, -22, 44, 44);
            ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
            ctx.fillText('✓', 0, 5);
        } else if (this.done) {
            // 普通完成状态
            ctx.fillStyle = '#9CA3AF';
            ctx.fillRect(-20, -20, 40, 40);
            ctx.strokeStyle = '#B45309'; ctx.lineWidth = 2; ctx.strokeRect(-20, -20, 40, 40);
            ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
            ctx.fillText('✓', 0, 5);
        } else if (this.type === 'item') {
            // 道具类型：显示礼物盒
            const item = ITEM_TYPES[this.itemType] || ITEM_TYPES.COIN;
            // 礼物盒背景（金色/彩色）
            const gradient = ctx.createLinearGradient(-20, -20, 20, 20);
            gradient.addColorStop(0, '#FFD700');
            gradient.addColorStop(1, '#FFA500');
            ctx.fillStyle = gradient;
            ctx.fillRect(-20, -20, 40, 40);
            // 礼物盒丝带
            ctx.fillStyle = '#FF6347';
            ctx.fillRect(-3, -20, 6, 40);
            ctx.fillRect(-20, -3, 40, 6);
            // 礼物盒边框
            ctx.strokeStyle = '#B45309'; ctx.lineWidth = 2; ctx.strokeRect(-20, -20, 40, 40);
            // 显示道具emoji
            ctx.font = '20px Arial'; ctx.textAlign = 'center';
            ctx.fillText(item.emoji, 0, 5);
        } else {
            // 计算题类型：显示问号
            ctx.fillStyle = '#F59E0B';
            ctx.fillRect(-20, -20, 40, 40);
            ctx.strokeStyle = '#B45309'; ctx.lineWidth = 2; ctx.strokeRect(-20, -20, 40, 40);
            ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
            ctx.fillText('?', 0, 5);
        }
        ctx.restore();
    }
}

// ==================== 道具类 ====================
class Item {
    constructor(x, y, type) { this.x=x; this.y=y; this.type=type; this.collected=false; this.vy=0; this.vx=0; }
    update() {
        this.vy += 0.3;
        this.y += this.vy;
        this.x += this.vx;
        // 水平速度衰减
        this.vx *= 0.98;
        for (let p of blocks) {
            if (this.x>p[0] && this.x<p[0]+p[2] && this.y+15>p[1] && this.y<p[1]+p[3]) {
                this.y = p[1]-15; this.vy = 0;
            }
        }
    }
    draw() {
        if (this.collected) return;
        ctx.save(); ctx.translate(this.x-cam, this.y);
        ctx.font = '24px Arial'; ctx.textAlign = 'center';
        const itemType = ITEM_TYPES[this.type] || ITEM_TYPES.COIN;
        ctx.fillText(itemType.emoji, 0, 5);
        ctx.restore();
    }
}

// ==================== 炮弹类 ====================
class Bullet {
    constructor(x, y, direction, type = 'normal') {
        this.x = x;
        this.y = y;
        this.type = type;
        this.vx = direction * 8; // 炮弹速度
        this.vy = 0;
        this.r = 6;
        this.dead = false;
        this.life = 60; // 炮弹存在时间（帧数）

        // 根据类型设置属性
        switch(type) {
            case 'electric':
                this.r = 8; this.vx = direction * 12; this.damage = 2; break;
            case 'spread':
                this.r = 10; this.damage = 1; break;
            case 'flame':
                this.r = 12; this.vx = direction * 6; this.damage = 3; break;
            case 'ice':
                this.r = 9; this.vx = direction * 10; this.damage = 1; this.frozen = 180; break;
            case 'bubble':
                this.r = 14; this.vx = direction * 9; this.damage = 1; this.bounce = 0; break;
            case 'laser':
                this.r = 5; this.vx = direction * 20; this.damage = 1; break;
            case 'missile':
                this.r = 8; this.vx = direction * 7; this.vy = 0; this.damage = 2; this.homing = true; break;
            case 'poison':
                this.r = 7; this.vx = direction * 8; this.damage = 1; this.poisonTick = 30; break;
            case 'rainbow':
                this.r = 11; this.vx = direction * 9; this.damage = 1; this.splitCount = 0; break;
            case 'yoshiEgg':
                this.r = 14; this.vx = direction * 10; this.damage = 2; this.bounce = 0; break;
            default:
                this.damage = 1;
        }
    }

    update() {
        if (this.dead) return;

        // 追踪导弹：寻找最近敌人并渐进式调整方向
        if (this.homing && this.type === 'missile') {
            let nearest = null, nearestDist = Infinity;
            for (let e of enemies) {
                if (!e.dead) {
                    const dist = Math.hypot(this.x - e.x, this.y - e.y);
                    if (dist < nearestDist) { nearestDist = dist; nearest = e; }
                }
            }
            if (nearest) {
                const targetAngle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                const currentAngle = Math.atan2(this.vy, this.vx);
                // 计算角度差并平滑转向（最大转向角度限制为0.15弧度/帧）
                let angleDiff = targetAngle - currentAngle;
                // 规范化角度差到[-PI, PI]
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                // 限制最大转向角度
                const maxTurn = 0.15;
                const turnAngle = Math.max(-maxTurn, Math.min(maxTurn, angleDiff));
                const newAngle = currentAngle + turnAngle;
                // 保持速度恒定
                const speed = 9;
                this.vx = Math.cos(newAngle) * speed;
                this.vy = Math.sin(newAngle) * speed;
            }
        }

        // 水泡泡：上下弹跳效果
        if (this.type === 'bubble') {
            this.y += this.vy;
            this.vy += 0.3;
            if (this.y > 450) { this.y = 450; this.vy *= -0.8; this.bounce++; }
            if (this.bounce > 3) { this.dead = true; return; }
        }

        // 追踪导弹：更新位置（追踪弹有vy速度）
        if (this.type === 'missile') {
            this.x += this.vx;
            this.y += this.vy;
        }
        // 耀西蛋：弹跳物理
        else if (this.type === 'yoshiEgg') {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.4; // 重力
            // 地面弹跳
            if (this.y > 440) {
                this.y = 440;
                this.vy *= -0.7; // 弹性碰撞
                this.bounce++;
                if (this.bounce > 3) this.dead = true; // 弹跳3次后消失
            }
        }
        else {
            this.x += this.vx;
        }
        this.life--;

        // 超出寿命或超出边界
        if (this.life <= 0 || this.x < cam - 50 || this.x > cam + cvs.width + 100 || this.y > cvs.height + 50) {
            this.dead = true;
            return;
        }

        // 检测与敌人碰撞
        for (let e of enemies) {
            if (!e.dead && Math.hypot(this.x - e.x, this.y - e.y) < 25) {
                // 火龙炮：范围伤害
                if (this.type === 'flame') {
                    enemies.forEach(nearby => {
                        if (!nearby.dead && Math.hypot(this.x - nearby.x, this.y - nearby.y) < 60) {
                            for (let i = 0; i < this.damage; i++) {
                                if (nearby.hit()) { score += 100; updateUI(); AudioSys.playCoin(); break; }
                            }
                        }
                    });
                    this.dead = true; return;
                }

                // 冰冻弹：冻结敌人
                if (this.type === 'ice' && e.freezeTime === undefined) {
                    e.freezeTime = 180;
                    e.speed = 0;
                }

                let killed = false;
                for (let i = 0; i < this.damage; i++) {
                    if (e.hit()) { killed = true; }
                }

                // 毒液弹：持续伤害
                if (this.type === 'poison' && !killed) {
                    if (!e.poisonTimer) e.poisonTimer = 0;
                    e.poisonTimer += 60;
                }

                if (killed) { score += 100; updateUI(); AudioSys.playCoin(); }

                // 电击弹、激光、水泡泡可穿透
                if (this.type === 'electric' || this.type === 'laser') {
                    // 穿透，不死亡
                } else if (this.type === 'bubble') {
                    if (this.bounce > 2) this.dead = true;
                } else {
                    this.dead = true;
                }
                return;
            }
        }
    }

    draw() {
        if (this.dead) return;
        ctx.save();
        ctx.translate(this.x - cam, this.y);

        // 根据子弹类型绘制不同外观
        switch(this.type) {
            case 'electric':
                // 电击弹 - 蓝色闪电
                ctx.shadowColor = '#00FFFF';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#00FFFF';
                ctx.beginPath();
                ctx.arc(0, 0, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(0, 0, this.r * 0.5, 0, Math.PI * 2);
                ctx.fill();
                // 闪电符号
                ctx.strokeStyle = '#0000FF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-3, -5);
                ctx.lineTo(2, 0);
                ctx.lineTo(-2, 0);
                ctx.lineTo(3, 5);
                ctx.stroke();
                break;

            case 'spread':
                // 散弹 - 红色火焰
                ctx.shadowColor = '#FF4500';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#FF4500';
                ctx.beginPath();
                ctx.arc(0, 0, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, 0, this.r * 0.5, 0, Math.PI * 2);
                ctx.fill();
                break;

            case 'flame':
                // 火龙炮 - 橙色大火球
                ctx.shadowColor = '#FF8C00';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#FF8C00';
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#FF4500';
                ctx.beginPath(); ctx.arc(0, 0, this.r * 0.7, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.beginPath(); ctx.arc(0, 0, this.r * 0.4, 0, Math.PI * 2); ctx.fill();
                break;

            case 'ice':
                // 冰冻弹 - 冰蓝色晶体
                ctx.shadowColor = '#87CEEB';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#87CEEB';
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath(); ctx.arc(0, 0, this.r * 0.5, 0, Math.PI * 2); ctx.fill();
                // 六边形冰晶
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i;
                    const px = Math.cos(angle) * (this.r + 5);
                    const py = Math.sin(angle) * (this.r + 5);
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
                break;

            case 'bubble':
                // 水泡泡 - 半透明泡泡
                ctx.shadowColor = 'rgba(0,200,255,0.5)';
                ctx.shadowBlur = 20;
                ctx.fillStyle = 'rgba(0,200,255,0.3)';
                ctx.strokeStyle = 'rgba(0,200,255,0.8)';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                // 反光高光
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath(); ctx.arc(-this.r*0.3, -this.r*0.3, this.r*0.3, 0, Math.PI * 2); ctx.fill();
                break;

            case 'laser':
                // 激光炮 - 细长蓝光束
                ctx.shadowColor = '#00FFFF';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#00FFFF';
                ctx.beginPath(); ctx.ellipse(0, 0, this.r + 10, 3, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath(); ctx.ellipse(0, 0, this.r + 6, 2, 0, 0, Math.PI * 2); ctx.fill();
                break;

            case 'missile':
                // 追踪导弹 - 根据实际速度方向旋转
                const angle = Math.atan2(this.vy, this.vx);
                ctx.save();
                ctx.rotate(angle);

                // 导弹主体 - 流线型
                const missileGrad = ctx.createLinearGradient(-this.r*2, 0, this.r, 0);
                missileGrad.addColorStop(0, '#FF4500');
                missileGrad.addColorStop(0.3, '#C0C0C0');
                missileGrad.addColorStop(1, '#E8E8E8');

                ctx.fillStyle = missileGrad;
                ctx.shadowColor = '#FF6347';
                ctx.shadowBlur = 15;

                // 导弹头部（尖头）
                ctx.beginPath();
                ctx.moveTo(this.r * 2.5, 0);
                ctx.lineTo(-this.r, -this.r * 0.8);
                ctx.lineTo(-this.r * 0.5, 0);
                ctx.lineTo(-this.r, this.r * 0.8);
                ctx.closePath();
                ctx.fill();

                // 弹体中部
                ctx.fillStyle = '#A0A0A0';
                ctx.fillRect(-this.r * 1.5, -this.r * 0.5, this.r, this.r);

                // 尾翼
                ctx.fillStyle = '#696969';
                ctx.beginPath();
                ctx.moveTo(-this.r * 1.5, -this.r * 0.3);
                ctx.lineTo(-this.r * 2.2, -this.r * 0.9);
                ctx.lineTo(-this.r * 1.8, -this.r * 0.3);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-this.r * 1.5, this.r * 0.3);
                ctx.lineTo(-this.r * 2.2, this.r * 0.9);
                ctx.lineTo(-this.r * 1.8, this.r * 0.3);
                ctx.fill();

                // 尾焰效果
                const flameSize = 8 + Math.random() * 6;
                ctx.fillStyle = `rgba(255, 100, 0, ${0.8 + Math.random() * 0.2})`;
                ctx.shadowColor = '#FF4500';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(-this.r * 2.2, 0);
                ctx.lineTo(-this.r * 2.2 - flameSize, -this.r * 0.4);
                ctx.lineTo(-this.r * 2.5 - flameSize * 0.7, 0);
                ctx.lineTo(-this.r * 2.2 - flameSize, this.r * 0.4);
                ctx.closePath();
                ctx.fill();

                // 内焰
                ctx.fillStyle = `rgba(255, 200, 0, ${0.9 + Math.random() * 0.1})`;
                ctx.beginPath();
                ctx.moveTo(-this.r * 2.2, 0);
                ctx.lineTo(-this.r * 2.5, -this.r * 0.25);
                ctx.lineTo(-this.r * 2.7, 0);
                ctx.lineTo(-this.r * 2.5, this.r * 0.25);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
                ctx.shadowBlur = 0;
                break;

            case 'poison':
                // 毒液弹 - 绿色粘液球
                ctx.shadowColor = '#32CD32';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#32CD32';
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#228B22';
                ctx.beginPath(); ctx.arc(-2, -2, this.r * 0.5, 0, Math.PI * 2); ctx.fill();
                // 毒泡
                ctx.fillStyle = 'rgba(50,205,50,0.5)';
                ctx.beginPath(); ctx.arc(5, -4, 3, 0, Math.PI * 2); ctx.fill();
                break;

            case 'rainbow':
                // 彩虹弹 - 七彩旋转
                const hue = (frameCount * 5) % 360;
                ctx.shadowColor = `hsl(${hue},100%,60%)`;
                ctx.shadowBlur = 20;
                ctx.fillStyle = `hsl(${hue},100%,60%)`;
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = `hsl(${(hue+120)%360},100%,60%)`;
                ctx.beginPath(); ctx.arc(0, 0, this.r * 0.7, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = `hsl(${(hue+240)%360},100%,60%)`;
                ctx.beginPath(); ctx.arc(0, 0, this.r * 0.4, 0, Math.PI * 2); ctx.fill();
                break;

            case 'yoshiEgg':
                // 耀西蛋 - 白色蛋壳带彩色圆点
                ctx.shadowColor = '#FFFFFF';
                ctx.shadowBlur = 10;
                // 蛋壳主体（椭圆形）
                ctx.fillStyle = '#F5F5DC';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.r * 1.1, this.r * 1.3, this.vx * 0.05, 0, Math.PI * 2);
                ctx.fill();
                // 蛋壳高光
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.ellipse(-this.r*0.3, -this.r*0.5, this.r*0.3, this.r*0.5, -0.3, 0, Math.PI * 2);
                ctx.fill();
                // 彩色圆点（根据吃掉的敌人类型决定颜色）
                const dotColors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'];
                const dotColor = dotColors[Math.abs(Math.floor(this.x / 50)) % dotColors.length];
                ctx.fillStyle = dotColor;
                for (let i = 0; i < 4; i++) {
                    const angle = (i / 4) * Math.PI * 2 + (this.x * 0.05);
                    const dx = Math.cos(angle) * this.r * 0.5;
                    const dy = Math.sin(angle) * this.r * 0.6;
                    ctx.beginPath();
                    ctx.arc(dx, dy, this.r * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                }
                // 蛋壳边框
                ctx.strokeStyle = '#DDD';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.r * 1.1, this.r * 1.3, this.vx * 0.05, 0, Math.PI * 2);
                ctx.stroke();
                break;

            default:
                // 普通炮弹
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#FFD700';
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#FF6B00';
                ctx.beginPath(); ctx.arc(0, 0, this.r * 0.6, 0, Math.PI * 2); ctx.fill();
        }

        // 尾焰效果（部分武器有特殊尾焰）
        if (this.type !== 'bubble' && this.type !== 'laser' && this.type !== 'missile') {
            const tailLen = this.type === 'flame' ? 25 : (this.type === 'rainbow' ? 18 : 15);
            const tailDir = this.vx > 0 ? -1 : 1;
            ctx.shadowBlur = 0;
            ctx.fillStyle = `rgba(255, 100, 0, ${this.life / 60})`;
            ctx.beginPath();
            ctx.moveTo(tailDir * tailLen, -3);
            ctx.lineTo(0, 0);
            ctx.lineTo(tailDir * tailLen, 3);
            ctx.closePath();
            ctx.fill();
        }

        ctx.restore();
    }
}

// ==================== 敌人类 ====================
class Enemy {
    constructor(x, y, patrolDist = 100) {
        this.x = x; this.y = y; this.w = 30; this.h = 30;
        this.startX = x; this.patrolDist = patrolDist;
        this.dir = 1; this.speed = 1.5;
        this.dead = false;
        this.hp = 5;
        this.hitFlash = 0;
    }
    update() {
        if (this.dead) return;

        // 冻结效果
        if (this.freezeTime > 0) {
            this.freezeTime--;
            if (this.freezeTime <= 0) { this.speed = 1.5; }
            return;
        }

        // 毒液持续伤害
        if (this.poisonTimer > 0) {
            this.poisonTimer--;
            if (this.poisonTimer % 30 === 0 && this.hp > 1) {
                this.hp--;
                this.hitFlash = 5;
                score += 20;
                updateUI();
                if (this.hp <= 0) { this.dead = true; score += 100; updateUI(); AudioSys.playCoin(); return; }
            }
        }

        this.x += this.speed * this.dir;
        if (this.x > this.startX + this.patrolDist || this.x < this.startX - this.patrolDist) {
            this.dir *= -1;
        }
        if (this.hitFlash > 0) this.hitFlash--;
    }
    draw() {
        if (this.dead) return;
        ctx.save(); ctx.translate(this.x - cam, this.y);
        if (this.hitFlash > 0) ctx.globalAlpha = 0.5;

        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-15, -15, 30, 30);

        ctx.fillStyle = '#654321';
        for (let i = -12; i <= 12; i += 8) {
            ctx.beginPath();
            ctx.moveTo(i, -15); ctx.lineTo(i + 4, -22); ctx.lineTo(i + 8, -15);
            ctx.fill();
        }

        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(-6, -5, 5, 0, Math.PI*2); ctx.arc(6, -5, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'red';
        ctx.beginPath(); ctx.arc(-6, -5, 2, 0, Math.PI*2); ctx.arc(6, -5, 2, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-12, 15, 8, 8);
        ctx.fillRect(4, 15, 8, 8);

        // 冻结特效
        if (this.freezeTime > 0) {
            ctx.strokeStyle = '#87CEEB';
            ctx.lineWidth = 3;
            ctx.strokeRect(-17, -17, 34, 34);
            ctx.fillStyle = 'rgba(135,206,235,0.3)';
            ctx.fillRect(-17, -17, 34, 34);
        }

        // 毒液特效
        if (this.poisonTimer > 0 && this.poisonTimer % 10 < 5) {
            ctx.fillStyle = '#32CD32';
            ctx.beginPath(); ctx.arc(-10, -20, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(8, -10, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(0, 15, 3, 0, Math.PI*2); ctx.fill();
        }

        ctx.globalAlpha = 1;
        ctx.fillStyle = 'red';
        ctx.fillRect(-15, -28, 30, 6);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(-15, -28, 30 * (this.hp / 5), 6);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 1;
        ctx.strokeRect(-15, -28, 30, 6);
        ctx.restore();
    }
    hit() {
        this.hp--;
        this.hitFlash = 10;
        if (this.hp <= 0) {
            this.dead = true;
            return true;
        }
        return false;
    }
}

// ==================== 飞行小鸟敌人 ====================
class BirdEnemy {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 25;
        this.h = 20;
        this.speed = 0.08 + Math.random() * 0.15; // 速度0.08-0.23，略快一些
        this.dead = false;
        this.hp = 3;
        this.hitFlash = 0;
        this.wingAngle = 0;
        this.wingSpeed = 0.2 + Math.random() * 0.1;
        this.yOffset = 0;
        this.yBase = y;
        this.floatPhase = Math.random() * Math.PI * 2; // 随机浮动相位
    }

    update() {
        if (this.dead) return;
        this.x -= this.speed; // 向左飞行
        this.wingAngle += this.wingSpeed;
        // 上下浮动效果，更明显
        this.floatPhase += 0.04;
        this.yOffset = Math.sin(this.floatPhase) * 20;
        this.y = this.yBase + this.yOffset;
        if (this.hitFlash > 0) this.hitFlash--;
    }

    draw() {
        if (this.dead) return;
        ctx.save();
        ctx.translate(this.x - cam, this.y);
        if (this.hitFlash > 0) ctx.globalAlpha = 0.5;

        // 身体
        ctx.fillStyle = '#FF6347';
        ctx.beginPath();
        ctx.ellipse(0, 0, 15, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        // 翅膀（扇动动画）
        const wingY = Math.sin(this.wingAngle) * 8;
        ctx.fillStyle = '#FF8C00';
        ctx.beginPath();
        ctx.moveTo(-5, -5);
        ctx.lineTo(5, -5);
        ctx.lineTo(0, -15 + wingY);
        ctx.closePath();
        ctx.fill();

        // 眼睛
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(-8, -3, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(-9, -3, 2, 0, Math.PI * 2);
        ctx.fill();

        // 嘴巴
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.moveTo(-18, 0);
        ctx.lineTo(-25, 3);
        ctx.lineTo(-18, 6);
        ctx.closePath();
        ctx.fill();

        // 尾巴
        ctx.fillStyle = '#FF6347';
        ctx.beginPath();
        ctx.moveTo(12, 0);
        ctx.lineTo(22, -5);
        ctx.lineTo(22, 5);
        ctx.closePath();
        ctx.fill();

        // 血条
        ctx.globalAlpha = 1;
        ctx.fillStyle = 'red';
        ctx.fillRect(-15, -22, 30, 4);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(-15, -22, 30 * (this.hp / 3), 4);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 1;
        ctx.strokeRect(-15, -22, 30, 4);

        ctx.restore();
    }

    hit() {
        this.hp--;
        this.hitFlash = 10;
        if (this.hp <= 0) {
            this.dead = true;
            return true;
        }
        return false;
    }
}

// ==================== 耀西的蛋类（跟随在身后）====================
class YoshiEgg {
    constructor(x, y, enemyType) {
        this.x = x;
        this.y = y;
        this.startY = y;
        this.enemyType = enemyType;
        this.r = 14;
        this.bounce = 0;
        this.vy = -5;  // 初始向上弹出
        this.life = 300;  // 5秒后消失
        this.grounded = false;
    }

    update() {
        if (this.life <= 0) return;
        this.life--;

        // 重力效果
        if (!this.grounded) {
            this.vy += 0.4;
            this.y += this.vy;

            // 落地检测
            if (this.y > 440) {
                this.y = 440;
                this.vy *= -0.5;  // 弹性反弹
                this.bounce++;
                if (this.bounce > 2) {
                    this.grounded = true;
                    this.vy = 0;
                }
            }
        }
    }

    draw() {
        if (this.life <= 0) return;

        ctx.save();
        ctx.translate(this.x - cam, this.y);

        // 蛋壳主体（白色椭圆）
        ctx.fillStyle = '#FFFFF0';
        ctx.beginPath();
        ctx.ellipse(0, 0, this.r * 1.1, this.r * 1.3, 0, 0, Math.PI * 2);
        ctx.fill();

        // 蛋壳边框
        ctx.strokeStyle = '#DDD';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 蛋壳上的斑点（根据敌人类型决定颜色）
        const colors = {
            'Enemy': '#FF6B6B',
            'BirdEnemy': '#4ECDC4',
            'BigEnemy': '#45B7D1',
            'default': '#98D8C8'
        };
        const dotColor = colors[this.enemyType] || colors['default'];
        ctx.fillStyle = dotColor;

        // 几个圆点
        for (let i = 0; i < 4; i++) {
            const angle = (i / 4) * Math.PI * 2;
            const dx = Math.cos(angle) * this.r * 0.5;
            const dy = Math.sin(angle) * this.r * 0.6;
            ctx.beginPath();
            ctx.arc(dx, dy, this.r * 0.25, 0, Math.PI * 2);
            ctx.fill();
        }

        // 蛋壳高光
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.ellipse(-this.r*0.3, -this.r*0.5, this.r*0.3, this.r*0.5, -0.3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

// ==================== 坑洞类（地面陷阱）====================
class Pit {
    constructor(x, width) {
        this.x = x;
        this.y = 450;
        this.width = width || 60;
        this.dead = false;
        this.resetTriggered = false;
    }

    update() {
        if (!player) return;
        const playerInPitX = player.x > this.x && player.x < this.x + this.width;
        const playerFalling = player.y > 440 && player.vy > 0;
        if (playerInPitX && playerFalling) {
            this.triggerReset();
        }
    }

    triggerReset() {
        player.vy = 5;
        player.y += 10;
        if (player.y > 600 && !this.resetTriggered) {
            this.resetTriggered = true;
            showHint('💀 掉落坑洞！关卡重置...');
            setTimeout(() => {
                this.resetTriggered = false;
                resetLevel();
            }, 1000);
        }
    }

    draw() {
        ctx.save();
        if (player && Math.abs(player.x - (this.x + this.width/2)) < 150) {
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = '#FFD700';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('⚠️', this.x + this.width/2 - cam, this.y - 40);
        }
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(this.x - cam, this.y, this.width, 100);
        ctx.fillStyle = '#333';
        ctx.fillRect(this.x - cam, this.y, 5, 10);
        ctx.fillRect(this.x + this.width - 5 - cam, this.y, 5, 10);
        ctx.restore();
    }
}

// ==================== 浮动云朵类（跳跃平台）====================
class Cloud {
    constructor(x, y, width) {
        this.x = x;
        this.y = y || 320;  // 默认高度
        this.width = width || 120;
        this.height = 25;
        this.dead = false;
        // 浮动动画
        this.floatOffset = Math.random() * Math.PI * 2;
        this.baseY = this.y;
        // 水平移动（某些云朵会左右飘动）
        this.moveRange = Math.random() > 0.5 ? 50 : 0;  // 50%概率会移动
        this.moveSpeed = 0.5 + Math.random() * 0.5;
        this.baseX = this.x;
        this.moveOffset = Math.random() * Math.PI * 2;
    }

    update() {
        // 垂直浮动动画
        this.floatOffset += 0.03;
        this.y = this.baseY + Math.sin(this.floatOffset) * 8;

        // 水平移动动画（如果有）
        if (this.moveRange > 0) {
            this.moveOffset += this.moveSpeed * 0.02;
            this.x = this.baseX + Math.sin(this.moveOffset) * this.moveRange;
        }
    }

    draw() {
        ctx.save();
        const screenX = this.x - cam;

        // 云朵主体（圆角长条形）
        ctx.fillStyle = '#FFFFFF';
        ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
        ctx.shadowBlur = 15;

        // 云朵由多个椭圆组成
        const drawCloudPuff = (px, py, r) => {
            ctx.beginPath();
            ctx.arc(px, py, r, 0, Math.PI * 2);
            ctx.fill();
        };

        // 主平台（长条形）
        ctx.fillStyle = '#F0F8FF';
        ctx.beginPath();
        ctx.roundRect(screenX - this.width/2, this.y, this.width, this.height, 12);
        ctx.fill();

        // 云朵装饰（几个圆泡泡）
        ctx.fillStyle = '#FFFFFF';
        drawCloudPuff(screenX - this.width/2 + 20, this.y - 5, 18);
        drawCloudPuff(screenX - this.width/2 + 45, this.y - 12, 22);
        drawCloudPuff(screenX + this.width/2 - 45, this.y - 12, 22);
        drawCloudPuff(screenX + this.width/2 - 20, this.y - 5, 18);
        drawCloudPuff(screenX, this.y - 15, 25);

        // 云朵底部阴影
        ctx.fillStyle = '#E6E6FA';
        ctx.beginPath();
        ctx.roundRect(screenX - this.width/2, this.y + 15, this.width, 10, 8);
        ctx.fill();

        // 平台顶部高光
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        ctx.roundRect(screenX - this.width/2 + 5, this.y + 2, this.width - 10, 4, 4);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // 获取平台的碰撞盒（用于玩家跳跃）
    getBounds() {
        return {
            x: this.x - this.width/2,
            y: this.y,
            width: this.width,
            height: this.height
        };
    }
}

// ==================== 滚动石头类（横向障碍物）====================
class RollingStone {
    constructor(x, y, direction) {
        this.x = x;
        this.y = y || 420;
        this.r = 20;
        this.dir = direction || 1;
        this.speed = 2 + Math.random() * 2;
        this.rotation = 0;
        this.dead = false;
        this.hitFlash = 0;
    }

    update() {
        if (this.dead) return;
        this.x += this.speed * this.dir;
        this.rotation += this.speed * 0.1 * this.dir;
        const levelEnd = flag ? flag.x + 200 : 2000;
        if (this.x > levelEnd) {
            this.x = 50;
        } else if (this.x < 0) {
            this.x = levelEnd - 50;
        }
        if (player && !player.invincible) {
            const dist = Math.hypot(this.x - player.x, this.y - player.y);
            if (dist < this.r + player.r) {
                if (player.hit()) {
                    // 玩家死亡
                }
                this.dir *= -1;
                this.hitFlash = 10;
            }
        }
        for (let b of bullets) {
            if (!b.dead && Math.hypot(this.x - b.x, this.y - b.y) < this.r + b.r) {
                b.dead = true;
                this.hitFlash = 5;
                this.speed = Math.max(1, this.speed * 0.9);
            }
        }
        if (this.hitFlash > 0) this.hitFlash--;
    }

    draw() {
        if (this.dead) return;
        ctx.save();
        ctx.translate(this.x - cam, this.y);
        ctx.rotate(this.rotation);
        if (this.hitFlash > 0) ctx.globalAlpha = 0.5;
        const stoneGrad = ctx.createRadialGradient(-5, -5, 0, 0, 0, this.r);
        stoneGrad.addColorStop(0, '#A0A0A0');
        stoneGrad.addColorStop(1, '#606060');
        ctx.fillStyle = stoneGrad;
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#404040';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-8, -5);
        ctx.lineTo(0, 0);
        ctx.lineTo(5, -8);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-5, 5);
        ctx.lineTo(0, 0);
        ctx.lineTo(8, 6);
        ctx.stroke();
        ctx.fillStyle = '#404040';
        for (let i = 0; i < 3; i++) {
            const angle = (i * Math.PI * 2 / 3) + this.rotation;
            ctx.beginPath();
            ctx.arc(Math.cos(angle) * 10, Math.sin(angle) * 10, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

// ==================== 管道类（进入地道的入口）====================
class Pipe {
    constructor(x, y, height, destination) {
        this.x = x;
        this.y = y || 380;  // 默认从地面伸出
        this.width = 60;
        this.height = height || 70;
        this.destination = destination || 'underground'; // 'underground' 或 'surface'
        this.dead = false;
        this.enterCooldown = 0;  // 进入冷却时间
    }

    update() {
        if (this.enterCooldown > 0) this.enterCooldown--;

        // 检测玩家是否按下了进入键（下键）
        if (this.enterCooldown === 0 && player && keys['ArrowDown']) {
            // 检查玩家是否在管道水平范围内
            const pipeCenterX = this.x + this.width/2;
            const xDist = Math.abs(player.x - pipeCenterX);
            // 检查玩家是否在管道上方（站在管道上或附近地面）
            const yDist = player.y - this.y;

            // 玩家在管道中心附近（x方向），且在管道上方或附近（y方向）
            if (xDist < 35 && yDist > -20 && yDist < 80) {
                this.enterPipe();
            }
        }
    }

    enterPipe() {
        this.enterCooldown = 60;  // 1秒冷却

        if (this.destination === 'underground') {
            enterUnderground();
        } else {
            exitUnderground();
        }
    }

    draw() {
        const screenX = this.x - cam;

        // 管道主体（绿色圆柱形）
        ctx.fillStyle = '#228B22';
        ctx.fillRect(screenX, this.y, this.width, this.height);

        // 管道顶部（稍宽）
        ctx.fillStyle = '#2E8B57';
        ctx.fillRect(screenX - 5, this.y, this.width + 10, 15);

        // 管道边框
        ctx.strokeStyle = '#006400';
        ctx.lineWidth = 2;
        ctx.strokeRect(screenX, this.y, this.width, this.height);
        ctx.strokeRect(screenX - 5, this.y, this.width + 10, 15);

        // 高光
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(screenX + 8, this.y + 15, 8, this.height - 15);

        // 入口提示（玩家靠近时显示）
        if (player && Math.abs(player.x - (this.x + this.width/2)) < 50) {
            ctx.fillStyle = '#FFD700';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            const hint = this.destination === 'underground' ? '↓ 进入地道' : '↑ 返回地面';
            ctx.fillText(hint, screenX + this.width/2, this.y - 10);
        }
    }
}

// ==================== 地下关卡系统 ====================
let isInUnderground = false;  // 是否在地道中
let undergroundPipes = [];    // 地下管道
let undergroundBlocks = [];   // 地下砖块
let undergroundEnemies = [];  // 地下敌人
let undergroundCoins = [];    // 地下金币
let undergroundTraps = [];    // 地下机关

// 进入地下关卡
function enterUnderground() {
    isInUnderground = true;

    // 保存地面状态
    savedState = {
        blocks: blocks,
        enemies: enemies,
        coins: coins,
        questions: questions,
        items: items,
        pits: pits,
        stones: stones,
        clouds: clouds,
        cam: cam,
        playerX: player.x,
        playerY: player.y
    };

    // 生成地下关卡
    generateUnderground();

    showHint('🕳️ 进入地下关卡！');
}

// 生成地下关卡
function generateUnderground() {
    undergroundBlocks = [];
    undergroundEnemies = [];
    undergroundCoins = [];
    undergroundTraps = [];
    undergroundPipes = [];

    const ugLength = 3000;  // 地下关卡长度

    // 地下地面（更深色的砖块）
    undergroundBlocks.push([0, 450, ugLength, 50]);

    // 地下天花板
    undergroundBlocks.push([0, 50, ugLength, 50]);

    // 地下墙壁（两侧）
    undergroundBlocks.push([0, 50, 50, 400]);
    undergroundBlocks.push([ugLength - 50, 50, 50, 400]);

    // 地下平台布局（类似马里奥地下关）
    const platformPattern = [
        [300, 350, 100, 20], [500, 300, 100, 20], [700, 250, 100, 20],
        [1000, 350, 150, 20], [1300, 280, 100, 20], [1500, 350, 200, 20],
        [1900, 300, 100, 20], [2100, 250, 100, 20], [2400, 350, 150, 20]
    ];

    platformPattern.forEach(p => {
        undergroundBlocks.push(p);
        // 平台上放金币
        if (Math.random() > 0.3) {
            undergroundCoins.push(new Coin(p[0] + p[2]/2, p[1] - 30));
        }
    });

    // 地下敌人（更多更强的敌人）
    for (let i = 200; i < ugLength - 200; i += 300) {
        undergroundEnemies.push(new Enemy(i, 420, 80));
    }

    // 地下飞行敌人
    for (let i = 400; i < ugLength - 200; i += 500) {
        undergroundEnemies.push(new BirdEnemy(i, 200, 80));
    }

    // 地下机关（火焰陷阱）
    for (let i = 600; i < ugLength - 200; i += 800) {
        undergroundTraps.push(new FireTrap(i, 430));
    }

    // 落石机关（从天花板随机掉落）
    undergroundTraps.push(new FallingRock(500, 120));   // 2秒后掉落
    undergroundTraps.push(new FallingRock(900, 240));   // 4秒后掉落
    undergroundTraps.push(new FallingRock(1300, 180));  // 3秒后掉落
    undergroundTraps.push(new FallingRock(1700, 300));  // 5秒后掉落
    undergroundTraps.push(new FallingRock(2100, 150));  // 2.5秒后掉落
    undergroundTraps.push(new FallingRock(2500, 360));  // 6秒后掉落

    // 闸门机关（周期性升降）
    undergroundTraps.push(new Gate(700, 330, 120, 180));   // 3秒周期
    undergroundTraps.push(new Gate(1100, 330, 120, 240));  // 4秒周期
    undergroundTraps.push(new Gate(1500, 330, 100, 150));  // 2.5秒周期
    undergroundTraps.push(new Gate(1900, 330, 120, 200));  // 3.3秒周期
    undergroundTraps.push(new Gate(2300, 330, 140, 180));  // 3秒周期

    // 出口管道（在地下关卡末尾）
    undergroundPipes.push(new Pipe(ugLength - 150, 380, 70, 'surface'));

    // 重置玩家位置到地下起点
    player.x = 100;
    player.y = 350;
    cam = 0;

    // 替换游戏对象
    blocks = undergroundBlocks;
    enemies = undergroundEnemies;
    coins = undergroundCoins;
    pits = [];  // 地下没有坑洞（有天花板）
    stones = [];
    clouds = [];
    questions = [];  // 地下没有问号方块
}

// 返回地面
function exitUnderground() {
    isInUnderground = false;

    // 恢复地面状态
    if (savedState) {
        blocks = savedState.blocks;
        enemies = savedState.enemies;
        coins = savedState.coins;
        questions = savedState.questions;
        items = savedState.items;
        pits = savedState.pits;
        stones = savedState.stones;
        clouds = savedState.clouds;
        cam = savedState.cam;

        // 将玩家放到管道出口位置
        const exitPipe = pipes.find(p => p.destination === 'underground');
        if (exitPipe) {
            player.x = exitPipe.x + 100;
            player.y = exitPipe.y - 50;
        } else {
            player.x = savedState.playerX;
            player.y = savedState.playerY;
        }
    }

    showHint('☀️ 回到地面！');
}

// 火焰陷阱类
class FireTrap {
    constructor(x, y) {
        this.x = x;
        this.y = y || 430;
        this.width = 40;
        this.height = 20;
        this.active = false;
        this.timer = 0;
        this.interval = 120;  // 2秒循环
        this.fireHeight = 60;
    }

    update() {
        this.timer++;
        if (this.timer % this.interval < 60) {
            this.active = true;  // 前1秒有火焰
        } else {
            this.active = false;  // 后1秒安全
        }

        // 检测玩家碰撞
        if (this.active && player && !player.invincible) {
            const px = player.x, py = player.y, pr = player.r;
            if (px + pr > this.x && px - pr < this.x + this.width &&
                py + pr > this.y - this.fireHeight && py - pr < this.y) {
                player.hit();
            }
        }
    }

    draw() {
        // 陷阱底座（火山口样式）
        ctx.fillStyle = '#4a2c2a';
        ctx.fillRect(this.x - cam, this.y, this.width, 20);
        // 底座边缘
        ctx.fillStyle = '#6b4423';
        ctx.fillRect(this.x - cam - 5, this.y, this.width + 10, 8);

        // 使用 🔥 emoji 绘制火焰
        if (this.active) {
            ctx.save();
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            // 火焰上下跳动动画
            const bounce = Math.sin(Date.now() / 100) * 5;
            ctx.fillText('🔥', this.x - cam + this.width/2, this.y - 10 + bounce);
            ctx.restore();
        } else {
            // 安全状态显示（灰烬或暗色）
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.arc(this.x - cam + this.width/2, this.y + 10, 4, 0, Math.PI*2);
            ctx.fill();
            // 余烬微光
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.arc(this.x - cam + this.width/2 - 2, this.y + 8, 2, 0, Math.PI*2);
            ctx.fill();
        }
    }
}

// ==================== 落石机关类（从天花板掉落）====================
class FallingRock {
    constructor(x, delay = 0) {
        this.x = x;
        this.y = 100;  // 从天花板附近开始
        this.r = 25;
        this.vy = 0;
        this.vx = 0;
        this.delay = delay;  // 延迟掉落（帧数）
        this.active = false;
        this.landed = false;
        this.warningTime = 60;  // 预警时间（1秒）
        this.flash = 0;
    }

    update() {
        if (!this.active) {
            this.delay--;
            if (this.delay <= 0) {
                this.active = true;
            }
            return;
        }

        if (this.landed) return;

        // 预警闪烁
        if (this.warningTime > 0) {
            this.warningTime--;
            this.flash = this.warningTime % 10 < 5 ? 1 : 0;
            return;
        }

        // 重力下落
        this.vy += 0.5;
        this.y += this.vy;

        // 落地检测
        if (this.y > 440) {
            this.y = 440;
            this.vy = 0;
            this.landed = true;
        }

        // 玩家碰撞检测
        if (player && !player.invincible) {
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < this.r + player.r) {
                player.hit();
            }
        }
    }

    draw() {
        const screenX = this.x - cam;

        // 预警闪烁（掉落前）
        if (!this.landed && this.active && this.warningTime > 0) {
            if (this.flash) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.beginPath();
                ctx.arc(screenX, 100, this.r, 0, Math.PI * 2);
                ctx.fill();

                // 警告标记
                ctx.fillStyle = '#FF0000';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⚠️', screenX, 80);
            }
            return;
        }

        // 绘制石头
        if (!this.active) return;

        ctx.save();
        ctx.translate(screenX, this.y);
        ctx.rotate(this.y * 0.05);  // 旋转效果

        // 石头主体
        const gradient = ctx.createRadialGradient(-5, -5, 0, 0, 0, this.r);
        gradient.addColorStop(0, '#A0A0A0');
        gradient.addColorStop(0.7, '#696969');
        gradient.addColorStop(1, '#2F4F4F');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        // 不规则形状
        ctx.moveTo(-this.r, 0);
        ctx.lineTo(-this.r * 0.6, -this.r * 0.8);
        ctx.lineTo(0, -this.r);
        ctx.lineTo(this.r * 0.7, -this.r * 0.7);
        ctx.lineTo(this.r, 0);
        ctx.lineTo(this.r * 0.5, this.r * 0.8);
        ctx.lineTo(-this.r * 0.4, this.r * 0.9);
        ctx.closePath();
        ctx.fill();

        // 石头纹理
        ctx.strokeStyle = '#404040';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-10, -5);
        ctx.lineTo(5, 5);
        ctx.lineTo(8, -8);
        ctx.stroke();

        ctx.restore();
    }
}

// ==================== 闸门机关类（升降门）====================
class Gate {
    constructor(x, y, height = 120, openInterval = 180) {
        this.x = x;
        this.y = y || 330;  // 默认位置
        this.width = 40;
        this.height = height;
        this.openInterval = openInterval;  // 开关周期（帧数）
        this.timer = 0;
        this.isOpen = false;  // 是否开启（开启时可以通过）
        this.openHeight = 0;  // 当前开启高度
        this.maxOpenHeight = 100;  // 最大开启高度
    }

    update() {
        this.timer++;

        // 周期性开关
        const cycle = this.timer % this.openInterval;
        const shouldOpen = cycle < this.openInterval / 2;

        // 平滑过渡
        if (shouldOpen) {
            this.openHeight += (this.maxOpenHeight - this.openHeight) * 0.1;
            this.isOpen = this.openHeight > this.maxOpenHeight * 0.8;
        } else {
            this.openHeight += (0 - this.openHeight) * 0.1;
            this.isOpen = this.openHeight < this.maxOpenHeight * 0.2;
        }

        // 玩家碰撞检测（闸门关闭时）
        if (!this.isOpen && player && !player.invincible) {
            const px = player.x, py = player.y, pr = player.r;
            const gateTop = this.y - this.openHeight;

            // 检测玩家是否撞到闸门
            if (px + pr > this.x && px - pr < this.x + this.width &&
                py + pr > gateTop && py - pr < this.y + this.height) {

                // 从上方落下时，被阻挡
                if (player.vy > 0 && py - pr < gateTop + 20) {
                    player.y = gateTop - pr;
                    player.vy = 0;
                    player.g = true;
                    player.j = 0;
                } else {
                    // 侧面碰撞，造成伤害
                    player.hit();
                }
            }
        }
    }

    draw() {
        const screenX = this.x - cam;
        const gateTop = this.y - this.openHeight;

        // 闸门柱子（固定部分）
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(screenX - 5, this.y, 5, this.height);
        ctx.fillRect(screenX + this.width, this.y, 5, this.height);

        // 闸门本体（升降部分）
        if (this.openHeight < this.maxOpenHeight * 0.95) {
            const gateGradient = ctx.createLinearGradient(screenX, gateTop, screenX + this.width, gateTop);
            gateGradient.addColorStop(0, '#8B4513');
            gateGradient.addColorStop(0.5, '#A0522D');
            gateGradient.addColorStop(1, '#8B4513');

            ctx.fillStyle = gateGradient;
            ctx.fillRect(screenX, gateTop, this.width, this.height);

            // 闸门纹理（横向条纹）
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            for (let i = 20; i < this.height; i += 30) {
                ctx.beginPath();
                ctx.moveTo(screenX, gateTop + i);
                ctx.lineTo(screenX + this.width, gateTop + i);
                ctx.stroke();
            }

            // 边框
            ctx.strokeStyle = '#4a2c2a';
            ctx.lineWidth = 3;
            ctx.strokeRect(screenX, gateTop, this.width, this.height);
        }

        // 状态指示灯
        ctx.fillStyle = this.isOpen ? '#00FF00' : '#FF0000';
        ctx.beginPath();
        ctx.arc(screenX + this.width/2, this.y - 15, 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ==================== 特殊变身箱子类 ====================
class SpecialTransformBox {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.done = false;
        this.pulse = 0;
    }

    draw() {
        if (this.done) return;

        this.pulse += 0.1;
        const glow = Math.sin(this.pulse) * 0.3 + 0.7;

        ctx.save();
        ctx.translate(this.x - cam, this.y);

        // 发光效果
        ctx.shadowColor = '#00FFFF';
        ctx.shadowBlur = 20 * glow;

        // 特殊箱子（青色带闪电）
        ctx.fillStyle = `rgba(0, 255, 255, ${glow})`;
        ctx.fillRect(-25, -25, 50, 50);

        ctx.shadowBlur = 0;

        // 边框
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.strokeRect(-25, -25, 50, 50);

        // 闪电图标
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.moveTo(-5, -15);
        ctx.lineTo(8, -2);
        ctx.lineTo(-2, -2);
        ctx.lineTo(5, 15);
        ctx.lineTo(-8, 2);
        ctx.lineTo(2, 2);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}

// 根据坑洞创建分段地面（坑洞区域没有地面）
function createGroundWithPits(levelLength, pitList) {
    const groundSegments = [];
    let currentX = 0;

    // 按x坐标排序坑洞
    const sortedPits = [...pitList].sort((a, b) => a.x - b.x);

    for (const pit of sortedPits) {
        // 坑洞前的地面
        if (pit.x > currentX + 10) {
            groundSegments.push([currentX, 450, pit.x - currentX, 50]);
        }
        currentX = pit.x + pit.width;
    }

    // 最后一个坑洞后的地面
    if (currentX < levelLength) {
        groundSegments.push([currentX, 450, levelLength - currentX, 50]);
    }

    return groundSegments.length > 0 ? groundSegments : [[0, 450, levelLength, 50]];
}

// ==================== 优化后的游戏循环 ====================
function updatePlatformer(timestamp) {
    if (state !== 'play') return;

    if (!lastTime) lastTime = timestamp;
    const deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    const clampedDelta = Math.min(deltaTime, 50);

    frameCount++;

    player.update();

    const maxCam = level === 1 ? 14700 : (level === 2 ? 19700 : 24700);
    cam = Math.max(0, Math.min(player.x-200, maxCam));

    for (let c of coins) {
        if (!c.get && Math.hypot(player.x-c.x, player.y-c.y) < 30) {
            c.get = true; candies++; score += (ITEM_TYPES[c.type]?.score || 10);
            AudioSys.playCoin(); updateUI();
        }
    }

    for (let item of items) {
        if (!item.collected && Math.hypot(player.x-item.x, player.y-item.y) < 35) {
            item.collected = true;
            collectItem(item.type);
        }
    }

    for (let item of items) item.update();

    for (let e of enemies) {
        e.update();
        if (!e.dead && Math.hypot(player.x-e.x, player.y-e.y) < 30) {
            if (player.invincible > 0) {
                e.dead = true;
                score += 50;
                AudioSys.playCoin();
            } else if (player.isBig) {
                player.isBig = false;
                player.invincible = 120;
                AudioSys.playFail();
            } else {
                AudioSys.playFail();
                state = 'over';
                playerFireMode = 'normal'; // 被击败时火力重置
                setTimeout(() => restart(), 50);
                return;
            }
        }
    }

    // 更新炮弹
    for (let b of bullets) b.update();
    // 移除死亡炮弹
    bullets = bullets.filter(b => !b.dead);

    // 更新坑洞
    for (let p of pits) p.update();

    // 更新滚动石头
    for (let s of stones) s.update();

    // 更新浮动云朵
    for (let c of clouds) c.update();

    // 更新耀西的蛋
    for (let egg of yoshiEggs) egg.update();
    // 移除消失的蛋
    yoshiEggs = yoshiEggs.filter(egg => egg.life > 0);

    // 更新管道（地下入口/出口）
    for (let p of pipes) p.update();

    // 如果在地下关卡，更新地下陷阱
    if (isInUnderground) {
        for (let t of undergroundTraps) t.update();
        for (let p of undergroundPipes) p.update();
    }

    for (let q of questions) {
        if (!q.done && Math.hypot(player.x-q.x, player.y-q.y) < 40) {
            // 互斥逻辑：根据方块类型决定是计算题还是道具
            if (q.type === 'item') {
                // 道具类型：直接掉落道具
                const item = new Item(q.x, q.y, q.itemType);
                item.vy = -8;
                item.vx = (Math.random() - 0.5) * 2;
                items.push(item);
                q.itemSpawned = true;
                q.done = true;

                // 更新解锁进度（只在全解锁模式下计数）
                if (requireAllBoxes) {
                    unlockedBoxes++;
                    updateProgressBar();
                }

                showHint(q.itemType === 'ELECTRIC' ? '⚡ 电击弹!' :
                         q.itemType === 'SPREAD' ? '🔥 散弹枪!' :
                         q.itemType === 'FLAME' ? '🐉 火龙炮!' :
                         q.itemType === 'ICE' ? '❄️ 冰冻弹!' :
                         q.itemType === 'BUBBLE' ? '🫧 水泡泡!' :
                         q.itemType === 'LASER' ? '⚡ 激光炮!' :
                         q.itemType === 'MISSILE' ? '🚀 追踪导弹!' :
                         q.itemType === 'POISON' ? '☠️ 毒液弹!' :
                         q.itemType === 'RAINBOW' ? '🌈 彩虹弹!' :
                         q.itemType === 'STAR' ? '⭐ 星星!' :
                         q.itemType === 'SUNFLOWER' ? '🌻 向日葵!' :
                         q.itemType === 'COIN' ? '🪙 金币!' : '💎 钻石!');
            } else {
                // 计算题类型：显示算术题
                showQ(q);
            }
        }
    }

    // 特殊变身箱子碰撞检测
    if (specialTransformBox && !specialTransformBox.done) {
        if (Math.hypot(player.x - specialTransformBox.x, player.y - specialTransformBox.y) < 45) {
            specialTransformBox.done = true;
            player.isTransformed = true;
            player.transformTimer = 600; // 10秒 (60fps * 10)
            AudioSys.playTransform();
            showHint('⚡ 变身为炫蓝雷霆！');
        }
    }

    // 过关检查
    checkWinCondition();
}

function checkWinCondition() {
    const dx = Math.abs(player.x - flag.x);
    const dy = Math.abs(player.y - flag.y);

    // 使用原来的碰撞检测范围：x方向40，y方向60
    if (dx < 40 && dy < 60) {
        // 检查是否需要解锁所有箱子
        if (requireAllBoxes && unlockedBoxes < totalBoxes) {
            showHint(`❌ 还需要解锁 ${totalBoxes - unlockedBoxes} 个箱子!`);
            return;
        }

        if (level < 3) {
            level++; score += 100;
            AudioSys.playWin();
            initPlatformer();
        } else {
            state = 'over';
            AudioSys.playWin();
            showVictoryScreen();
        }
    }
}
