function drawPlatformer() {
    // 根据是否在地下关卡使用不同的背景
    if (isInUnderground) {
        // 地下背景（深色洞穴）
        ctx.fillStyle = '#2D2D2D'; ctx.fillRect(0,0,cvs.width,cvs.height);

        // 地下岩壁纹理
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        for (let i = 0; i < 20; i++) {
            const rx = (i * 150 - cam * 0.5) % (cvs.width + 200);
            ctx.fillRect(rx, 20, 80, 30);
            ctx.fillRect(rx + 40, 80, 60, 20);
        }
    } else {
        // 地面背景（蓝天白云）
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0,0,cvs.width,cvs.height);

        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        const bgClouds = [[100,80,30],[300,120,40],[500,60,25],[700,100,35]];
        for (let i = 0; i < bgClouds.length; i++) {
            const [x, y, r] = bgClouds[i];
            ctx.beginPath();
            ctx.arc(x - (cam * 0.3) % (cvs.width + 200) + i*200, y, r, 0, Math.PI*2);
            ctx.fill();
        }
    }

    // 地面
    const levelLength = level === 1 ? 15000 : (level === 2 ? 20000 : 25000);
    ctx.fillStyle = '#4ADE80'; ctx.fillRect(0-cam,450,levelLength,10);
    ctx.fillStyle = '#D97706'; ctx.fillRect(0-cam,460,levelLength,90);

    ctx.fillStyle = '#8B5CF6';
    for (let b of blocks.slice(1)) ctx.fillRect(b[0]-cam,b[1],b[2],b[3]);

    // 绘制坑洞（在敌人之前，这样敌人会掉到洞里）
    for (let p of pits) p.draw();

    for (let item of items) item.draw();
    for (let c of coins) c.draw();
    for (let e of enemies) e.draw();

    // 绘制浮动云朵（在敌人之后，玩家可以跳到上面）
    for (let c of clouds) c.draw();

    // 绘制滚动石头
    for (let s of stones) s.draw();

    // 绘制耀西的蛋（在玩家身后）
    for (let egg of yoshiEggs) egg.draw();

    // 绘制管道（地下入口）
    for (let p of pipes) p.draw();

    // 如果在地下关卡，绘制地下特有的元素
    if (isInUnderground) {
        for (let t of undergroundTraps) t.draw();
        for (let p of undergroundPipes) p.draw();
    }

    for (let b of bullets) b.draw();
    for (let q of questions) q.draw();

    // 绘制特殊变身箱子
    if (specialTransformBox) specialTransformBox.draw();

    // 旗帜 - 如果强制解锁模式且箱子未全开，显示锁定
    const isLocked = requireAllBoxes && unlockedBoxes < totalBoxes;

    ctx.fillStyle = '#8B4513';
    ctx.fillRect(flag.x-cam, flag.y, 8, 100);

    if (isLocked) {
        // 锁定状态的旗帜
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.moveTo(flag.x-cam+8, flag.y);
        ctx.lineTo(flag.x-cam+50, flag.y+20);
        ctx.lineTo(flag.x-cam+8, flag.y+40);
        ctx.fill();

        // 锁定图标
        ctx.font = '30px Arial';
        ctx.fillText('🔒', flag.x-cam+25, flag.y+70);
    } else {
        // 正常旗帜
        ctx.fillStyle = '#FF6B6B';
        ctx.beginPath();
        ctx.moveTo(flag.x-cam+8, flag.y);
        ctx.lineTo(flag.x-cam+50, flag.y+20);
        ctx.lineTo(flag.x-cam+8, flag.y+40);
        ctx.fill();
    }

    player.draw();

    // 绘制当前火力模式（永久显示）
    if (playerFireMode !== 'normal') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(10, 100, 130, 30);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'left';
        const modeNames = {
            electric: '⚡电击弹', spread: '🔥散弹枪', flame: '🐉火龙炮',
            ice: '❄️冰冻弹', bubble: '🫧水泡泡', laser: '⚡激光炮',
            missile: '🚀追踪导弹', poison: '☠️毒液弹', rainbow: '🌈彩虹弹'
        };
        ctx.fillText(modeNames[playerFireMode] || playerFireMode, 15, 120);
        ctx.textAlign = 'start';
    }
}

// 提示系统
let hintTimer = null;
function showHint(text) {
    const existing = document.getElementById('hint');
    if (existing) existing.remove();

    const hint = document.createElement('div');
    hint.id = 'hint';
    hint.style.cssText = 'position:absolute;top:30%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:15px 30px;border-radius:25px;font-size:24px;z-index:150;animation:slideDown 0.3s;';
    hint.textContent = text;
    document.getElementById('game').appendChild(hint);

    if (hintTimer) clearTimeout(hintTimer);
    hintTimer = setTimeout(() => {
        if (hint.parentNode) hint.remove();
    }, 1500);
}

function showQ(block) {
    state = 'q';

    // 对于图形比较题，显示更丰富的界面
    if (block.q.type === 'compare' && block.q.compare) {
        const { count1, count2, shape1, shape2 } = block.q.compare;
        let displayText = '';
        for (let i = 0; i < count1; i++) displayText += shape1;
        displayText += ' ○ ';
        for (let i = 0; i < count2; i++) displayText += shape2;
        document.getElementById('qtext').innerHTML = `<div style="font-size:24px">${displayText}</div>`;
    } else {
        document.getElementById('qtext').textContent = block.q.text;
    }

    const btns = document.getElementById('btns'); btns.innerHTML = '';
    block.q.opts.forEach(opt => {
        const b = document.createElement('button'); b.className = 'ans'; b.textContent = opt;
        b.onclick = () => answer(block, opt);
        btns.appendChild(b);
    });
    document.getElementById('panel').style.display = 'block';
}

function answer(block, sel) {
    document.getElementById('panel').style.display = 'none';
    state = 'play';
    if (sel === block.q.ans) {
        block.done = true; score += 50; candies += 2;

        // 更新解锁进度
        if (requireAllBoxes) {
            unlockedBoxes++;
            updateProgressBar();
        }

        AudioSys.playCoin(); updateUI();
        if (!block.itemSpawned) {
            const item = new Item(block.x, block.y, block.itemType);
            item.vy = -8;
            item.vx = (Math.random() - 0.5) * 2;
            items.push(item);
            block.itemSpawned = true;
            showHint(block.itemType === 'ELECTRIC' ? '⚡ 电击弹!' :
                     block.itemType === 'SPREAD' ? '🔥 散弹枪!' :
                     block.itemType === 'FLAME' ? '🐉 火龙炮!' :
                     block.itemType === 'ICE' ? '❄️ 冰冻弹!' :
                     block.itemType === 'BUBBLE' ? '🫧 水泡泡!' :
                     block.itemType === 'LASER' ? '⚡ 激光炮!' :
                     block.itemType === 'MISSILE' ? '🚀 追踪导弹!' :
                     block.itemType === 'POISON' ? '☠️ 毒液弹!' :
                     block.itemType === 'RAINBOW' ? '🌈 彩虹弹!' :
                     block.itemType === 'STAR' ? '⭐ 星星!' :
                     block.itemType === 'SUNFLOWER' ? '🌻 向日葵!' :
                     block.itemType === 'COIN' ? '🪙 金币!' : '💎 钻石!');
        }
    } else {
        AudioSys.playFail();
        showHint('❌ 答错了!');
    }
}

function collectItem(type) {
    const item = ITEM_TYPES[type] || ITEM_TYPES.COIN;
    if (!item) return;
    if (item.effect === 'score') {
        score += item.score; AudioSys.playCoin();
    } else if (item.effect === 'fireMode') {
        playerFireMode = item.mode;
        AudioSys.playTransform();
        showHint(`${item.emoji} ${item.name}！火力强化！`);
    } else if (item.effect === 'invincible') {
        player.invincible = 300; AudioSys.playTransform();
    }
}

// ==================== 消消乐 ====================
function startElimination() {
    AudioSys.init(); AudioSys.playClick();
    if (elimAnimId) cancelAnimationFrame(elimAnimId);
    if (platformerAnimId) cancelAnimationFrame(platformerAnimId);
    gameMode = 'elimination';
    document.getElementById('start').style.display = 'none';
    document.getElementById('gameUI').style.display = 'none';
    document.getElementById('elimUI').style.display = 'inline';
    document.getElementById('elimTarget').style.display = 'block';
    document.getElementById('touch').classList.add('elim-mode');
    document.getElementById('progressBar').style.display = 'none';
    state = 'play'; elimScore = 0; elimItems = []; elimSelected = [];
    elimTimer = 0; elimSpeed = 1.5; elimSpawnTimer = 0;
    elimTarget = Math.floor(Math.random() * 6) + 5;
    document.getElementById('elimTargetNum').textContent = elimTarget;
    document.getElementById('targetNum').textContent = elimTarget;
    // 启动背景音乐
    AudioSys.startBGM();
    elimLoop();
}

function elimLoop() {
    if ((state !== 'play' && state !== 'q') || gameMode !== 'elimination') return;
    elimUpdate(); elimDraw();
    elimAnimId = requestAnimationFrame(elimLoop);
}

function elimUpdate() {
    elimTimer++;
    elimSpawnTimer++;
    if (elimSpawnTimer > 90) {
        elimSpawnItems(); elimSpawnTimer = 0;
        if (elimSpeed < 4) elimSpeed += 0.05;
    }
    for (let i = elimItems.length - 1; i >= 0; i--) {
        let item = elimItems[i];
        if (item.special === 'CLOUD') { item.y += elimSpeed * 0.5; item.x += Math.sin(elimTimer/30)*0.5; }
        else if (item.frozen) item.y += elimSpeed * 0.3;
        else item.y += elimSpeed;
        if (item.y > cvs.height + 50) elimItems.splice(i, 1);
        if (item.freezeTime) { item.freezeTime--; if (item.freezeTime <= 0) item.frozen = false; }
    }
    elimItems = elimItems.filter(item => !item.cleared);
}

function elimSpawnItems() {
    const cols = 4, colWidth = cvs.width / cols;
    for (let i = 0; i < cols; i++) {
        const rand = Math.random();
        if (rand < 0.15) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'MINE',emoji:'💣',type:'special',cleared:false});
        else if (rand < 0.25) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'CLOUD',emoji:'☁️',type:'special',cleared:false});
        else if (rand < 0.32) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'FREEZE',emoji:'❄️',type:'special',cleared:false});
        else if (rand < 0.38) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'LIGHTNING',emoji:'⚡',type:'special',cleared:false});
        else {
            const num = Math.floor(Math.random() * 11);
            elimItems.push({x:i*colWidth+colWidth/2,y:-50,value:num,type:'number',selected:false,cleared:false});
        }
    }
}

function elimDraw() {
    ctx.fillStyle = '#E8F4FF'; ctx.fillRect(0,0,cvs.width,cvs.height);
    ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) { ctx.beginPath(); ctx.moveTo(i*cvs.width/4,0); ctx.lineTo(i*cvs.width/4,cvs.height); ctx.stroke(); }
    for (let item of elimItems) {
        if (item.cleared) continue;
        if (item.type === 'number') {
            ctx.fillStyle = item.selected ? '#4ade80' : '#F472B6';
            ctx.beginPath(); ctx.arc(item.x, item.y, 30, 0, Math.PI*2); ctx.fill();
            if (item.selected) { ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.stroke(); }
            ctx.fillStyle = 'white'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(item.value, item.x, item.y);
        } else {
            ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            if (item.frozen) { ctx.globalAlpha = 0.7; ctx.fillStyle = '#87CEEB'; ctx.beginPath(); ctx.arc(item.x, item.y, 35, 0, Math.PI*2); ctx.fill(); }
            ctx.fillText(item.emoji, item.x, item.y); ctx.globalAlpha = 1;
        }
    }
    if (elimSelected.length > 0) {
        ctx.fillStyle = '#4ade80'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
        let sum = elimSelected.reduce((a,b)=>a+b.value,0);
        let text = elimSelected.map(s=>s.value).join(' + ');
        if (elimSelected.length === 1) text += ' + ?';
        ctx.fillText(text + ' = ' + sum, cvs.width/2, 130);
    }
    ctx.fillStyle = '#333'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'left';
    ctx.fillText('💎 ' + elimScore, 15, 35);
    for (let i = elimEffects.length - 1; i >= 0; i--) {
        let eff = elimEffects[i];
        eff.life--;
        eff.y -= 1;
        eff.scale += 0.01;
        if (eff.life <= 0) { elimEffects.splice(i, 1); continue; }
        ctx.save();
        ctx.translate(eff.x, eff.y);
        ctx.scale(eff.scale, eff.scale);
        ctx.globalAlpha = eff.life / 60;
        ctx.fillStyle = eff.color || (eff.text.includes('PERFECT') ? '#FF69B4' : eff.text.includes('GREAT') ? '#FFD700' : '#4ade80');
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'white';
        ctx.shadowBlur = 10;
        ctx.fillText(eff.text, 0, 0);
        ctx.restore();
    }
}

function elimClick(x, y) {
    for (let item of elimItems) {
        if (item.cleared) continue;
        const dist = Math.sqrt((x-item.x)**2 + (y-item.y)**2);
        if (dist < 35) {
            if (item.type === 'special') elimHandleSpecial(item);
            else elimHandleNumber(item);
            return;
        }
    }
}

function elimHandleSpecial(item) {
    if (item.special === 'MINE') {
        elimScore -= 50;
        elimEffects.push({x: item.x, y: item.y, text: 'BOOM!', life: 40, scale: 1, color: '#FF0000'});
        elimEndGame();
    }
    else if (item.special === 'CLOUD') {
        elimItems.forEach(i=>i.y-=100);
        elimEffects.push({x: cvs.width/2, y: cvs.height/2, text: 'SLOW!', life: 50, scale: 1.2, color: '#87CEEB'});
        AudioSys.playCoin();
    }
    else if (item.special === 'FREEZE') {
        elimItems.forEach(i=>{i.frozen=true;i.freezeTime=300;});
        elimEffects.push({x: cvs.width/2, y: cvs.height/2, text: 'FREEZE!', life: 50, scale: 1.2, color: '#00CED1'});
        AudioSys.playTransform();
    }
    else if (item.special === 'LIGHTNING') {
        elimSpeed = Math.min(elimSpeed+2, 6);
        elimEffects.push({x: cvs.width/2, y: cvs.height/2, text: 'SPEED UP!', life: 50, scale: 1.2, color: '#FFD700'});
        AudioSys.playTransform();
    }
    item.cleared = true;
}

let elimEffects = [];

function elimHandleNumber(item) {
    if (item.selected) { item.selected = false; elimSelected = elimSelected.filter(s=>s!==item); }
    else if (elimSelected.length < 2) { item.selected = true; elimSelected.push(item); }
    if (elimSelected.length === 2) {
        const sum = elimSelected[0].value + elimSelected[1].value;
        if (sum === elimTarget) {
            const midX = (elimSelected[0].x + elimSelected[1].x) / 2;
            const midY = (elimSelected[0].y + elimSelected[1].y) / 2;
            elimSelected.forEach(s=>s.cleared=true);
            elimScore += sum * 10;
            const praises = ['GOOD!', 'GREAT!', 'PERFECT!', 'AWESOME!', 'EXCELLENT!'];
            const praise = praises[Math.floor(Math.random() * praises.length)];
            elimEffects.push({x: midX, y: midY, text: praise, life: 60, scale: 1});
            AudioSys.speakPraise(praise);
            if (Math.random() > 0.5) {
                elimEffects.push({x: midX, y: midY - 40, text: '+' + (sum * 10), life: 40, scale: 0.8, color: '#FFD700'});
            }
            elimTarget = Math.floor(Math.random()*6)+5;
            document.getElementById('elimTargetNum').textContent = elimTarget;
            document.getElementById('targetNum').textContent = elimTarget;
            AudioSys.playCoin();
        } else {
            const midX = (elimSelected[0].x + elimSelected[1].x) / 2;
            const midY = (elimSelected[0].y + elimSelected[1].y) / 2;
            elimEffects.push({x: midX, y: midY, text: 'TRY AGAIN!', life: 40, scale: 0.8, color: '#FF6B6B'});
            AudioSys.playFail();
        }
        elimSelected.forEach(s=>s.selected=false); elimSelected = [];
    }
}

function elimEndGame() {
    state = 'over'; gameMode = '';
    document.getElementById('endTitle').textContent = '💣 游戏结束';
    document.getElementById('final').textContent = elimScore;
    document.getElementById('over').style.display = 'flex';
    document.getElementById('elimTarget').style.display = 'none';
}

// ==================== 马戏团跳火圈游戏 ====================
// 跑道配置
const CIRCUS_LANES = [
    { id: 0, y: 320, label: '上' },
    { id: 1, y: 400, label: '中' },
    { id: 2, y: 480, label: '下' }
];
let currentLane = 1; // 默认中间跑道

class CircusPlayer {
    constructor(animal) {
        this.animal = animal;
        this.x = 150;
        this.y = CIRCUS_LANES[1].y; // 默认中间跑道
        this.targetY = this.y;
        this.vy = 0;
        this.width = 60;
        this.height = 60;
        this.grounded = true;
        this.jumpPower = -18 * animal.jump;
        this.runSpeed = 5 * animal.speed;
        this.animationFrame = 0;
        this.lane = 1; // 当前跑道 0=上, 1=中, 2=下
    }

    jump() {
        if (this.grounded) {
            this.vy = this.jumpPower;
            this.grounded = false;
            AudioSys.playJump();
        }
    }

    changeLane(direction) {
        // direction: -1 = 上, 1 = 下
        const newLane = this.lane + direction;
        if (newLane >= 0 && newLane <= 2) {
            this.lane = newLane;
            this.targetY = CIRCUS_LANES[newLane].y;
            AudioSys.playClick();
        }
    }

    update() {
        this.animationFrame++;
        // 自动向前奔跑
        circusDistance += this.runSpeed * 0.1;

        // 平滑切换跑道
        const dy = this.targetY - this.y;
        if (Math.abs(dy) > 2) {
            this.y += dy * 0.15;
        } else {
            this.y = this.targetY;
        }

        // 重力（只在跳跃时生效）
        if (!this.grounded || this.y < this.targetY - 5) {
            this.vy += 0.8;
            this.y += this.vy;
        }

        // 地面检测
        if (this.y > this.targetY && this.vy > 0) {
            this.y = this.targetY;
            this.vy = 0;
            this.grounded = true;
        }
    }

    draw(ctx) {
        ctx.save();

        // 奔跑动画 - 身体上下起伏
        const bounce = this.grounded ? Math.sin(this.animationFrame * 0.3) * 5 : 0;

        // 绘制动物
        ctx.translate(this.x, this.y + bounce);

        // 根据动物类型绘制不同外观
        this.drawAnimal(ctx);

        ctx.restore();
    }

    drawAnimal(ctx) {
        const { emoji, color } = this.animal;

        // 绘制阴影
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(0, 45, 30, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 身体跳动动画
        const legOffset = this.grounded ? Math.sin(this.animationFrame * 0.3) * 3 : 0;

        // 后腿
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(-15 + legOffset, 20, 12, 18, -0.3, 0, Math.PI * 2);
        ctx.fill();

        // 前腿
        ctx.beginPath();
        ctx.ellipse(15 - legOffset, 20, 12, 18, 0.3, 0, Math.PI * 2);
        ctx.fill();

        // 身体
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(0, 0, 35, 30, 0, 0, Math.PI * 2);
        ctx.fill();

        // 身体高光
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(-10, -10, 15, 10, -0.5, 0, Math.PI * 2);
        ctx.fill();

        // 绘制emoji表情
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 0, -5);

        // 如果是跳跃状态，绘制跳跃特效
        if (!this.grounded) {
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-20, 40);
            ctx.quadraticCurveTo(0, 50, 20, 40);
            ctx.stroke();
        }
    }
}

class FireRing {
    constructor(x, lane, isQuestion = true) {
        this.x = x;
        this.lane = lane; // 跑道 0=上, 1=中, 2=下
        this.y = CIRCUS_LANES[lane].y; // 根据跑道设置Y坐标
        this.radius = 40; // 火圈半径
        this.passed = false;
        this.isQuestion = isQuestion;
        this.question = isQuestion ? generateCircusQuestion() : null;
        this.animationFrame = 0;
        this.questionShown = false;
        this.answered = false;
        this.correct = false;
        this.passingThrough = false; // 是否正在穿过火圈
    }

    update() {
        this.animationFrame++;
        // 火圈随场景移动
        this.x -= circusPlayer.runSpeed;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        // 火焰动画
        const flameOffset = Math.sin(this.animationFrame * 0.2) * 3;

        // 外圈火焰 - 垂直圆形火圈
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2 + this.animationFrame * 0.05;
            const radius = this.radius + 8 + Math.sin(this.animationFrame * 0.3 + i) * 4;
            const fx = Math.cos(angle) * radius;
            const fy = Math.sin(angle) * radius;

            // 火焰渐变
            const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, 14);
            grad.addColorStop(0, '#FFD700');
            grad.addColorStop(0.4, '#FF8C00');
            grad.addColorStop(0.8, '#FF4500');
            grad.addColorStop(1, 'rgba(255,69,0,0)');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(fx, fy + flameOffset * 0.5, 14, 0, Math.PI * 2);
            ctx.fill();
        }

        // 火圈内部（完全透明空心）
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius - 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        // 火圈内边框（细线勾勒）
        ctx.strokeStyle = '#FF6347';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius - 8, 0, Math.PI * 2);
        ctx.stroke();

        // 火圈外边框
        ctx.strokeStyle = '#FF4500';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius + 2, 0, Math.PI * 2);
        ctx.stroke();

        // 如果已回答正确，显示绿色勾
        if (this.answered && this.correct) {
            ctx.fillStyle = '#4ade80';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 5;
            ctx.fillText('✓', 0, 0);
            ctx.shadowBlur = 0;
        }

        // 如果已回答错误，显示红色叉
        if (this.answered && !this.correct) {
            ctx.fillStyle = '#FF4444';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 5;
            ctx.fillText('✗', 0, 0);
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    }

    checkCollision(player) {
        // 首先检查是否在同一个跑道
        if (this.lane !== player.lane) return false;

        // 检查玩家是否从火圈中间穿过
        const dx = this.x - player.x;
        const dy = this.y - (player.y - 25); // 玩家中心点
        const distance = Math.sqrt(dx * dx + dy * dy);

        // 玩家在火圈圆形范围内（内圈）
        return distance < (this.radius - 15) && !this.passed;
    }

    checkApproaching(player) {
        // 首先检查是否在同一个跑道
        if (this.lane !== player.lane) return false;

        // 检查是否接近火圈需要出题（距离火圈一定距离时）
        const dx = this.x - player.x;
        const dy = this.y - (player.y - 25);
        const distance = Math.sqrt(dx * dx + dy * dy);

        // 接近火圈但还没到，需要出题
        return distance < 250 && distance > this.radius && this.x > player.x - 50;
    }
}

// 生成马戏团算术题
function generateCircusQuestion() {
    const ops = ['+', '-'];
    const op = ops[Math.floor(Math.random() * ops.length)];
    let a, b, ans;

    if (op === '+') {
        a = Math.floor(Math.random() * 10) + 1;
        b = Math.floor(Math.random() * 10) + 1;
        ans = a + b;
    } else {
        a = Math.floor(Math.random() * 10) + 5;
        b = Math.floor(Math.random() * a);
        ans = a - b;
    }

    return { q: `${a} ${op} ${b} = ?`, ans: ans };
}

// 初始化马戏团游戏
function initCircus() {
    circusDistance = 0;
    circusSpeed = 0;
    circusRings = [];
    circusQuestionActive = false;
    currentRing = null;
    currentLane = 1; // 重置到中间跑道

    // 生成火圈 - 随机出现在3条跑道之一
    // 1500米赛道，约30秒完成，火圈全程随机出现
    const totalRings = 10; // 增加火圈数量
    const minSpacing = 120; // 最小间距，避免过于集中
    const startOffset = 200; // 起始偏移
    const endOffset = 1300; // 结束偏移

    let lastX = startOffset;

    for (let i = 0; i < totalRings; i++) {
        // 随机间距，确保不会过于集中
        const spacing = minSpacing + Math.random() * 80; // 120-200米间距
        const ringX = lastX + spacing;

        // 确保不超过终点
        if (ringX > endOffset) break;

        // 随机选择跑道 0=上, 1=中, 2=下
        const lane = Math.floor(Math.random() * 3);
        circusRings.push(new FireRing(ringX, lane, true));

        lastX = ringX;
    }
}

// 马戏团游戏循环
function circusLoop() {
    if ((state !== 'play' && state !== 'q') || gameMode !== 'circus') return;

    updateCircus();
    drawCircus();

    circusAnimId = requestAnimationFrame(circusLoop);
}

// 更新马戏团游戏
function updateCircus() {
    if (circusQuestionActive) return;

    // 更新玩家
    circusPlayer.update();

    // 更新火圈
    for (let ring of circusRings) {
        ring.update();

        // 检查是否接近火圈需要出题（使用新的检测方法）
        if (!ring.passed && !ring.questionShown && ring.checkApproaching(circusPlayer)) {
            ring.questionShown = true;
            currentRing = ring;
            showCircusQuestion(ring);
        }

        // 检查是否成功穿过火圈（玩家必须从火圈中间穿过）
        if (!ring.passed && ring.answered && ring.correct && ring.checkCollision(circusPlayer)) {
            ring.passed = true;
            ring.passingThrough = true;
            // 播放成功穿过音效
            AudioSys.playCoin();
        }

        // 如果已经回答正确但没从中间穿过，火圈移到身后也算通过
        if (!ring.passed && ring.answered && ring.correct && ring.x < circusPlayer.x - 80) {
            ring.passed = true;
        }

        // 如果回答了但没答对，且已经错过火圈，立即结束游戏
        if (!ring.passed && ring.answered && !ring.correct && ring.x < circusPlayer.x - 50) {
            if (state === 'play') {
                state = 'over';
                setTimeout(() => circusGameOver(false), 0);
            }
            return;
        }
    }

    // 移除已离开屏幕的火圈
    circusRings = circusRings.filter(r => r.x > -100);

    // 检查是否到达终点
    if (circusDistance >= circusTargetDistance) {
        circusWin();
    }
}

// 绘制马戏团游戏
function drawCircus() {
    const ctx = document.getElementById('cvs').getContext('2d');
    const w = cvs.width, h = cvs.height;

    // 绘制背景 - 马戏团主题
    const gradient = ctx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, '#FF6B6B');
    gradient.addColorStop(0.5, '#FFE66D');
    gradient.addColorStop(1, '#FFA07A');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);

    // 绘制条纹帐篷效果
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for (let i = 0; i < 10; i++) {
        const x = (i * 80 - circusDistance * 0.5) % (w + 100) - 50;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + 40, 0);
        ctx.lineTo(x + 20, h);
        ctx.lineTo(x - 20, h);
        ctx.closePath();
        ctx.fill();
    }

    // 绘制3条跑道
    const laneColors = ['#CD853F', '#D2691E', '#8B4513'];
    CIRCUS_LANES.forEach((lane, index) => {
        // 跑道背景
        ctx.fillStyle = laneColors[index];
        ctx.fillRect(0, lane.y - 40, w, 80);

        // 跑道边框线
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(0, lane.y - 40);
        ctx.lineTo(w, lane.y - 40);
        ctx.moveTo(0, lane.y + 40);
        ctx.lineTo(w, lane.y + 40);
        ctx.stroke();
        ctx.setLineDash([]);
    });

    // 跑道分隔虚线
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([20, 20]);
    for (let i = 0; i < w / 40 + 1; i++) {
        const x = (i * 40 - circusDistance * 2) % (w + 40);
        ctx.beginPath();
        ctx.moveTo(x, CIRCUS_LANES[0].y);
        ctx.lineTo(x + 20, CIRCUS_LANES[0].y);
        ctx.moveTo(x, CIRCUS_LANES[1].y);
        ctx.lineTo(x + 20, CIRCUS_LANES[1].y);
        ctx.moveTo(x, CIRCUS_LANES[2].y);
        ctx.lineTo(x + 20, CIRCUS_LANES[2].y);
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // 绘制进度条背景
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(20, 20, w - 40, 20);

    // 绘制进度（基于剩余火圈数量）
    const passedRings = circusRings.filter(r => r.passed).length;
    const totalRings = circusRings.length;
    const progress = totalRings > 0 ? passedRings / totalRings : 0;
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(20, 20, (w - 40) * progress, 20);

    // 进度条边框
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.strokeRect(20, 20, w - 40, 20);

    // 绘制终点标志
    const finishX = 20 + (w - 40) - 15;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(finishX, 15);
    ctx.lineTo(finishX + 15, 22);
    ctx.lineTo(finishX, 29);
    ctx.fill();

    // 绘制火圈
    for (let ring of circusRings) {
        if (ring.x > -100 && ring.x < w + 100) {
            ring.draw(ctx);
        }
    }

    // 绘制玩家
    circusPlayer.draw(ctx);

    // 绘制距离显示
    ctx.fillStyle = 'white';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(`🔥 ${passedRings}/${circusRings.length} 个火圈`, 20, 70);
    ctx.shadowBlur = 0;

    // 绘制操作提示
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText('🔥 跳起来从火圈中间穿过去！🔥', w / 2, h - 55);
    ctx.font = '14px Arial';
    ctx.fillText('↑↓ 或 WS 切换跑道 | 空格或点击跳跃', w / 2, h - 35);
    ctx.font = '12px Arial';
    ctx.fillText('当前跑道: ' + CIRCUS_LANES[circusPlayer.lane].label, w / 2, h - 15);
    ctx.shadowBlur = 0;
}

// 生成选项
function generateCircusOptions(correct) {
    const options = [correct];
    while (options.length < 4) {
        const wrong = correct + Math.floor(Math.random() * 10) - 5;
        if (wrong !== correct && wrong >= 0 && !options.includes(wrong)) {
            options.push(wrong);
        }
    }
    // 打乱顺序
    return options.sort(() => Math.random() - 0.5);
}

// 回答问题
function answerCircusQuestion(answer, correct, btn) {
    const modal = document.getElementById('circusQuestionModal');
    const isCorrect = answer === correct;

    if (isCorrect) {
        btn.style.background = 'linear-gradient(145deg, #4ade80, #22c55e)';
        AudioSys.playCoin();

        currentRing.answered = true;
        currentRing.correct = true;

        setTimeout(() => {
            modal.remove();
            circusQuestionActive = false;
            state = 'play';
        }, 500);
    } else {
        btn.style.background = 'linear-gradient(145deg, #FF4444, #DC2626)';
        AudioSys.playFail();

        currentRing.answered = true;
        currentRing.correct = false;

        // 立即关闭题目，避免状态不一致导致卡屏
        circusQuestionActive = false;
        state = 'play';

        setTimeout(() => {
            modal.remove();
            // 玩家可以继续跑，但当前火圈已标记为错误
            // 当玩家错过火圈后游戏结束
        }, 300);
    }
}

// 马戏团游戏结束
function circusGameOver(isWin) {
    state = 'over';
    gameMode = '';

    if (circusAnimId) cancelAnimationFrame(circusAnimId);

    document.getElementById('endTitle').textContent = isWin ? '🎉 表演成功!' : '💥 表演失败!';
    document.getElementById('final').textContent = Math.floor(circusDistance);
    document.getElementById('over').style.display = 'flex';
}

// 马戏团胜利
function circusWin() {
    state = 'over';
    gameMode = '';

    if (circusAnimId) cancelAnimationFrame(circusAnimId);

    // 显示胜利界面
    const victoryDiv = document.createElement('div');
    victoryDiv.id = 'circusVictory';
    victoryDiv.style.cssText = `
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(255,107,107,0.95), rgba(255,230,109,0.95));
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        z-index: 9999;
        animation: fadeIn 0.5s ease-out;
    `;

    // 计算通过的火圈数量
    const passedRings = circusRings.filter(r => r.passed).length;

    victoryDiv.innerHTML = `
        <div style="font-size: 100px; animation: bounce 0.8s ease-in-out infinite;">🎪</div>
        <h1 style="font-size: 48px; margin: 20px 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.3);">🎉 表演大成功! 🎉</h1>
        <p style="font-size: 24px; margin: 15px;">${selectedCircusAnimal?.name || '小动物'} 完成了精彩表演!</p>
        <div style="background: rgba(255,255,255,0.2); padding: 20px 40px; border-radius: 20px; margin: 20px; text-align: center;">
            <p style="font-size: 28px; margin: 0;">🔥 成功穿越: ${passedRings}/${circusRings.length} 个火圈</p>
            <p style="font-size: 20px; margin: 10px 0 0 0; opacity: 0.9;">用时约30秒，太棒了!</p>
        </div>
        <div style="margin-top: 30px;">
            <button onclick="closeCircusVictory(); restartCircus();" style="
                padding: 18px 45px;
                font-size: 24px;
                background: linear-gradient(145deg, #FFD700, #FFA500);
                color: white;
                border: none;
                border-radius: 35px;
                cursor: pointer;
                margin-right: 15px;
                box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            ">🔄 再玩一次</button>
            <button onclick="closeCircusVictory(); backToMenu();" style="
                padding: 15px 35px;
                font-size: 20px;
                background: rgba(255,255,255,0.3);
                color: white;
                border: 2px solid white;
                border-radius: 30px;
                cursor: pointer;
            ">← 主菜单</button>
        </div>
    `;

    document.body.appendChild(victoryDiv);
    AudioSys.playWin();
}

// 关闭马戏团胜利界面
function closeCircusVictory() {
    const victory = document.getElementById('circusVictory');
    if (victory) victory.remove();
}

// 重新开始马戏团游戏
function restartCircus() {
    document.getElementById('over').style.display = 'none';
    closeCircusVictory();

    if (circusAnimId) cancelAnimationFrame(circusAnimId);

    circusDistance = 0;
    circusSpeed = 0;
    circusQuestionActive = false;
    currentRing = null;

    // 重新初始化
    circusPlayer = new CircusPlayer(selectedCircusAnimal);
    initCircus();

    state = 'play';
    gameMode = 'circus';
    circusLoop();
}

// 从马戏团返回主菜单
function backToMenuFromCircus() {
    document.getElementById('circusSelect').style.display = 'none';
    document.getElementById('start').style.display = 'flex';
}

// ==================== 游戏流程控制 ====================
function startPlatformer() {
    AudioSys.init(); AudioSys.playClick();
    if (elimAnimId) cancelAnimationFrame(elimAnimId);
    if (platformerAnimId) cancelAnimationFrame(platformerAnimId);

    // 显示角色选择界面
    document.getElementById('start').style.display = 'none';
    initCharSelect();
    document.getElementById('charSelect').style.display = 'flex';
}

function startGameAfterSelection() {
    gameMode = 'platformer';
    document.getElementById('gameUI').style.display = 'inline';
    document.getElementById('elimUI').style.display = 'none';
    document.getElementById('touch').classList.remove('elim-mode');
    level = 1; score = 0; candies = 0;
    state = 'play'; initPlatformer();
    lastTime = 0;
    frameCount = 0;
    // 启动背景音乐
    AudioSys.startBGM();
    loop();
}

function loop(timestamp) {
    if ((state !== 'play' && state !== 'q') || gameMode !== 'platformer') return;

    updatePlatformer(timestamp);
    drawPlatformer();

    platformerAnimId = requestAnimationFrame(loop);
}

function restart() {
    // 先设置状态为over，阻止所有游戏循环继续运行
    state = 'over';

    document.getElementById('over').style.display = 'none';

    // 取消所有动画帧
    if (elimAnimId) {
        cancelAnimationFrame(elimAnimId);
        elimAnimId = null;
    }
    if (platformerAnimId) {
        cancelAnimationFrame(platformerAnimId);
        platformerAnimId = null;
    }
    if (circusAnimId) {
        cancelAnimationFrame(circusAnimId);
        circusAnimId = null;
    }

    lastTime = 0;
    frameCount = 0;

    // 重置键盘状态，防止按键残留导致加速
    keys = {};
    ['ArrowLeft', 'ArrowRight', 'Space', 'KeyF'].forEach(k => keys[k] = false);
    if (gameMode === 'platformer') {
        level = 1; score = 0; candies = 0;
        // 确保玩家速度被重置
        if (player) {
            player.vx = 0;
            player.vy = 0;
            player.isTransformed = false;
            player.transformTimer = 0;
            player.invincible = 0;
            player.isBig = false;
            player.j = 0;
            player.g = false;
        }
        // 清除所有游戏对象
        bullets = [];
        items = [];
        enemies = [];
        initPlatformer();
        state = 'play';
        loop();
    }
    else if (gameMode === 'elimination') { elimScore = 0; elimItems = []; elimSelected = []; elimSpeed = 1.5; elimTarget = Math.floor(Math.random()*6)+5; document.getElementById('elimTargetNum').textContent = elimTarget; document.getElementById('targetNum').textContent = elimTarget; state = 'play'; elimLoop(); }
    else if (gameMode === 'circus') { restartCircus(); }
}

function win() {
    if (level < 3) {
        level++; score += 100;
        AudioSys.playWin();
        initPlatformer();
    } else {
        state = 'over';
        AudioSys.playWin();
        showVictoryScreen();
    }
}

function showVictoryScreen() {
    const oldVictory = document.getElementById('victory');
    if (oldVictory) oldVictory.remove();

    const victoryDiv = document.createElement('div');
    victoryDiv.id = 'victory';
    victoryDiv.style.cssText = 'position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(50,0,100,0.95)); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 9999; animation: fadeIn 0.5s ease-out;';

    const difficultyText = selectedDifficulty ? `${selectedDifficulty.emoji} ${selectedDifficulty.name}` : '';
    const settingText = requireAllBoxes ? '<br>📦 全解锁模式' : '';

    victoryDiv.innerHTML = `
        <div style="font-size: 100px; animation: trophyBounce 0.8s ease-in-out infinite; filter: drop-shadow(0 0 30px gold);">${selectedChar?.emoji || '🏆'}</div>
        <h1 style="font-size: 48px; margin: 20px 0; color: #FFD700; text-shadow: 0 0 30px #FFD700, 3px 3px 6px rgba(0,0,0,0.5); animation: slideDown 0.6s ease-out;">🎉 恭喜通关! 🎉</h1>
        <p style="font-size: 22px; margin: 10px; color: #aaa;">${difficultyText}${settingText}</p>
        <p style="font-size: 26px; margin: 15px; color: white; animation: fadeIn 1s ease-out;">${selectedChar?.name || '小勇士'} 你真是个数学小天才!</p>
        <div style="background: rgba(255,255,255,0.15); padding: 20px 40px; border-radius: 20px; margin: 20px; border: 2px solid gold; animation: scaleIn 0.8s ease-out;">
            <p style="font-size: 32px; margin: 0; color: #4ade80; font-weight: bold;">最终得分: ${score}</p>
            <p style="font-size: 20px; margin: 10px 0 0 0; color: #FCD34D;">糖果数量: ${candies} 🍬</p>
            ${selectedVehicle?.id !== 'none' ? `<p style="font-size: 16px; margin: 5px 0 0 0; color: #87CEEB;">载具: ${selectedVehicle.emoji} ${selectedVehicle.name}</p>` : ''}
        </div>
        <div style="margin-top: 40px; animation: slideUp 1s ease-out;">
            <button onclick="closeVictory(); restart();" style="padding: 18px 45px; font-size: 24px; background: linear-gradient(145deg, #FFD700, #FFA500); color: white; border: none; border-radius: 35px; cursor: pointer; margin-right: 15px; box-shadow: 0 6px 20px rgba(255, 165, 0, 0.4); transition: transform 0.2s;">🔄 再玩一次</button>
            <button onclick="closeVictory(); backToMenu();" style="padding: 15px 35px; font-size: 20px; background: linear-gradient(145deg, #666, #444); color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s;">← 主菜单</button>
        </div>
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden;" id="confetti-container"></div>
    `;
    document.getElementById('game').appendChild(victoryDiv);
    createConfetti();
}

function createConfetti() {
    const container = document.getElementById('confetti-container');
    if (!container) return;
    const colors = ['#FFD700', '#FF6B6B', '#4ade80', '#87CEEB', '#FF69B4', '#FFA500'];
    for (let i = 0; i < 50; i++) {
        setTimeout(() => {
            const confetti = document.createElement('div');
            confetti.style.cssText = `
                position: absolute;
                width: ${10 + Math.random() * 10}px;
                height: ${10 + Math.random() * 10}px;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                left: ${Math.random() * 100}%;
                top: -20px;
                border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                animation: confettiFall ${3 + Math.random() * 2}s linear forwards;
                transform: rotate(${Math.random() * 360}deg);
            `;
            container.appendChild(confetti);
            setTimeout(() => confetti.remove(), 5000);
        }, i * 100);
    }
}

function closeVictory() {
    const v = document.getElementById('victory');
    if (v) v.remove();
    document.getElementById('over').style.display = 'none';
}

function pauseGame() {
    if (state === 'play') { state = 'pause'; document.getElementById('pause').style.display = 'flex'; }
}

function resumeGame() {
    if (state === 'pause') {
        state = 'play';
        document.getElementById('pause').style.display = 'none';
        lastTime = 0;
        if (gameMode === 'platformer') loop();
        else if (gameMode === 'elimination') elimLoop();
    }
}

function backToMenu() {
    state = 'start'; gameMode = '';
    document.getElementById('over').style.display = 'none';
    document.getElementById('pause').style.display = 'none';
    document.getElementById('charSelect').style.display = 'none';
    document.getElementById('vehicleSelect').style.display = 'none';
    document.getElementById('difficultySelect').style.display = 'none';
    document.getElementById('settingsSelect').style.display = 'none';
    document.getElementById('start').style.display = 'flex';
    document.getElementById('gameUI').style.display = 'inline';
    document.getElementById('elimUI').style.display = 'none';
    document.getElementById('elimTarget').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
    selectedChar = null;
    selectedVehicle = null;
    selectedDifficulty = null;
    playerFireMode = 'normal';
    requireAllBoxes = false;
}

function updateUI() {
    document.getElementById('lvl').textContent = level;
    document.getElementById('score').textContent = score;
    document.getElementById('candy').textContent = candies;
}

// 发射炮弹函数
function fireBullet() {
    if (state !== 'play' || gameMode !== 'platformer' || !player) return;

    // 耀西特殊能力：吐出蛋或伸出舌头
    if (selectedChar?.id === 'yoshi') {
        // 如果嘴里有敌人，生成蛋
        if (player.yoshiMouthEnemy) {
            player.spawnYoshiEgg();
            return;
        }
        // 没有敌人时，伸出舌头吃敌人
        if (!player.yoshiTongueOut) {
            player.yoshiTongueOut = true;
            player.yoshiTongueTimer = 0;
            AudioSys.playFire();
            return;
        }
        return; // 舌头伸出中，不能连续吐舌头
    }

    const now = Date.now();
    if (now - lastFireTime < FIRE_COOLDOWN) return; // 冷却中

    lastFireTime = now;

    // 确定发射方向（根据玩家移动方向，默认向右）
    const direction = player.vx < 0 ? -1 : 1;

    // 根据火力模式发射不同类型的子弹
    switch(playerFireMode) {
        case 'electric':
            // 电击弹 - 单发高速穿透
            bullets.push(new Bullet(
                player.x + direction * 30,
                player.y,
                direction,
                'electric'
            ));
            break;

        case 'spread':
            // 散弹枪 - 三发散射
            bullets.push(new Bullet(
                player.x + direction * 30,
                player.y - 10,
                direction,
                'spread'
            ));
            bullets.push(new Bullet(
                player.x + direction * 30,
                player.y,
                direction,
                'spread'
            ));
            bullets.push(new Bullet(
                player.x + direction * 30,
                player.y + 10,
                direction,
                'spread'
            ));
            break;

        case 'flame':
            // 火龙炮 - 大型慢速高伤害
            bullets.push(new Bullet(player.x + direction * 35, player.y, direction, 'flame'));
            break;

        case 'ice':
            // 冰冻弹 - 冻结敌人
            bullets.push(new Bullet(player.x + direction * 30, player.y, direction, 'ice'));
            break;

        case 'bubble':
            // 水泡泡 - 弹跳穿透
            bullets.push(new Bullet(player.x + direction * 30, player.y - 10, direction, 'bubble'));
            bullets[bullets.length-1].vy = -3;
            break;

        case 'laser':
            // 激光炮 - 超高速穿透
            bullets.push(new Bullet(player.x + direction * 30, player.y, direction, 'laser'));
            break;

        case 'missile':
            // 追踪导弹 - 自动追踪敌人
            bullets.push(new Bullet(player.x + direction * 20, player.y, direction, 'missile'));
            break;

        case 'poison':
            // 毒液弹 - 持续伤害
            bullets.push(new Bullet(player.x + direction * 30, player.y, direction, 'poison'));
            break;

        case 'rainbow':
            // 彩虹弹 - 多彩效果
            bullets.push(new Bullet(player.x + direction * 30, player.y, direction, 'rainbow'));
            break;

        default:
            bullets.push(new Bullet(player.x + direction * 30, player.y, direction, 'normal'));
    }

    AudioSys.playFire();
}

// 键盘输入
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        e.preventDefault();
        if (state === 'play' && gameMode === 'platformer' && player) {
            player.jump();
        }
        // 马戏团模式跳跃
        if (state === 'play' && gameMode === 'circus' && circusPlayer) {
            circusPlayer.jump();
        }
    }
    // F键发射炮弹
    if (e.code === 'KeyF') {
        e.preventDefault();
        fireBullet();
    }
    if (e.code === 'Escape') { if (state === 'play') pauseGame(); else if (state === 'pause') resumeGame(); }
    // 马戏团模式跑道切换
    if (gameMode === 'circus' && state === 'play' && circusPlayer) {
        if (e.code === 'ArrowUp' || e.code === 'KeyW') {
            e.preventDefault();
            circusPlayer.changeLane(-1); // 切换到上跑道
        }
        if (e.code === 'ArrowDown' || e.code === 'KeyS') {
            e.preventDefault();
            circusPlayer.changeLane(1); // 切换到下跑道
        }
    }
});
document.addEventListener('keyup', e => keys[e.code] = false);

// 触控
function touch(id, key, isJump, isFire) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => {
        e.preventDefault();
        keys[key] = true;
        if (isJump && state === 'play' && gameMode === 'platformer' && player) player.jump();
        if (isJump && state === 'play' && gameMode === 'circus' && circusPlayer) circusPlayer.jump();
        if (isFire) fireBullet();
    });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
}
touch('l', 'ArrowLeft', false, false);
touch('r', 'ArrowRight', false, false);
touch('j', 'Space', true, false);
touch('f', 'KeyF', false, true);

// 画布点击 - 消消乐和马戏团模式
cvs.addEventListener('click', e => {
    if (gameMode === 'elimination' && state === 'play') {
        const rect = cvs.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (cvs.width / rect.width);
        const y = (e.clientY - rect.top) * (cvs.height / rect.height);
        elimClick(x, y);
    }
    // 马戏团模式点击控制
    if (gameMode === 'circus' && state === 'play' && circusPlayer) {
        const rect = cvs.getBoundingClientRect();
        const y = (e.clientY - rect.top) * (cvs.height / rect.height);
        const cvsHeight = cvs.height;

        // 点击上半部分切换到上跑道，下半部分切换到下跑道，中间跳跃
        if (y < cvsHeight * 0.35) {
            circusPlayer.changeLane(-1);
        } else if (y > cvsHeight * 0.65) {
            circusPlayer.changeLane(1);
        } else {
            circusPlayer.jump();
        }
    }
});

// 自适应
function setMobileViewport() {
    if (window.innerWidth <= 768) {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        cvs.width = window.innerWidth;
        cvs.height = vh;
        document.getElementById('game').style.height = vh + 'px';
    }
}
setMobileViewport();
window.addEventListener('resize', setMobileViewport);
if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setMobileViewport);
}
</script>
