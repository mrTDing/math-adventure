        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #667eea; font-family: 'Microsoft YaHei', sans-serif; }
        #game { position: relative; width: 100%; max-width: 800px; height: 100vh; max-height: 500px; }
        canvas { background: #87CEEB; border-radius: 10px; display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 16px; text-shadow: 1px 1px 2px black; }
        #panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; text-align: center; display: none; z-index: 100; }
        #qtext { font-size: 28px; margin-bottom: 15px; color: #333; }
        .ans { width: 60px; height: 50px; margin: 5px; font-size: 20px; border: none; border-radius: 10px; background: #f5576c; color: white; cursor: pointer; }
        .ans:hover { transform: scale(1.1); }
        #start, #over, #pause, #charSelect, #vehicleSelect, #difficultySelect, #settingsSelect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 200; }
        #over, #pause, #charSelect, #vehicleSelect, #difficultySelect, #settingsSelect { display: none; }
        h1 { font-size: 36px; margin-bottom: 20px; }
        button { padding: 12px 30px; font-size: 20px; border: none; border-radius: 20px; background: #fa709a; color: white; cursor: pointer; margin: 8px; }
        button:hover { transform: scale(1.05); }
        .btn-small { padding: 8px 20px; font-size: 16px; }
        #tips { margin-top: 15px; font-size: 14px; text-align: center; line-height: 1.6; }
        #modeSelect { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        /* 角色选择样式 */
        .char-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; max-width: 600px; }
        .char-option { width: 100px; height: 120px; background: rgba(255,255,255,0.1); border: 3px solid transparent; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
        .char-option:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        .char-option.selected { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .char-emoji { font-size: 50px; margin-bottom: 5px; }
        .char-name { font-size: 14px; }

        /* 载具选择样式 */
        .vehicle-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; max-width: 600px; }
        .vehicle-option { width: 120px; height: 130px; background: rgba(255,255,255,0.1); border: 3px solid transparent; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
        .vehicle-option:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        .vehicle-option.selected { border-color: #00CED1; background: rgba(0,206,209,0.2); }
        .vehicle-emoji { font-size: 45px; margin-bottom: 5px; }
        .vehicle-name { font-size: 14px; }
        .vehicle-stat { font-size: 11px; color: #aaa; margin-top: 3px; }

        /* 难度选择样式 */
        .difficulty-grid { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; width: 100%; max-width: 500px; padding: 0 20px; }
        .difficulty-option { padding: 15px 20px; background: rgba(255,255,255,0.1); border: 3px solid transparent; border-radius: 15px; cursor: pointer; display: flex; align-items: center; transition: all 0.2s; }
        .difficulty-option:hover { transform: scale(1.02); background: rgba(255,255,255,0.2); }
        .difficulty-option.selected { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .difficulty-emoji { font-size: 35px; margin-right: 15px; }
        .difficulty-info { flex: 1; text-align: left; }
        .difficulty-name { font-size: 18px; font-weight: bold; }
        .difficulty-desc { font-size: 13px; color: #aaa; margin-top: 3px; }

        /* 设置选择样式 */
        .settings-grid { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; width: 100%; max-width: 500px; padding: 0 20px; }
        .setting-option { padding: 18px 20px; background: rgba(255,255,255,0.1); border: 3px solid transparent; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; }
        .setting-option:hover { background: rgba(255,255,255,0.2); }
        .setting-option.selected { border-color: #4ade80; background: rgba(74,222,128,0.2); }
        .setting-info { text-align: left; }
        .setting-name { font-size: 18px; font-weight: bold; }
        .setting-desc { font-size: 13px; color: #aaa; margin-top: 3px; }
        .setting-check { font-size: 28px; color: #4ade80; }

        /* 当前选择显示 */
        .current-selection { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .selection-label { font-size: 12px; color: #aaa; }
        .selection-value { font-size: 20px; }

        /* 进度条 */
        .progress-bar { position: absolute; top: 40px; left: 10px; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; color: white; font-size: 14px; display: none; }
        .progress-fill { display: inline-block; width: 100px; height: 10px; background: rgba(255,255,255,0.3); border-radius: 5px; margin-left: 10px; overflow: hidden; vertical-align: middle; }
        .progress-fill-inner { height: 100%; background: linear-gradient(90deg, #4ade80, #FFD700); transition: width 0.3s; }

        /* 消消乐界面 */
        #elimTarget { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); padding: 10px 30px; border-radius: 20px; display: none; z-index: 50; }
        #elimTarget .label { font-size: 14px; color: #666; }
        #elimTarget .num { font-size: 36px; font-weight: bold; color: #f5576c; }

        /* 手机触控 */

        .tbtn { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid white; display: flex; justify-content: center; align-items: center; font-size: 24px; pointer-events: auto; }
        .tbtn:active { background: rgba(255,255,255,0.5); }
        #touch.elim-mode { display: none !important; }

            #game { max-width: 100%; max-height: none; height: 100%; height: 100svh; width: 100%; border-radius: 0; position: fixed; top: 0; left: 0; bottom: 0; }

<script>
// ==================== 音效系统 ====================
const AudioSys = {
    ctx: null, isMuted: false,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    playJump() { this.playTone(200, 600, 0.1, 'sine'); },
    playCoin() { this.playTone(1200, 1600, 0.15, 'sine'); },
    playWin() { this.playChord([523, 659, 784, 1046], 0.4); },
    playFail() { this.playTone(400, 100, 0.5, 'sawtooth'); },
    playClick() { this.playTone(800, 800, 0.05, 'sine'); },
    playFire() { this.playTone(600, 400, 0.1, 'square'); },
    playHit() { this.playTone(150, 100, 0.1, 'sawtooth'); },
    playTransform() {
        const notes = [523, 659, 784, 1046];
        notes.forEach((f, i) => setTimeout(() => this.playTone(f, f, 0.1, 'square'), i * 50));
    },
    playTone(startFreq, endFreq, duration, type = 'sine') {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(startFreq, this.ctx.currentTime);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    playChord(freqs, duration) {
        freqs.forEach(f => this.playTone(f, f, duration, 'triangle'));
    },
    toggleMute() { this.isMuted = !this.isMuted; return this.isMuted; },
    speak(text, lang = 'zh-CN') {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = lang;
            utter.rate = 1.0;
            utter.pitch = 1.0;
            utter.volume = 0.9;
            const voices = window.speechSynthesis.getVoices();
            const zhVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Ting') || v.name.includes('Yaoyao') || v.name.includes('Meijia') || v.name.includes('Google')));
            if (zhVoice) utter.voice = zhVoice;
            window.speechSynthesis.speak(utter);
        }
    },
    speakPraise(praise) {
        const praiseMap = { 'GOOD!': '棒', 'GREAT!': '真棒', 'PERFECT!': '完美', 'AWESOME!': '厉害', 'EXCELLENT!': '优秀' };
        this.playWin();
        setTimeout(() => this.speak(praiseMap[praise] || '棒'), 100);
    }
};

// ==================== 玩家类（优化版）====================
class Player {
    constructor() {
        this.x = 100; this.y = 300; this.vx = 0; this.vy = 0; this.r = 22;
        this.g = false; this.j = 0;
        this.isBig = false; this.invincible = 0;
        this.flashFrame = 0;
        this.transformTimer = 0; // 变身倒计时
        this.isTransformed = false; // 是否处于变身状态
    }

    jump() {
        if (this.j < 2) {
            const jumpPower = -12 * (selectedVehicle?.jump || 1);
            this.vy = jumpPower;
            this.j++;
            AudioSys.playJump();
        }
    }

    update() {
        const speedMultiplier = selectedVehicle?.speed || 1;

        if (keys['ArrowLeft']) this.vx = -4 * speedMultiplier;
        else if (keys['ArrowRight']) this.vx = 4 * speedMultiplier;
        else this.vx *= 0.8;

        this.vy += 0.5;
        this.x += this.vx;
        this.y += this.vy;
        this.g = false;

        const px = this.x, py = this.y, pr = this.r;
        for (let i = 0; i < blocks.length; i++) {
            const p = blocks[i];
            if (px + pr > p[0] && px - pr < p[0] + p[2] && py + pr > p[1] && py - pr < p[1] + p[3]) {
                if (this.vy > 0 && py - pr < p[1]) {
                    this.y = p[1] - pr;
                    this.vy = 0;
                    this.g = true;
                    this.j = 0;
                }
            }
        }

        // 边界 - 根据新关卡长度调整
        const maxX = level === 1 ? 15000 : (level === 2 ? 20000 : 25000);
        if (this.x < this.r) this.x = this.r;
        if (this.x > maxX) this.x = maxX;
        if (this.y > 600) { AudioSys.playFail(); restart(); }

        if (this.invincible > 0) {
            this.invincible--;
            this.flashFrame = (this.flashFrame + 1) % 10;
        }

        // 变身倒计时
        if (this.transformTimer > 0) {
            this.transformTimer--;
            if (this.transformTimer <= 0) {
                this.isTransformed = false;
                showHint('变身结束！');
            }
        }
    }

    draw() {
        ctx.save();
        const scale = this.isBig ? 1.5 : 1;
        const s = 22 * scale;
        ctx.translate(this.x - cam, this.y);

        if (this.invincible > 0 && this.flashFrame < 5) {
            ctx.globalAlpha = 0.5;
        }

        // 如果处于变身状态，绘制炫蓝雷霆
        if (this.isTransformed) {
            this.drawXuanBlueThunder(s);
        } else {
            const char = selectedChar || CHARACTERS[0];

            if (selectedVehicle && selectedVehicle.id !== 'none') {
                this.drawVehicle(s);
            }

            this.drawEggCharacter(s, char);
        }

        ctx.restore();
    }

    drawVehicle(s) {
        const v = selectedVehicle;
        ctx.save();

        switch(v.id) {
            case 'tank':
                ctx.fillStyle = '#556B2F';
                ctx.fillRect(-s*1.2, s*0.5, s*2.4, s*0.8);
                ctx.fillStyle = '#2F4F2F';
                ctx.fillRect(-s*1.3, s*1.2, s*0.4, s*0.4);
                ctx.fillRect(s*0.9, s*1.2, s*0.4, s*0.4);
                ctx.fillStyle = '#3D3D3D';
                ctx.fillRect(s*0.2, -s*0.3, s*1.2, s*0.3);
                ctx.beginPath();
                ctx.arc(s*1.4, -s*0.15, s*0.2, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'cannon':
                ctx.fillStyle = '#FF4500';
                ctx.beginPath();
                ctx.ellipse(0, s*1.0, s*1.3, s*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(-s*1.5, s*0.3, s*0.5, s*0.4);
                ctx.fillStyle = '#FF6347';
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.arc(-s*(1.6+i*0.2), s*0.5 + Math.sin(frameCount*0.3+i)*s*0.15, s*0.15, 0, Math.PI*2);
                    ctx.fill();
                }
                break;

            case 'rocket':
                ctx.fillStyle = '#C0C0C0';
                ctx.beginPath();
                ctx.moveTo(0, -s*1.5);
                ctx.quadraticCurveTo(s*0.6, -s*0.5, s*0.5, s*0.5);
                ctx.lineTo(-s*0.5, s*0.5);
                ctx.quadraticCurveTo(-s*0.6, -s*0.5, 0, -s*1.5);
                ctx.fill();
                ctx.fillStyle = '#FF4500';
                for(let i=0; i<4; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-s*0.3 + i*s*0.15, s*0.5);
                    ctx.lineTo(-s*0.2 + i*s*0.15, s*(1.2 + Math.sin(frameCount*0.5+i)*0.3));
                    ctx.lineTo(-s*0.1 + i*s*0.15, s*0.5);
                    ctx.fill();
                }
                break;

            case 'ufo':
                ctx.fillStyle = '#C0C0C0';
                ctx.beginPath();
                ctx.ellipse(0, s*0.3, s*1.2, s*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#00CED1';
                ctx.beginPath();
                ctx.ellipse(0, s*0.1, s*0.6, s*0.25, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = `rgba(0,206,209,${0.3 + Math.sin(frameCount*0.1)*0.2})`;
                ctx.fillRect(-s*1.5, s*0.8, s*3, s*0.1);
                break;

            case 'car':
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.moveTo(-s*1.2, s*0.8);
                ctx.lineTo(-s*0.8, s*0.2);
                ctx.lineTo(s*0.4, s*0.2);
                ctx.lineTo(s*1.0, s*0.8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(-s*0.7, s*0.9, s*0.25, 0, Math.PI*2);
                ctx.arc(s*0.6, s*0.9, s*0.25, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#87CEEB';
                ctx.beginPath();
                ctx.moveTo(-s*0.5, s*0.25);
                ctx.lineTo(-s*0.2, s*0.25);
                ctx.lineTo(s*0.1, s*0.5);
                ctx.lineTo(-s*0.6, s*0.5);
                ctx.closePath();
                ctx.fill();
                break;

            case 'skateboard': // 滑板
                ctx.fillStyle = '#FF6347';
                ctx.beginPath();
                ctx.ellipse(0, s*1.2, s*1.0, s*0.15, 0, 0, Math.PI*2);
                ctx.fill();
                // 轮子
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(-s*0.6, s*1.35, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.6, s*1.35, s*0.12, 0, Math.PI*2);
                ctx.fill();
                // 滑板图案
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, s*1.2, s*0.15, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'mech': // 机甲
                // 机甲身体
                ctx.fillStyle = '#4A5568';
                ctx.fillRect(-s*0.9, s*0.3, s*1.8, s*0.9);
                // 机甲关节
                ctx.fillStyle = '#718096';
                ctx.fillRect(-s*1.0, s*0.5, s*0.3, s*0.4);
                ctx.fillRect(s*0.7, s*0.5, s*0.3, s*0.4);
                // 机甲核心
                ctx.fillStyle = '#00BFFF';
                ctx.beginPath();
                ctx.arc(0, s*0.6, s*0.2, 0, Math.PI*2);
                ctx.fill();
                // 机甲腿
                ctx.fillStyle = '#2D3748';
                ctx.fillRect(-s*0.5, s*1.1, s*0.3, s*0.5);
                ctx.fillRect(s*0.2, s*1.1, s*0.3, s*0.5);
                break;

            case 'dragon': // 飞龙
                // 龙身
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.ellipse(0, s*0.6, s*1.0, s*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                // 龙鳞
                ctx.fillStyle = '#32CD32';
                for(let i = -0.6; i <= 0.6; i += 0.3) {
                    ctx.beginPath();
                    ctx.arc(i*s, s*0.5, s*0.1, 0, Math.PI*2);
                    ctx.fill();
                }
                // 翅膀
                ctx.fillStyle = '#90EE90';
                ctx.beginPath();
                ctx.moveTo(-s*0.8, s*0.3);
                ctx.lineTo(-s*1.5, -s*0.3 + Math.sin(frameCount*0.2)*s*0.1);
                ctx.lineTo(-s*0.5, s*0.4);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(s*0.8, s*0.3);
                ctx.lineTo(s*1.5, -s*0.3 + Math.sin(frameCount*0.2)*s*0.1);
                ctx.lineTo(s*0.5, s*0.4);
                ctx.fill();
                break;

            case 'cloud': // 筋斗云
                ctx.fillStyle = `rgba(255,255,255,${0.8 + Math.sin(frameCount*0.1)*0.1})`;
                // 云朵由多个圆组成
                ctx.beginPath();
                ctx.arc(-s*0.5, s*0.8, s*0.4, 0, Math.PI*2);
                ctx.arc(s*0.5, s*0.8, s*0.4, 0, Math.PI*2);
                ctx.arc(0, s*0.6, s*0.5, 0, Math.PI*2);
                ctx.fill();
                // 云朵光晕
                ctx.fillStyle = 'rgba(255,215,0,0.3)';
                ctx.beginPath();
                ctx.arc(0, s*0.7, s*0.6, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'train': // 小火车
                // 车头
                ctx.fillStyle = '#DC143C';
                ctx.fillRect(-s*0.8, s*0.3, s*1.6, s*0.8);
                // 烟囱
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(s*0.4, -s*0.2, s*0.2, s*0.5);
                // 烟雾
                ctx.fillStyle = `rgba(200,200,200,${0.5 + Math.sin(frameCount*0.3)*0.2})`;
                ctx.beginPath();
                ctx.arc(s*0.5, -s*0.4, s*0.15, 0, Math.PI*2);
                ctx.arc(s*0.6, -s*0.6, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.7, -s*0.8, s*0.1, 0, Math.PI*2);
                ctx.fill();
                // 轮子
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(-s*0.5, s*1.1, s*0.2, 0, Math.PI*2);
                ctx.arc(s*0.5, s*1.1, s*0.2, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'balloon': // 热气球
                // 气球
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.3, s*0.7, s*0.9, 0, 0, Math.PI*2);
                ctx.fill();
                // 条纹
                ctx.fillStyle = '#FFD93D';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.3, s*0.4, s*0.9, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.3, s*0.15, s*0.9, 0, 0, Math.PI*2);
                ctx.fill();
                // 吊篮
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(-s*0.3, s*0.5, s*0.6, s*0.4);
                // 绳索
                ctx.strokeStyle = '#666';
                ctx.lineWidth = s*0.02;
                ctx.beginPath();
                ctx.moveTo(-s*0.3, s*0.5);
                ctx.lineTo(-s*0.5, -s*0.8);
                ctx.moveTo(s*0.3, s*0.5);
                ctx.lineTo(s*0.5, -s*0.8);
                ctx.stroke();
                break;
        }
        ctx.restore();
    }

    drawEggCharacter(s, char) {
        // 蛋仔派对风格的圆润蛋形身体
        const bodyGradient = ctx.createRadialGradient(-s*0.3, -s*0.4, 0, 0, 0, s*1.3);
        bodyGradient.addColorStop(0, char.secondaryColor || char.color);
        bodyGradient.addColorStop(0.5, char.color);
        bodyGradient.addColorStop(1, char.color);

        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        // 更圆润的蛋形
        ctx.ellipse(0, s*0.1, s*0.95, s*1.15, 0, 0, Math.PI*2);
        ctx.fill();

        // 高光（蛋仔派对标志性的亮面）
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.ellipse(-s*0.35, -s*0.5, s*0.25, s*0.35, -0.4, 0, Math.PI*2);
        ctx.fill();

        // 绘制装饰（耳朵/帽子等）
        this.drawHat(s, char.hat, char.color);

        // 绘制配饰
        this.drawAccessory(s, char.accessory);

        // 根据face类型绘制不同表情
        this.drawFace(s, char.face);

        // 小手（蛋仔风格的小圆手）
        ctx.fillStyle = char.color;
        ctx.beginPath();
        ctx.arc(-s*0.85, s*0.3, s*0.18, 0, Math.PI*2);
        ctx.arc(s*0.85, s*0.3, s*0.18, 0, Math.PI*2);
        ctx.fill();

        // 小脚（蛋仔风格的小脚）
        ctx.beginPath();
        ctx.ellipse(-s*0.35, s*1.2, s*0.22, s*0.12, 0, 0, Math.PI*2);
        ctx.ellipse(s*0.35, s*1.2, s*0.22, s*0.12, 0, 0, Math.PI*2);
        ctx.fill();
    }

    drawFace(s, faceType) {
        switch(faceType) {
            case 'cute': // 可爱表情 - 仔仔熊
                // 大眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(-s*0.3, -s*0.15, s*0.22, s*0.28, 0, 0, Math.PI*2);
                ctx.ellipse(s*0.3, -s*0.15, s*0.22, s*0.28, 0, 0, Math.PI*2);
                ctx.fill();

                // 黑色眼珠
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-s*0.25, -s*0.1, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*0.1, s*0.12, 0, Math.PI*2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-s*0.22, -s*0.15, s*0.04, 0, Math.PI*2);
                ctx.arc(s*0.38, -s*0.15, s*0.04, 0, Math.PI*2);
                ctx.fill();

                // 微笑
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.05;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(0, s*0.1, s*0.15, 0.3, Math.PI-0.3);
                ctx.stroke();
                break;

            case 'happy': // 开心表情 - JK妹
                // 弯弯的笑眼
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.06;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(-s*0.3, -s*0.1, s*0.15, 0.8, Math.PI-0.8);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(s*0.3, -s*0.1, s*0.15, 0.8, Math.PI-0.8);
                ctx.stroke();

                // 腮红
                ctx.fillStyle = 'rgba(255,150,150,0.6)';
                ctx.beginPath();
                ctx.arc(-s*0.5, s*0.05, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.5, s*0.05, s*0.12, 0, Math.PI*2);
                ctx.fill();

                // 大笑的嘴
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(0, s*0.2, s*0.12, s*0.18, 0, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'cheeky': // 俏皮表情 - 仓鼠
                // 圆眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-s*0.25, -s*0.1, s*0.18, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*0.1, s*0.18, 0, Math.PI*2);
                ctx.fill();

                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-s*0.25, -s*0.1, s*0.1, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*0.1, s*0.1, 0, Math.PI*2);
                ctx.fill();

                // 大门牙
                ctx.fillStyle = 'white';
                ctx.fillRect(-s*0.06, s*0.05, s*0.05, s*0.12);
                ctx.fillRect(s*0.01, s*0.05, s*0.05, s*0.12);

                // 腮红
                ctx.fillStyle = 'rgba(255,180,180,0.7)';
                ctx.beginPath();
                ctx.arc(-s*0.55, s*0.1, s*0.15, 0, Math.PI*2);
                ctx.arc(s*0.55, s*0.1, s*0.15, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'cool': // 酷酷表情 - 机器人和摇滚
                // 墨镜/酷眼
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.ellipse(-s*0.3, -s*0.1, s*0.2, s*0.15, 0, 0, Math.PI*2);
                ctx.ellipse(s*0.3, -s*0.1, s*0.2, s*0.15, 0, 0, Math.PI*2);
                ctx.fill();

                // 眼镜反光
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(-s*0.35, -s*0.12, s*0.06, 0, Math.PI*2);
                ctx.arc(s*0.25, -s*0.12, s*0.06, 0, Math.PI*2);
                ctx.fill();

                // 酷酷的嘴
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.04;
                ctx.beginPath();
                ctx.moveTo(-s*0.1, s*0.2);
                ctx.lineTo(s*0.1, s*0.2);
                ctx.stroke();
                break;

            case 'sleepy': //  sleepy表情 - 熊猫
                // 眯眯眼
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.05;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(-s*0.4, -s*0.1);
                ctx.lineTo(-s*0.2, -s*0.08);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(s*0.2, -s*0.08);
                ctx.lineTo(s*0.4, -s*0.1);
                ctx.stroke();

                // 黑眼圈
                ctx.fillStyle = 'rgba(100,100,100,0.3)';
                ctx.beginPath();
                ctx.ellipse(-s*0.3, -s*0.1, s*0.2, s*0.15, 0, 0, Math.PI*2);
                ctx.ellipse(s*0.3, -s*0.1, s*0.2, s*0.15, 0, 0, Math.PI*2);
                ctx.fill();

                // 小嘴
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(0, s*0.15, s*0.04, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'fierce': // 凶猛表情 - 恐龙
                // 锐利眼睛
                ctx.fillStyle = '#FF4444';
                ctx.beginPath();
                ctx.moveTo(-s*0.4, -s*0.15);
                ctx.lineTo(-s*0.15, -s*0.05);
                ctx.lineTo(-s*0.4, -s*0.05);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(s*0.4, -s*0.15);
                ctx.lineTo(s*0.15, -s*0.05);
                ctx.lineTo(s*0.4, -s*0.05);
                ctx.fill();

                // 尖牙
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.moveTo(-s*0.1, s*0.15);
                ctx.lineTo(-s*0.05, s*0.35);
                ctx.lineTo(0, s*0.15);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(s*0.1, s*0.15);
                ctx.lineTo(s*0.05, s*0.35);
                ctx.lineTo(0, s*0.15);
                ctx.fill();
                break;

            case 'mischievous': // 淘气表情 - 小恶魔
                // 弯弯的坏笑眼
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.05;
                ctx.beginPath();
                ctx.arc(-s*0.3, -s*0.15, s*0.12, 0.5, Math.PI-0.5);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(s*0.3, -s*0.15, s*0.12, 0.5, Math.PI-0.5);
                ctx.stroke();

                // 调皮舌头
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.ellipse(0, s*0.25, s*0.1, s*0.15, 0, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'confident': // 自信表情 - 浪哥
                // 锐利有神的眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(-s*0.3, -s*0.15, s*0.2, s*0.22, 0, 0, Math.PI*2);
                ctx.ellipse(s*0.3, -s*0.15, s*0.2, s*0.22, 0, 0, Math.PI*2);
                ctx.fill();

                // 深色瞳孔
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-s*0.28, -s*0.12, s*0.1, 0, Math.PI*2);
                ctx.arc(s*0.32, -s*12, s*0.1, 0, Math.PI*2);
                ctx.fill();

                // 眼睛高光
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-s*0.25, -s*0.18, s*0.04, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*0.18, s*0.04, 0, Math.PI*2);
                ctx.fill();

                // 自信微笑
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.05;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(0, s*0.1, s*0.18, 0.2, Math.PI-0.2);
                ctx.stroke();

                // 眉毛
                ctx.beginPath();
                ctx.moveTo(-s*0.45, -s*0.4);
                ctx.lineTo(-s*0.15, -s*0.38);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(s*0.15, -s*0.38);
                ctx.lineTo(s*0.45, -s*0.4);
                ctx.stroke();
                break;

            default:
                // 默认可爱表情
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-s*0.3, -s*0.15, s*0.18, 0, Math.PI*2);
                ctx.arc(s*0.3, -s*0.15, s*0.18, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-s*0.3, -s*0.15, s*0.1, 0, Math.PI*2);
                ctx.arc(s*0.3, -s*0.15, s*0.1, 0, Math.PI*2);
                ctx.fill();
        }
    }

    drawAccessory(s, accessory) {
        switch(accessory) {
            case 'glasses': // 眼镜
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.03;
                ctx.beginPath();
                ctx.arc(-s*0.3, -s*0.1, s*0.2, 0, Math.PI*2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(s*0.3, -s*0.1, s*0.2, 0, Math.PI*2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-s*0.1, -s*0.1);
                ctx.lineTo(s*0.1, -s*0.1);
                ctx.stroke();
                break;

            case 'sunglasses': // 墨镜
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.ellipse(-s*0.3, -s*0.1, s*0.2, s*0.15, 0, 0, Math.PI*2);
                ctx.ellipse(s*0.3, -s*0.1, s*0.2, s*0.15, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath();
                ctx.arc(-s*0.35, -s*0.12, s*0.06, 0, Math.PI*2);
                ctx.arc(s*0.25, -s*0.12, s*0.06, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'headphones': // 耳机
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.08;
                ctx.beginPath();
                ctx.arc(0, -s*0.2, s*0.7, Math.PI, 0);
                ctx.stroke();
                ctx.fillStyle = '#666';
                ctx.fillRect(-s*0.75, -s*0.3, s*0.2, s*0.35);
                ctx.fillRect(s*0.55, -s*0.3, s*0.2, s*0.35);
                break;

            case 'bamboo': // 竹子
                ctx.fillStyle = '#228B22';
                ctx.fillRect(s*0.6, s*0.3, s*0.1, s*0.6);
                ctx.fillStyle = '#90EE90';
                ctx.fillRect(s*0.62, s*0.35, s*0.06, s*0.15);
                ctx.fillRect(s*0.62, s*0.55, s*0.06, s*0.15);
                ctx.fillRect(s*0.62, s*0.75, s*0.06, s*0.15);
                break;

            case 'blush': // 腮红（额外强调）
                ctx.fillStyle = 'rgba(255,180,180,0.8)';
                ctx.beginPath();
                ctx.arc(-s*0.5, s*0.05, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.5, s*0.05, s*0.12, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'pitchfork': // 小恶魔的三叉戟
                ctx.strokeStyle = '#8B0000';
                ctx.lineWidth = s*0.05;
                ctx.beginPath();
                ctx.moveTo(s*0.7, s*0.2);
                ctx.lineTo(s*0.7, s*0.7);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(s*0.55, s*0.35);
                ctx.lineTo(s*0.7, s*0.25);
                ctx.lineTo(s*0.85, s*0.35);
                ctx.stroke();
                break;

            case 'microphone': // 浪哥的麦克风
                // 话筒杆
                ctx.strokeStyle = '#333';
                ctx.lineWidth = s*0.04;
                ctx.beginPath();
                ctx.moveTo(s*0.7, s*0.25);
                ctx.lineTo(s*0.7, s*0.6);
                ctx.stroke();
                // 话筒头
                ctx.fillStyle = '#666';
                ctx.beginPath();
                ctx.ellipse(s*0.7, s*0.2, s*0.1, s*0.15, 0, 0, Math.PI*2);
                ctx.fill();
                // 网罩纹理
                ctx.strokeStyle = '#999';
                ctx.lineWidth = s*0.02;
                ctx.beginPath();
                ctx.arc(s*0.7, s*0.2, s*0.06, 0, Math.PI*2);
                ctx.stroke();
                break;
        }
    }

    drawXuanBlueThunder(s) {
        // 炫蓝雷霆 - 炫卡斗士风格的机甲战士
        // 身体（蓝色机甲风格）
        const bodyGradient = ctx.createRadialGradient(-s*0.2, -s*0.3, 0, 0, 0, s*1.2);
        bodyGradient.addColorStop(0, '#00CED1');
        bodyGradient.addColorStop(0.5, '#008B8B');
        bodyGradient.addColorStop(1, '#006666');

        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.ellipse(0, s*0.1, s*0.9, s*1.1, 0, 0, Math.PI*2);
        ctx.fill();

        // 机甲装甲线条
        ctx.strokeStyle = '#00FFFF';
        ctx.lineWidth = s*0.03;
        ctx.beginPath();
        ctx.moveTo(-s*0.5, -s*0.5);
        ctx.lineTo(s*0.5, -s*0.5);
        ctx.moveTo(-s*0.4, -s*0.2);
        ctx.lineTo(s*0.4, -s*0.2);
        ctx.stroke();

        // 胸口能量核心（发光）
        ctx.fillStyle = '#00FFFF';
        ctx.shadowColor = '#00FFFF';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(0, s*0.1, s*0.15, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 眼睛（红色发光）
        ctx.fillStyle = '#FF0000';
        ctx.shadowColor = '#FF0000';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.ellipse(-s*0.3, -s*0.15, s*0.15, s*0.1, 0, 0, Math.PI*2);
        ctx.ellipse(s*0.3, -s*0.15, s*0.15, s*0.1, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 雷电标志（额头）
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.moveTo(-s*0.1, -s*0.5);
        ctx.lineTo(s*0.05, -s*0.4);
        ctx.lineTo(-s*0.05, -s*0.4);
        ctx.lineTo(s*0.1, -s*0.3);
        ctx.lineTo(s*0, -s*0.3);
        ctx.lineTo(s*0.05, -s*0.25);
        ctx.lineTo(-s*0.1, -s*0.35);
        ctx.lineTo(s*0, -s*0.35);
        ctx.closePath();
        ctx.fill();

        // 机甲肩甲
        ctx.fillStyle = '#4682B4';
        ctx.beginPath();
        ctx.moveTo(-s*0.8, -s*0.2);
        ctx.lineTo(-s*1.1, s*0.2);
        ctx.lineTo(-s*0.7, s*0.3);
        ctx.lineTo(-s*0.6, -s*0.1);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(s*0.8, -s*0.2);
        ctx.lineTo(s*1.1, s*0.2);
        ctx.lineTo(s*0.7, s*0.3);
        ctx.lineTo(s*0.6, -s*0.1);
        ctx.fill();

        // 小手（机甲风格）
        ctx.fillStyle = '#008B8B';
        ctx.beginPath();
        ctx.arc(-s*0.9, s*0.3, s*0.18, 0, Math.PI*2);
        ctx.arc(s*0.9, s*0.3, s*0.18, 0, Math.PI*2);
        ctx.fill();

        // 脚（机甲推进器）
        ctx.fillStyle = '#4682B4';
        ctx.fillRect(-s*0.45, s*1.1, s*0.3, s*0.3);
        ctx.fillRect(s*0.15, s*1.1, s*0.3, s*0.3);

        // 推进器火焰效果
        ctx.fillStyle = `rgba(0, 255, 255, ${0.5 + Math.sin(frameCount * 0.5) * 0.3})`;
        ctx.beginPath();
        ctx.moveTo(-s*0.3, s*1.4);
        ctx.lineTo(-s*0.45, s*1.7);
        ctx.lineTo(-s*0.15, s*1.4);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(s*0.3, s*1.4);
        ctx.lineTo(s*0.15, s*1.7);
        ctx.lineTo(s*0.45, s*1.4);
        ctx.fill();

        // 变身剩余时间指示器
        if (this.transformTimer > 0) {
            ctx.fillStyle = 'rgba(0, 255, 255, 0.8)';
            ctx.font = `bold ${s*0.4}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText(Math.ceil(this.transformTimer / 60), 0, -s*0.8);
        }
    }

    drawHat(s, hatType, color) {
        switch(hatType) {
            case 'bear_ears': // 熊耳朵
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(-s*0.5, -s*0.95, s*0.25, 0, Math.PI*2);
                ctx.arc(s*0.5, -s*0.95, s*0.25, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FFCC99';
                ctx.beginPath();
                ctx.arc(-s*0.5, -s*0.95, s*0.12, 0, Math.PI*2);
                ctx.arc(s*0.5, -s*0.95, s*0.12, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'hamster_ears': // 仓鼠耳朵
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(-s*0.45, -s*0.9, s*0.18, s*0.25, -0.3, 0, Math.PI*2);
                ctx.ellipse(s*0.45, -s*0.9, s*0.18, s*0.25, 0.3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#FFCC99';
                ctx.beginPath();
                ctx.ellipse(-s*0.45, -s*0.9, s*0.08, s*0.12, -0.3, 0, Math.PI*2);
                ctx.ellipse(s*0.45, -s*0.9, s*0.08, s*0.12, 0.3, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'panda_ears': // 熊猫耳朵
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-s*0.5, -s*0.95, s*0.22, 0, Math.PI*2);
                ctx.arc(s*0.5, -s*0.95, s*0.22, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'dino_spikes': // 恐龙背刺
                ctx.fillStyle = '#228B22';
                for (let i = -0.6; i <= 0.6; i += 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(i * s, -s*0.9);
                    ctx.lineTo((i + 0.15) * s, -s*1.2);
                    ctx.lineTo((i + 0.3) * s, -s*0.9);
                    ctx.fill();
                }
                break;

            case 'devil_horns': // 恶魔角
                ctx.fillStyle = '#8B0000';
                ctx.beginPath();
                ctx.moveTo(-s*0.5, -s*0.85);
                ctx.quadraticCurveTo(-s*0.7, -s*1.4, -s*0.3, -s*1.0);
                ctx.quadraticCurveTo(-s*0.4, -s*0.85, -s*0.3, -s*0.75);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(s*0.5, -s*0.85);
                ctx.quadraticCurveTo(s*0.7, -s*1.4, s*0.3, -s*1.0);
                ctx.quadraticCurveTo(s*0.4, -s*0.85, s*0.3, -s*0.75);
                ctx.fill();
                break;

            case 'bow_pink': // 粉色蝴蝶结
                ctx.fillStyle = '#FF69B4';
                ctx.beginPath();
                ctx.moveTo(0, -s*1.1);
                ctx.lineTo(-s*0.35, -s*1.3);
                ctx.quadraticCurveTo(-s*0.4, -s*1.0, -s*0.25, -s*0.9);
                ctx.quadraticCurveTo(-0.1, -s*1.0, 0, -s*1.1);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(0, -s*1.1);
                ctx.lineTo(s*0.35, -s*1.3);
                ctx.quadraticCurveTo(s*0.4, -s*1.0, s*0.25, -s*0.9);
                ctx.quadraticCurveTo(0.1, -s*1.0, 0, -s*1.1);
                ctx.fill();
                ctx.fillStyle = '#FF1493';
                ctx.beginPath();
                ctx.arc(0, -s*1.1, s*0.1, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'mohawk': // 莫西干发型
                ctx.fillStyle = '#FF1493';
                ctx.beginPath();
                ctx.moveTo(-s*0.15, -s*1.1);
                ctx.lineTo(0, -s*1.5);
                ctx.lineTo(s*0.15, -s*1.1);
                ctx.fill();
                break;

            case 'antenna': // 机器人天线
                ctx.strokeStyle = '#666';
                ctx.lineWidth = s*0.04;
                ctx.beginPath();
                ctx.moveTo(0, -s*1.1);
                ctx.lineTo(0, -s*1.4);
                ctx.stroke();
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.arc(0, -s*1.45, s*0.08, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'crown_gold': // 浪哥的金色皇冠
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(-s*0.55, -s*0.9);
                ctx.lineTo(-s*0.35, -s*1.4);
                ctx.lineTo(-s*0.15, -s*1.0);
                ctx.lineTo(0, -s*1.45);
                ctx.lineTo(s*0.15, -s*1.0);
                ctx.lineTo(s*0.35, -s*1.4);
                ctx.lineTo(s*0.55, -s*0.9);
                ctx.closePath();
                ctx.fill();
                // 皇冠上的宝石
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.arc(0, -s*1.2, s*0.08, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#00CED1';
                ctx.beginPath();
                ctx.arc(-s*0.35, -s*1.15, s*0.06, 0, Math.PI*2);
                ctx.arc(s*0.35, -s*1.15, s*0.06, 0, Math.PI*2);
                ctx.fill();
                break;

            case 'crown':
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(-s*0.5, -s*0.95);
                ctx.lineTo(-s*0.3, -s*1.4);
                ctx.lineTo(0, -s*1.1);
                ctx.lineTo(s*0.3, -s*1.4);
                ctx.lineTo(s*0.5, -s*0.95);
                ctx.closePath();
                ctx.fill();
                break;
            case 'cap':
                ctx.fillStyle = '#FF6600';
                ctx.beginPath();
                ctx.ellipse(0, -s*0.9, s*0.6, s*0.25, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillRect(-s*0.2, -s*0.9, s*0.6, s*0.1);
                break;
        }
    }
}

// ==================== 角色和载具选择界面 ====================
function initCharSelect() {
    const grid = document.getElementById('charGrid');
    grid.innerHTML = '';

    CHARACTERS.forEach(char => {
        const div = document.createElement('div');
        div.className = 'char-option';
        div.dataset.id = char.id;
        div.innerHTML = `
            <div class="char-emoji">${char.emoji}</div>
            <div class="char-name">${char.name}</div>
        `;
        div.onclick = () => selectChar(char.id);
        grid.appendChild(div);
    });
}

function selectChar(id) {
    selectedChar = CHARACTERS.find(c => c.id === id);
    document.querySelectorAll('.char-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.id === id);
    });
    AudioSys.playClick();
}

function confirmChar() {
    if (!selectedChar) {
        selectedChar = CHARACTERS[0];
    }
    document.getElementById('charSelect').style.display = 'none';
    document.getElementById('vehicleSelect').style.display = 'flex';
    document.getElementById('selectedCharDisplay').textContent = `${selectedChar.emoji} ${selectedChar.name}`;
    initVehicleSelect();
}

function backToCharSelect() {
    document.getElementById('vehicleSelect').style.display = 'none';
    document.getElementById('charSelect').style.display = 'flex';
}

function initVehicleSelect() {
    const grid = document.getElementById('vehicleGrid');
    grid.innerHTML = '';

    VEHICLES.forEach(v => {
        const div = document.createElement('div');
        div.className = 'vehicle-option';
        div.dataset.id = v.id;
        div.innerHTML = `
            <div class="vehicle-emoji">${v.emoji}</div>
            <div class="vehicle-name">${v.name}</div>
            <div class="vehicle-stat">速度:${v.speed}x 跳跃:${v.jump}x</div>
            <div class="vehicle-stat">${v.desc}</div>
        `;
        div.onclick = () => selectVehicle(v.id);
        grid.appendChild(div);
    });

    selectVehicle('none');
}

function selectVehicle(id) {
    selectedVehicle = VEHICLES.find(v => v.id === id);
    document.querySelectorAll('.vehicle-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.id === id);
    });
    AudioSys.playClick();
}

function confirmVehicle() {
    if (!selectedVehicle) {
        selectedVehicle = VEHICLES[0];
    }
    document.getElementById('vehicleSelect').style.display = 'none';
    document.getElementById('difficultySelect').style.display = 'flex';
    document.getElementById('diffCharDisplay').textContent = `${selectedChar.emoji} ${selectedChar.name} ${selectedVehicle.emoji}`;
    initDifficultySelect();
}

function backToVehicleSelect() {
    document.getElementById('difficultySelect').style.display = 'none';
    document.getElementById('vehicleSelect').style.display = 'flex';
}

// ==================== 难度选择界面 ====================
function initDifficultySelect() {
    const grid = document.getElementById('difficultyGrid');
    grid.innerHTML = '';

    DIFFICULTIES.forEach(diff => {
        const div = document.createElement('div');
        div.className = 'difficulty-option';
        div.dataset.id = diff.id;
        div.innerHTML = `
            <div class="difficulty-emoji">${diff.emoji}</div>
            <div class="difficulty-info">
                <div class="difficulty-name" style="color: ${diff.color}">${diff.name}</div>
                <div class="difficulty-desc">${diff.desc}</div>
            </div>
        `;
        div.onclick = () => selectDifficulty(diff.id);
        grid.appendChild(div);
    });
}

function selectDifficulty(id) {
    selectedDifficulty = DIFFICULTIES.find(d => d.id === id);
    document.querySelectorAll('.difficulty-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.id === id);
    });
    AudioSys.playClick();
}

function confirmDifficulty() {
    if (!selectedDifficulty) {
        selectedDifficulty = DIFFICULTIES[0];
    }
    document.getElementById('difficultySelect').style.display = 'none';
    document.getElementById('settingsSelect').style.display = 'flex';
    document.getElementById('settingsDiffDisplay').textContent = `${selectedDifficulty.emoji} ${selectedDifficulty.name}`;

// ==================== 糖果/金币类 ====================
class Coin {
    constructor(x,y,type='COIN') { this.x=x; this.y=y; this.t=Math.random(); this.get=false; this.type=type; }
    draw() {
        if (this.get) return; this.t += 0.05;
        ctx.save(); ctx.translate(this.x-cam, this.y+Math.sin(this.t)*3);
        const item = ITEM_TYPES[this.type] || ITEM_TYPES.COIN;
        if (this.type === 'COIN' || this.type === 'DIAMOND') {
            ctx.fillStyle = this.type === 'DIAMOND' ? '#00CED1' : '#FFD700';
            ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
        } else {
            ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.fillText(item.emoji, 0, 5);
        }
        ctx.restore();
    }
}

// ==================== 问题方块类（支持多种难度）====================
class QBlock {
    constructor(x,y) {
        this.x=x; this.y=y; this.done=false;
        this.q=this.makeQByDifficulty();
        const rand = Math.random();
        if (rand < 0.2) this.itemType = 'MUSHROOM';
        else if (rand < 0.4) this.itemType = 'STAR';
        else if (rand < 0.6) this.itemType = 'SUNFLOWER';
        else if (rand < 0.8) this.itemType = 'COIN';
        else this.itemType = 'DIAMOND';
        this.itemSpawned = false;
    }

    makeQByDifficulty() {
        const diff = selectedDifficulty?.id || 'normal';

        switch(diff) {
            case 'normal': // 10以内加减法
                return this.makeAddSubEasy();

            case 'hard': // 图形比大小
                return this.makeCompareGraphics();

            case 'extreme': // 20以内加减法
                return this.makeAddSubHard();

            case 'insane': // 乘法口诀
                return this.makeMultiply();

            default:
                return this.makeAddSubEasy();
        }
    }

    makeAddSubEasy() {
        const isAdd = Math.random() > 0.5;
        let text, ans;
        if (isAdd) {
            const a = Math.floor(Math.random() * 6) + 1;
            const b = Math.floor(Math.random() * (10 - a - 1)) + 1;
            text = `${a} + ${b} = ?`;
            ans = a + b;
        } else {
            const a = Math.floor(Math.random() * 6) + 4;
            const b = Math.floor(Math.random() * (a - 1)) + 1;
            text = `${a} - ${b} = ?`;
            ans = a - b;
        }
        return { text, ans, opts: this.makeOptions(ans, 0, 10), type: 'number' };
    }

    makeAddSubHard() {
        const isAdd = Math.random() > 0.5;
        let text, ans;
        if (isAdd) {
            const a = Math.floor(Math.random() * 11) + 5;
            const b = Math.floor(Math.random() * (20 - a - 1)) + 1;
            text = `${a} + ${b} = ?`;
            ans = a + b;
        } else {
            const a = Math.floor(Math.random() * 11) + 10;
            const b = Math.floor(Math.random() * (a - 1)) + 1;
            text = `${a} - ${b} = ?`;
            ans = a - b;
        }
        return { text, ans, opts: this.makeOptions(ans, 0, 20), type: 'number' };
    }

    makeCompareGraphics() {
        const types = ['circle', 'square', 'triangle'];
        const type1 = types[Math.floor(Math.random() * types.length)];
        const type2 = types[Math.floor(Math.random() * types.length)];
        const count1 = Math.floor(Math.random() * 8) + 1;
        const count2 = Math.floor(Math.random() * 8) + 1;

        // 使用表情符号表示图形
        const shapeEmojis = { circle: '🔵', square: '🟦', triangle: '🔺' };

        const text = `${shapeEmojis[type1]}x${count1} ○ ${shapeEmojis[type2]}x${count2}`;

        let ans;
        if (count1 > count2) ans = '>';
        else if (count1 < count2) ans = '<';
        else ans = '=';

        return { text, ans, opts: ['>', '<', '='], type: 'compare', compare: { count1, count2, shape1: shapeEmojis[type1], shape2: shapeEmojis[type2] } };
    }

    makeMultiply() {
        // 乘法口诀表 (1-9)
        const a = Math.floor(Math.random() * 9) + 1;
        const b = Math.floor(Math.random() * 9) + 1;
        const text = `${a} × ${b} = ?`;
        const ans = a * b;
        return { text, ans, opts: this.makeOptions(ans, 1, 81), type: 'number' };
    }

    makeOptions(ans, min, max) {
        let opts = [ans];
        while(opts.length < 3) {
            const w = ans + Math.floor(Math.random() * 10) - 5;
            if(w >= min && w <= max && w !== ans && !opts.includes(w)) opts.push(w);
        }
        opts.sort(() => Math.random() - 0.5);
        return opts;
    }

    draw() {
        ctx.save(); ctx.translate(this.x-cam, this.y);

        // 如果已完成且是强制解锁模式，显示特殊标记
        if (this.done && requireAllBoxes) {
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(-22, -22, 44, 44);
        } else {
            ctx.fillStyle = this.done ? '#9CA3AF' : '#F59E0B';
            ctx.fillRect(-20, -20, 40, 40);
        }

        ctx.strokeStyle = '#B45309'; ctx.lineWidth = 2; ctx.strokeRect(-20, -20, 40, 40);
        ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
        ctx.fillText(this.done ? '✓' : '?', 0, 5);
        ctx.restore();
    }
}

// ==================== 道具类 ====================
class Item {
    constructor(x, y, type) { this.x=x; this.y=y; this.type=type; this.collected=false; this.vy=0; this.vx=0; }
    update() {
        this.vy += 0.3;
        this.y += this.vy;
        this.x += this.vx;
        // 水平速度衰减
        this.vx *= 0.98;
        for (let p of blocks) {
            if (this.x>p[0] && this.x<p[0]+p[2] && this.y+15>p[1] && this.y<p[1]+p[3]) {
                this.y = p[1]-15; this.vy = 0;
            }
        }
    }
    draw() {
        if (this.collected) return;
        ctx.save(); ctx.translate(this.x-cam, this.y);
        ctx.font = '24px Arial'; ctx.textAlign = 'center';
        ctx.fillText(ITEM_TYPES[this.type].emoji, 0, 5);
        ctx.restore();
    }
}

// ==================== 炮弹类 ====================
class Bullet {
    constructor(x, y, direction) {
        this.x = x;
        this.y = y;
        this.vx = direction * 8; // 炮弹速度
        this.vy = 0;
        this.r = 6;
        this.dead = false;
        this.life = 60; // 炮弹存在时间（帧数）
    }

    update() {
        if (this.dead) return;

        this.x += this.vx;
        this.y += this.vy;
        this.life--;

        // 超出寿命或超出边界
        if (this.life <= 0 || this.x < cam || this.x > cam + cvs.width + 100) {
            this.dead = true;
            return;
        }

        // 检测与敌人碰撞
        for (let e of enemies) {
            if (!e.dead && Math.hypot(this.x - e.x, this.y - e.y) < 25) {
                this.dead = true;
                if (e.hit()) {
                    // 敌人死亡，加分
                    score += 100;
                    updateUI();
                    AudioSys.playCoin();
                } else {
                    // 敌人受伤
                    AudioSys.playHit();
                }
                return;
            }
        }
    }

    draw() {
        if (this.dead) return;
        ctx.save();
        ctx.translate(this.x - cam, this.y);

        // 炮弹光晕效果
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 10;

        // 炮弹主体
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fill();

        // 炮弹内核
        ctx.fillStyle = '#FF6B00';
        ctx.beginPath();
        ctx.arc(0, 0, this.r * 0.6, 0, Math.PI * 2);
        ctx.fill();

        // 尾焰效果
        const tailLen = 15;
        const tailDir = this.vx > 0 ? -1 : 1;
        ctx.fillStyle = `rgba(255, 100, 0, ${this.life / 60})`;
        ctx.beginPath();
        ctx.moveTo(tailDir * tailLen, -3);
        ctx.lineTo(0, 0);
        ctx.lineTo(tailDir * tailLen, 3);
        ctx.fill();

        ctx.restore();
    }
}

// ==================== 敌人类 ====================
class Enemy {
    constructor(x, y, patrolDist = 100) {
        this.x = x; this.y = y; this.w = 30; this.h = 30;
        this.startX = x; this.patrolDist = patrolDist;
        this.dir = 1; this.speed = 1.5;
        this.dead = false;
        this.hp = 5;
        this.hitFlash = 0;
    }
    update() {
        if (this.dead) return;
        this.x += this.speed * this.dir;
        if (this.x > this.startX + this.patrolDist || this.x < this.startX - this.patrolDist) {
            this.dir *= -1;
        }
        if (this.hitFlash > 0) this.hitFlash--;
    }
    draw() {
        if (this.dead) return;
        ctx.save(); ctx.translate(this.x - cam, this.y);
        if (this.hitFlash > 0) ctx.globalAlpha = 0.5;

        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-15, -15, 30, 30);

        ctx.fillStyle = '#654321';
        for (let i = -12; i <= 12; i += 8) {
            ctx.beginPath();
            ctx.moveTo(i, -15); ctx.lineTo(i + 4, -22); ctx.lineTo(i + 8, -15);
            ctx.fill();
        }

        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(-6, -5, 5, 0, Math.PI*2); ctx.arc(6, -5, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'red';
        ctx.beginPath(); ctx.arc(-6, -5, 2, 0, Math.PI*2); ctx.arc(6, -5, 2, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-12, 15, 8, 8);
        ctx.fillRect(4, 15, 8, 8);

        ctx.globalAlpha = 1;
        ctx.fillStyle = 'red';
        ctx.fillRect(-15, -28, 30, 6);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(-15, -28, 30 * (this.hp / 5), 6);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 1;
        ctx.strokeRect(-15, -28, 30, 6);
        ctx.restore();
    }
    hit() {
        this.hp--;
        this.hitFlash = 10;
        if (this.hp <= 0) {
            this.dead = true;
            return true;
        }
        return false;
    }
}

// ==================== 特殊变身箱子类 ====================
class SpecialTransformBox {

        this.y = y;

        this.pulse += 0.1;

        ctx.save();
        ctx.translate(this.x - cam, this.y);

        // 发光效果
        ctx.shadowColor = '#00FFFF';
        ctx.shadowBlur = 20 * glow;

        // 特殊箱子（青色带闪电）
        ctx.fillStyle = `rgba(0, 255, 255, ${glow})`;
        ctx.fillRect(-25, -25, 50, 50);

        ctx.shadowBlur = 0;

        // 边框
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.strokeRect(-25, -25, 50, 50);

        // 闪电图标
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.moveTo(-5, -15);
        ctx.lineTo(8, -2);
        ctx.lineTo(-2, -2);
        ctx.lineTo(5, 15);
        ctx.lineTo(-8, 2);
        ctx.lineTo(2, 2);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}
