<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学小恶魔</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #667eea; font-family: 'Microsoft YaHei', sans-serif; }
        #game { position: relative; width: 100%; max-width: 800px; height: 100vh; max-height: 500px; }
        canvas { background: #87CEEB; border-radius: 10px; display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 16px; text-shadow: 1px 1px 2px black; }
        #panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; text-align: center; display: none; z-index: 100; }
        #qtext { font-size: 28px; margin-bottom: 15px; color: #333; }
        .ans { width: 60px; height: 50px; margin: 5px; font-size: 20px; border: none; border-radius: 10px; background: #f5576c; color: white; cursor: pointer; }
        .ans:hover { transform: scale(1.1); }
        #start, #over, #pause { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 200; }
        #over, #pause { display: none; }
        h1 { font-size: 36px; margin-bottom: 20px; }
        button { padding: 12px 30px; font-size: 20px; border: none; border-radius: 20px; background: #fa709a; color: white; cursor: pointer; margin: 8px; }
        button:hover { transform: scale(1.05); }
        .btn-small { padding: 8px 20px; font-size: 16px; }
        #tips { margin-top: 15px; font-size: 14px; text-align: center; line-height: 1.6; }
        #modeSelect { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        /* 消消乐界面 */
        #elimTarget { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); padding: 10px 30px; border-radius: 20px; display: none; z-index: 50; }
        #elimTarget .label { font-size: 14px; color: #666; }
        #elimTarget .num { font-size: 36px; font-weight: bold; color: #f5576c; }

        /* 手机触控 */
        #touch { position: absolute; bottom: 15px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 15px; pointer-events: none; }
        .tbtn { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid white; display: flex; justify-content: center; align-items: center; font-size: 24px; pointer-events: auto; }
        .tbtn:active { background: rgba(255,255,255,0.5); }

        @media (max-width: 768px) {
            body { background: #87CEEB; display: block; }
            #game { max-width: 100%; max-height: 100vh; height: 100vh; border-radius: 0; }
            canvas { border-radius: 0; height: 100%; }
            h1 { font-size: 28px; }
            #touch { display: flex; }
            #tips { font-size: 12px; padding: 0 10px; }
        }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="cvs" width="800" height="500"></canvas>
        <div id="ui">
            <span id="gameUI">关卡: <span id="lvl">1</span> | 得分: <span id="score">0</span> | 糖果: <span id="candy">0</span></span>
            <span id="elimUI" style="display:none;">目标: <span id="elimTargetNum">10</span> | 得分: <span id="elimScore">0</span></span>
            <span id="pauseBtn" style="cursor:pointer;margin-left:10px;" onclick="pauseGame()">⏸️</span>
        </div>
        <div id="elimTarget">
            <div class="label">目标数字</div>
            <div class="num" id="targetNum">10</div>
        </div>
        <div id="panel">
            <div id="qtext"></div>
            <div id="btns"></div>
        </div>
        <div id="start">
            <h1>🎮 数学小恶魔</h1>
            <p style="margin-bottom: 10px;">边玩边学数学！</p>
            <div id="modeSelect">
                <button onclick="startPlatformer()">🏃 横版闯关</button>
                <button onclick="startElimination()">🧩 数字消消乐</button>
            </div>
            <div id="tips">
                <p>⬅️➡️ 移动 | 空格/⬆️ 跳跃(可二段跳)</p>
                <p>顶问号答题，吃糖果，到旗帜过关！</p>
            </div>
        </div>
        <div id="over">
            <h1 id="endTitle">🎉 恭喜通关!</h1>
            <p style="font-size: 20px; margin: 15px;">得分: <span id="final">0</span></p>
            <div>
                <button onclick="restart()">再玩一次</button>
                <button class="btn-small" onclick="backToMenu()">← 主菜单</button>
            </div>
        </div>
        <div id="pause">
            <h1>⏸️ 游戏暂停</h1>
            <div>
                <button onclick="resumeGame()">▶️ 继续游戏</button>
                <button class="btn-small" onclick="backToMenu()">← 返回主菜单</button>
            </div>
        </div>
        <div id="touch">
            <div style="display: flex; gap: 10px;">
                <div class="tbtn" id="l">⬅️</div>
                <div class="tbtn" id="r">➡️</div>
            </div>
            <div class="tbtn" id="j">⬆️</div>
        </div>
    </div>

<script>
// ==================== 音效系统 ====================
const AudioSys = {
    ctx: null, isMuted: false,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    playJump() { this.playTone(200, 600, 0.1, 'sine'); },
    playCoin() { this.playTone(1200, 1600, 0.15, 'sine'); },
    playWin() { this.playChord([523, 659, 784, 1046], 0.4); },
    playFail() { this.playTone(400, 100, 0.5, 'sawtooth'); },
    playClick() { this.playTone(800, 800, 0.05, 'sine'); },
    playTransform() {
        const notes = [523, 659, 784, 1046];
        notes.forEach((f, i) => setTimeout(() => this.playTone(f, f, 0.1, 'square'), i * 50));
    },
    playTone(startFreq, endFreq, duration, type = 'sine') {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(startFreq, this.ctx.currentTime);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    playChord(freqs, duration) {
        freqs.forEach(f => this.playTone(f, f, duration, 'triangle'));
    },
    toggleMute() { this.isMuted = !this.isMuted; return this.isMuted; }
};

// ==================== 游戏变量 ====================
const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let state = 'start', score = 0, candies = 0, keys = {}, level = 1;
let gameMode = ''; // 'platformer' or 'elimination'

// ==================== 横版闯关变量 ====================
let player, blocks = [], coins = [], questions = [], flag, cam = 0;
let items = []; // 道具

// 道具类型
const ITEM_TYPES = {
    SUNFLOWER: { emoji: '🌻', score: 50, effect: 'score' },
    MUSHROOM: { emoji: '🍄', effect: 'grow' },
    STAR: { emoji: '⭐', effect: 'invincible' },
    COIN: { emoji: '🪙', score: 30, effect: 'score' },
    DIAMOND: { emoji: '💎', score: 80, effect: 'score' }
};

// ==================== 消消乐变量 ====================
let elimTarget = 10, elimScore = 0, elimItems = [], elimSelected = [];
let elimTimer = 0, elimSpeed = 1.5, elimSpawnTimer = 0;
const SPECIAL_ITEMS = {
    MINE: { emoji: '💣', type: 'mine', score: -50 },
    CLOUD: { emoji: '☁️', type: 'slow' },
    FREEZE: { emoji: '❄️', type: 'freeze' },
    LIGHTNING: { emoji: '⚡', type: 'speed' }
};

// ==================== 玩家类 ====================
class Player {
    constructor() {
        this.x = 100; this.y = 300; this.vx = 0; this.vy = 0; this.r = 22;
        this.g = false; this.j = 0;
        this.isBig = false; this.invincible = 0;
    }
    jump() { if (this.j < 2) { this.vy = -12; this.j++; AudioSys.playJump(); } }
    update() {
        this.vy += 0.5; this.x += this.vx; this.y += this.vy; this.g = false;
        // 地面和平台碰撞
        for (let p of blocks) {
            if (this.x+this.r>p[0] && this.x-this.r<p[0]+p[2] && this.y+this.r>p[1] && this.y-this.r<p[1]+p[3]) {
                if (this.vy > 0 && this.y-this.r < p[1]) {
                    this.y = p[1]-this.r; this.vy = 0; this.g = true; this.j = 0;
                }
            }
        }
        // 边界
        const maxX = level === 1 ? 2500 : (level === 2 ? 3000 : 3500);
        if (this.x < this.r) this.x = this.r;
        if (this.x > maxX) this.x = maxX;
        if (this.y > 600) { AudioSys.playFail(); restart(); }

        // 无敌效果倒计时
        if (this.invincible > 0) this.invincible--;
    }
    draw() {
        ctx.save();
        const scale = this.isBig ? 1.5 : 1;
        const r = this.r * scale;
        ctx.translate(this.x-cam, this.y);
        // 无敌闪烁
        if (this.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.5;

        // 马里奥风格绘制
        // 帽子（红色）
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(-r*0.8, -r, r*1.6, r*0.6);
        ctx.fillRect(-r*0.5, -r*1.3, r, r*0.5);

        // 脸（肤色）
        ctx.fillStyle = '#FFCC99';
        ctx.fillRect(-r*0.7, -r*0.3, r*1.4, r*0.8);

        // 大鼻子
        ctx.fillStyle = '#FFCC99';
        ctx.beginPath(); ctx.arc(r*0.3, 0, r*0.35, 0, Math.PI*2); ctx.fill();

        // 眼睛
        ctx.fillStyle = 'black';
        ctx.beginPath(); ctx.arc(-r*0.2, -r*0.1, r*0.12, 0, Math.PI*2); ctx.fill();

        // 胡子
        ctx.fillStyle = 'black';
        ctx.fillRect(-r*0.4, r*0.1, r*0.8, r*0.15);

        // 身体（蓝色背带裤）
        ctx.fillStyle = '#0066CC';
        ctx.fillRect(-r*0.7, r*0.5, r*1.4, r*0.8);

        // 黄色扣子
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(-r*0.3, r*0.7, r*0.1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(r*0.3, r*0.7, r*0.1, 0, Math.PI*2); ctx.fill();

        // 鞋子（棕色）
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-r*0.8, r*1.2, r*0.7, r*0.4);
        ctx.fillRect(r*0.1, r*1.2, r*0.7, r*0.4);

        ctx.restore();
    }
}

// ==================== 糖果/金币类 ====================
class Coin {
    constructor(x,y,type='COIN') { this.x=x; this.y=y; this.t=Math.random(); this.get=false; this.type=type; }
    draw() {
        if (this.get) return; this.t += 0.05;
        ctx.save(); ctx.translate(this.x-cam, this.y+Math.sin(this.t)*3);
        const item = ITEM_TYPES[this.type] || ITEM_TYPES.COIN;
        if (this.type === 'COIN' || this.type === 'DIAMOND') {
            ctx.fillStyle = this.type === 'DIAMOND' ? '#00CED1' : '#FFD700';
            ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
        } else {
            ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.fillText(item.emoji, 0, 5);
        }
        ctx.restore();
    }
}

// ==================== 问题方块类 ====================
class QBlock {
    constructor(x,y,diff) {
        this.x=x; this.y=y; this.done=false; this.diff=diff; this.q=this.makeQ();
        // 随机分配道具类型
        const rand = Math.random();
        if (rand < 0.3) this.itemType = 'MUSHROOM';
        else if (rand < 0.5) this.itemType = 'STAR';
        else if (rand < 0.7) this.itemType = 'SUNFLOWER';
        else if (rand < 0.85) this.itemType = 'COIN';
        else this.itemType = 'DIAMOND';
        this.itemSpawned = false;
    }
    makeQ() {
        let text, ans, type;
        if (this.diff === 1) { type = 'add_easy'; }
        else if (this.diff === 2) { type = Math.random() > 0.5 ? 'add' : 'sub'; }
        else { type = ['add','sub','compare'][Math.floor(Math.random()*3)]; }
        if (type === 'add_easy') { const a=Math.floor(Math.random()*5)+1,b=Math.floor(Math.random()*5)+1; text=`${a} + ${b} = ?`; ans=a+b; }
        else if (type === 'add') { const a=Math.floor(Math.random()*10)+5,b=Math.floor(Math.random()*10)+1; text=`${a} + ${b} = ?`; ans=a+b; }
        else if (type === 'sub') { const a=Math.floor(Math.random()*10)+10,b=Math.floor(Math.random()*a); text=`${a} - ${b} = ?`; ans=a-b; }
        else if (type === 'compare') { const a=Math.floor(Math.random()*15)+1,b=Math.floor(Math.random()*15)+1; text=`${a} ○ ${b}`; ans=a>b?'>':(a<b?'<':'='); return {text,ans,opts:['>','<','=']}; }
        let opts=[ans];
        while(opts.length<3){const w=ans+Math.floor(Math.random()*8)-4;if(w>=0&&w!==ans&&!opts.includes(w))opts.push(w);}
        opts.sort(()=>Math.random()-0.5); return {text,ans,opts};
    }
    draw() {
        ctx.save(); ctx.translate(this.x-cam, this.y);
        ctx.fillStyle=this.done?'#9CA3AF':'#F59E0B';
        ctx.fillRect(-20,-20,40,40); ctx.strokeStyle='#B45309'; ctx.lineWidth=2; ctx.strokeRect(-20,-20,40,40);
        ctx.fillStyle='white'; ctx.font='bold 22px Arial'; ctx.textAlign='center'; ctx.fillText(this.done?'✓':'?',0,5);
        ctx.restore();
    }
}

// ==================== 道具类 ====================
class Item {
    constructor(x, y, type) { this.x=x; this.y=y; this.type=type; this.collected=false; this.vy=0; }
    update() {
        this.vy += 0.3; this.y += this.vy;
        // 落地检测
        for (let p of blocks) {
            if (this.x>p[0] && this.x<p[0]+p[2] && this.y+15>p[1] && this.y<p[1]+p[3]) {
                this.y = p[1]-15; this.vy = 0;
            }
        }
    }
    draw() {
        if (this.collected) return;
        ctx.save(); ctx.translate(this.x-cam, this.y);
        ctx.font = '24px Arial'; ctx.textAlign = 'center';
        ctx.fillText(ITEM_TYPES[this.type].emoji, 0, 5);
        ctx.restore();
    }
}

// ==================== 敌人类 ====================
class Enemy {
    constructor(x, y, patrolDist = 100) {
        this.x = x; this.y = y; this.w = 30; this.h = 30;
        this.startX = x; this.patrolDist = patrolDist;
        this.dir = 1; this.speed = 1.5;
        this.dead = false;
    }
    update() {
        if (this.dead) return;
        this.x += this.speed * this.dir;
        if (this.x > this.startX + this.patrolDist || this.x < this.startX - this.patrolDist) {
            this.dir *= -1;
        }
    }
    draw() {
        if (this.dead) return;
        ctx.save(); ctx.translate(this.x - cam, this.y);
        // 小怪兽身体（棕色）
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-15, -15, 30, 30);
        // 刺
        ctx.fillStyle = '#654321';
        for (let i = -12; i <= 12; i += 8) {
            ctx.beginPath();
            ctx.moveTo(i, -15); ctx.lineTo(i + 4, -22); ctx.lineTo(i + 8, -15);
            ctx.fill();
        }
        // 眼睛
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(-6, -5, 5, 0, Math.PI*2); ctx.arc(6, -5, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'red';
        ctx.beginPath(); ctx.arc(-6, -5, 2, 0, Math.PI*2); ctx.arc(6, -5, 2, 0, Math.PI*2); ctx.fill();
        // 脚
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-12, 15, 8, 8);
        ctx.fillRect(4, 15, 8, 8);
        ctx.restore();
    }
}

// ==================== 横版闯关初始化 ====================
let enemies = [];
function initPlatformer() {
    player = new Player(); cam = 0;
    blocks = []; coins = []; questions = []; items = []; enemies = [];
    if (level === 1) {
        blocks = [[0,450,2500,50], [150,380,80,20], [300,320,80,20], [500,380,80,20], [700,280,100,20], [900,350,80,20], [1150,300,80,20], [1400,380,80,20], [1700,320,100,20]];
        [180,340,340,260,540,550,750,240,940,310,1200,260,1450,340,1750,280].forEach((v,i,arr)=>{if(i%2===0)coins.push(new Coin(v,arr[i+1]));});
        questions = [new QBlock(350,250,1), new QBlock(750,200,1), new QBlock(1200,220,1)];
        // 地面敌人
        enemies.push(new Enemy(400, 420, 80));
        enemies.push(new Enemy(1000, 420, 100));
        enemies.push(new Enemy(1600, 420, 120));
        flag = {x:2000,y:350};
    } else if (level === 2) {
        blocks = [[0,450,3000,50], [120,400,60,20], [250,340,80,20], [400,400,60,20], [550,280,100,20], [750,350,80,20], [950,250,80,20], [1150,380,80,20], [1350,300,100,20], [1600,380,80,20], [1850,320,100,20], [2100,260,100,20], [2400,350,80,20]];
        [150,360,290,300,430,360,600,240,800,310,1000,210,1200,340,1400,260,1650,340,1900,280,2150,220,2450,310].forEach((v,i,arr)=>{if(i%2===0)coins.push(new Coin(v,arr[i+1]));});
        questions = [new QBlock(600,200,2), new QBlock(1000,170,2), new QBlock(1400,220,2), new QBlock(2200,190,2)];
        enemies.push(new Enemy(500, 420, 100));
        enemies.push(new Enemy(1300, 420, 80));
        enemies.push(new Enemy(2000, 420, 150));
        enemies.push(new Enemy(2600, 420, 100));
        flag = {x:2600,y:280};
    } else {
        blocks = [[0,450,3500,50], [100,380,60,20], [220,320,60,20], [350,400,60,20], [480,340,80,20], [650,280,80,20], [800,400,60,20], [950,320,100,20], [1150,260,80,20], [1350,380,80,20], [1550,300,100,20], [1800,400,80,20], [2050,320,100,20], [2300,250,100,20], [2550,380,80,20], [2800,300,100,20], [3100,350,80,20]];
        [130,350,250,290,380,370,520,310,700,250,830,370,1000,290,1200,230,1400,350,1600,270,1850,370,2100,290,2350,220,2600,350,2850,270,3150,320].forEach((v,i,arr)=>{if(i%2===0)coins.push(new Coin(v,arr[i+1]));});
        questions = [new QBlock(520,250,3), new QBlock(1000,210,3), new QBlock(1600,240,3), new QBlock(2100,250,3), new QBlock(2850,230,3)];
        enemies.push(new Enemy(600, 420, 100));
        enemies.push(new Enemy(1400, 420, 120));
        enemies.push(new Enemy(2400, 420, 150));
        enemies.push(new Enemy(3000, 420, 100));
        flag = {x:3300,y:280};
    }
}

function updatePlatformer() {
    if (state !== 'play') return;
    if (keys['ArrowLeft']) player.vx = -4;
    else if (keys['ArrowRight']) player.vx = 4;
    else player.vx *= 0.8;
    player.update();
    const maxCam = level === 1 ? 1700 : (level === 2 ? 2200 : 2600);
    cam = Math.max(0, Math.min(player.x-200, maxCam));

    // 吃糖果
    for (let c of coins) {
        if (!c.get && Math.hypot(player.x-c.x, player.y-c.y) < 30) {
            c.get = true; candies++; score += (ITEM_TYPES[c.type]?.score || 10);
            AudioSys.playCoin(); updateUI();
        }
    }
    // 吃道具
    for (let item of items) {
        if (!item.collected && Math.hypot(player.x-item.x, player.y-item.y) < 35) {
            item.collected = true;
            collectItem(item.type);
        }
    }
    // 道具物理
    for (let item of items) item.update();
    // 敌人更新和碰撞
    for (let e of enemies) {
        e.update();
        if (!e.dead && Math.hypot(player.x-e.x, player.y-e.y) < 30) {
            if (player.invincible > 0 || player.isBig) {
                // 无敌或变大可以踩死敌人
                e.dead = true;
                score += 50;
                AudioSys.playCoin();
            } else {
                // 被敌人碰到游戏结束
                AudioSys.playFail();
                restart();
                return;
            }
        }
    }
    // 答题
    for (let q of questions) {
        if (!q.done && Math.hypot(player.x-q.x, player.y-q.y) < 40) showQ(q);
    }
    // 过关
    if (Math.abs(player.x-flag.x) < 40 && Math.abs(player.y-flag.y) < 60) win();
}

function collectItem(type) {
    const item = ITEM_TYPES[type];
    if (item.effect === 'score') {
        score += item.score; AudioSys.playCoin();
    } else if (item.effect === 'grow') {
        player.isBig = true; AudioSys.playTransform();
    } else if (item.effect === 'invincible') {
        player.invincible = 300; AudioSys.playTransform();
    }
}

function drawPlatformer() {
    ctx.fillStyle = '#87CEEB'; ctx.fillRect(0,0,cvs.width,cvs.height);
    // 云
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let [x,y,r] of [[100,80,30],[300,120,40],[500,60,25],[700,100,35]]) {
        ctx.beginPath(); ctx.arc(x-cam*0.3,y,r,0,Math.PI*2); ctx.fill();
    }
    // 地面
    const groundLen = level === 1 ? 2500 : (level === 2 ? 3000 : 3500);
    ctx.fillStyle = '#4ADE80'; ctx.fillRect(0-cam,450,groundLen,10);
    ctx.fillStyle = '#D97706'; ctx.fillRect(0-cam,460,groundLen,90);
    // 平台
    ctx.fillStyle = '#8B5CF6';
    for (let b of blocks.slice(1)) ctx.fillRect(b[0]-cam,b[1],b[2],b[3]);
    // 道具
    for (let item of items) item.draw();
    // 糖果
    for (let c of coins) c.draw();
    // 敌人
    for (let e of enemies) e.draw();
    // 问题
    for (let q of questions) q.draw();
    // 旗帜
    ctx.fillStyle = '#8B4513'; ctx.fillRect(flag.x-cam,flag.y,8,100);
    ctx.fillStyle = '#FF6B6B'; ctx.beginPath(); ctx.moveTo(flag.x-cam+8,flag.y); ctx.lineTo(flag.x-cam+50,flag.y+20); ctx.lineTo(flag.x-cam+8,flag.y+40); ctx.fill();
    // 玩家
    player.draw();
}

function showQ(block) {
    state = 'q';
    document.getElementById('qtext').textContent = block.q.text;
    const btns = document.getElementById('btns'); btns.innerHTML = '';
    block.q.opts.forEach(opt => {
        const b = document.createElement('button'); b.className = 'ans'; b.textContent = opt;
        b.onclick = () => answer(block, opt);
        btns.appendChild(b);
    });
    document.getElementById('panel').style.display = 'block';
}

function answer(block, sel) {
    if (sel === block.q.ans) {
        block.done = true; score += 50; candies += 2;
        AudioSys.playCoin(); updateUI();
        // 答对生成道具
        if (!block.itemSpawned) {
            items.push(new Item(block.x, block.y - 40, block.itemType));
            block.itemSpawned = true;
        }
    } else {
        AudioSys.playFail();
    }
    document.getElementById('panel').style.display = 'none';
    state = 'play';
}

// ==================== 消消乐 ====================
function startElimination() {
    AudioSys.init(); AudioSys.playClick();
    gameMode = 'elimination';
    document.getElementById('start').style.display = 'none';
    document.getElementById('gameUI').style.display = 'none';
    document.getElementById('elimUI').style.display = 'inline';
    document.getElementById('elimTarget').style.display = 'block';
    state = 'play'; elimScore = 0; elimItems = []; elimSelected = [];
    elimTimer = 0; elimSpeed = 1.5; elimSpawnTimer = 0;
    elimTarget = Math.floor(Math.random() * 6) + 5;
    document.getElementById('elimTargetNum').textContent = elimTarget;
    document.getElementById('targetNum').textContent = elimTarget;
    elimLoop();
}

function elimLoop() {
    if ((state !== 'play' && state !== 'q') || gameMode !== 'elimination') return;
    elimUpdate(); elimDraw();
    requestAnimationFrame(elimLoop);
}

function elimUpdate() {
    elimTimer++;
    elimSpawnTimer++;
    if (elimSpawnTimer > 90) {
        elimSpawnItems(); elimSpawnTimer = 0;
        if (elimSpeed < 4) elimSpeed += 0.05;
    }
    for (let i = elimItems.length - 1; i >= 0; i--) {
        let item = elimItems[i];
        if (item.special === 'CLOUD') { item.y += elimSpeed * 0.5; item.x += Math.sin(elimTimer/30)*0.5; }
        else if (item.frozen) item.y += elimSpeed * 0.3;
        else item.y += elimSpeed;
        if (item.y > cvs.height + 50) elimItems.splice(i, 1);
        if (item.freezeTime) { item.freezeTime--; if (item.freezeTime <= 0) item.frozen = false; }
    }
    elimItems = elimItems.filter(item => !item.cleared);
}

function elimSpawnItems() {
    const cols = 4, colWidth = cvs.width / cols;
    for (let i = 0; i < cols; i++) {
        const rand = Math.random();
        if (rand < 0.15) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'MINE',emoji:'💣',type:'special',cleared:false});
        else if (rand < 0.25) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'CLOUD',emoji:'☁️',type:'special',cleared:false});
        else if (rand < 0.32) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'FREEZE',emoji:'❄️',type:'special',cleared:false});
        else if (rand < 0.38) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'LIGHTNING',emoji:'⚡',type:'special',cleared:false});
        else {
            const num = Math.floor(Math.random() * 11);
            elimItems.push({x:i*colWidth+colWidth/2,y:-50,value:num,type:'number',selected:false,cleared:false});
        }
    }
}

function elimDraw() {
    ctx.fillStyle = '#E8F4FF'; ctx.fillRect(0,0,cvs.width,cvs.height);
    ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) { ctx.beginPath(); ctx.moveTo(i*cvs.width/4,0); ctx.lineTo(i*cvs.width/4,cvs.height); ctx.stroke(); }
    for (let item of elimItems) {
        if (item.cleared) continue;
        if (item.type === 'number') {
            ctx.fillStyle = item.selected ? '#4ade80' : '#F472B6';
            ctx.beginPath(); ctx.arc(item.x, item.y, 30, 0, Math.PI*2); ctx.fill();
            if (item.selected) { ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.stroke(); }
            ctx.fillStyle = 'white'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(item.value, item.x, item.y);
        } else {
            ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            if (item.frozen) { ctx.globalAlpha = 0.7; ctx.fillStyle = '#87CEEB'; ctx.beginPath(); ctx.arc(item.x, item.y, 35, 0, Math.PI*2); ctx.fill(); }
            ctx.fillText(item.emoji, item.x, item.y); ctx.globalAlpha = 1;
        }
    }
    // 选中提示
    if (elimSelected.length > 0) {
        ctx.fillStyle = '#4ade80'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
        let sum = elimSelected.reduce((a,b)=>a+b.value,0);
        let text = elimSelected.map(s=>s.value).join(' + ');
        if (elimSelected.length === 1) text += ' + ?';
        ctx.fillText(text + ' = ' + sum, cvs.width/2, 130);
    }
    // 分数
    ctx.fillStyle = '#333'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'left';
    ctx.fillText('💎 ' + elimScore, 15, 35);
}

function elimClick(x, y) {
    for (let item of elimItems) {
        if (item.cleared) continue;
        const dist = Math.sqrt((x-item.x)**2 + (y-item.y)**2);
        if (dist < 35) {
            if (item.type === 'special') elimHandleSpecial(item);
            else elimHandleNumber(item);
            return;
        }
    }
}

function elimHandleSpecial(item) {
    if (item.special === 'MINE') { elimScore -= 50; elimEndGame(); }
    else if (item.special === 'CLOUD') { elimItems.forEach(i=>i.y-=100); }
    else if (item.special === 'FREEZE') { elimItems.forEach(i=>{i.frozen=true;i.freezeTime=300;}); }
    else if (item.special === 'LIGHTNING') { elimSpeed = Math.min(elimSpeed+2, 6); }
    item.cleared = true;
}

function elimHandleNumber(item) {
    if (item.selected) { item.selected = false; elimSelected = elimSelected.filter(s=>s!==item); }
    else if (elimSelected.length < 2) { item.selected = true; elimSelected.push(item); }
    if (elimSelected.length === 2) {
        const sum = elimSelected[0].value + elimSelected[1].value;
        if (sum === elimTarget) {
            elimSelected.forEach(s=>s.cleared=true);
            elimScore += sum * 10; elimTarget = Math.floor(Math.random()*6)+5;
            document.getElementById('elimTargetNum').textContent = elimTarget;
            document.getElementById('targetNum').textContent = elimTarget;
            AudioSys.playCoin();
        }
        elimSelected.forEach(s=>s.selected=false); elimSelected = [];
    }
}

function elimEndGame() {
    state = 'over'; gameMode = '';
    document.getElementById('endTitle').textContent = '💣 游戏结束';
    document.getElementById('final').textContent = elimScore;
    document.getElementById('over').style.display = 'flex';
    document.getElementById('elimTarget').style.display = 'none';
}

// ==================== 通用功能 ====================
function startPlatformer() {
    AudioSys.init(); AudioSys.playClick();
    gameMode = 'platformer';
    document.getElementById('start').style.display = 'none';
    document.getElementById('gameUI').style.display = 'inline';
    document.getElementById('elimUI').style.display = 'none';
    level = 1; score = 0; candies = 0;
    state = 'play'; initPlatformer(); loop();
}

function loop() {
    if ((state !== 'play' && state !== 'q') || gameMode !== 'platformer') return;
    updatePlatformer(); drawPlatformer();
    requestAnimationFrame(loop);
}

function restart() {
    document.getElementById('over').style.display = 'none';
    if (gameMode === 'platformer') { level = 1; score = 0; candies = 0; initPlatformer(); state = 'play'; loop(); }
    else if (gameMode === 'elimination') { elimScore = 0; elimItems = []; elimSelected = []; elimSpeed = 1.5; elimTarget = Math.floor(Math.random()*6)+5; document.getElementById('elimTargetNum').textContent = elimTarget; document.getElementById('targetNum').textContent = elimTarget; state = 'play'; elimLoop(); }
}

function win() {
    if (level < 3) {
        level++; score += 100;
        AudioSys.playWin();
        initPlatformer();
    } else {
        state = 'over';
        AudioSys.playWin();
        document.getElementById('endTitle').textContent = '🏆 全部通关!';
        document.getElementById('final').textContent = score;
        document.getElementById('over').style.display = 'flex';
    }
}

function pauseGame() {
    if (state === 'play') { state = 'pause'; document.getElementById('pause').style.display = 'flex'; }
}

function resumeGame() {
    if (state === 'pause') { state = 'play'; document.getElementById('pause').style.display = 'none'; if (gameMode === 'platformer') loop(); else if (gameMode === 'elimination') elimLoop(); }
}

function backToMenu() {
    state = 'start'; gameMode = '';
    document.getElementById('over').style.display = 'none';
    document.getElementById('pause').style.display = 'none';
    document.getElementById('start').style.display = 'flex';
    document.getElementById('gameUI').style.display = 'inline';
    document.getElementById('elimUI').style.display = 'none';
    document.getElementById('elimTarget').style.display = 'none';
}

function updateUI() {
    document.getElementById('lvl').textContent = level;
    document.getElementById('score').textContent = score;
    document.getElementById('candy').textContent = candies;
}

// 键盘
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); if (state === 'play' && gameMode === 'platformer') player.jump(); }
    if (e.code === 'Escape') { if (state === 'play') pauseGame(); else if (state === 'pause') resumeGame(); }
});
document.addEventListener('keyup', e => keys[e.code] = false);

// 触控
function touch(id, key, isJump) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; if (isJump && state === 'play' && gameMode === 'platformer') player.jump(); });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
}
touch('l', 'ArrowLeft', false);
touch('r', 'ArrowRight', false);
touch('j', 'Space', true);

// 消消乐点击
cvs.addEventListener('click', e => {
    if (gameMode === 'elimination' && state === 'play') {
        const rect = cvs.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (cvs.width / rect.width);
        const y = (e.clientY - rect.top) * (cvs.height / rect.height);
        elimClick(x, y);
    }
});

// 自适应
if (window.innerWidth <= 768) {
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;
}
</script>
