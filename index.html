<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学小恶魔 - 竖屏版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #333;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #game {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 900px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }

        #start, #over, #customize {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
        }
        #over, #customize { display: none; }

        h1 { font-size: 28px; margin-bottom: 20px; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        h2 { font-size: 22px; margin-bottom: 15px; color: #FCD34D; }

        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(145deg, #fa709a 0%, #fee140 100%);
            color: white;
            margin: 8px;
            transition: transform 0.2s;
            min-width: 200px;
        }
        button:hover { transform: scale(1.05); }
        .btn-small { padding: 8px 20px; font-size: 14px; min-width: 120px; }

        .preview-box {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.3);
            margin-bottom: 15px;
        }

        .options-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 5px 0;
        }
        .option-btn {
            padding: 8px 15px;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
        .option-btn:hover, .option-btn.active {
            background: rgba(236, 72, 153, 0.6);
            border-color: #EC4899;
        }
        .label { font-size: 14px; color: #FCD34D; margin-top: 8px; }

        /* 角色选择 */
        .character-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 350px;
        }
        .character-card {
            background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .character-card:hover, .character-card.active {
            background: rgba(236, 72, 153, 0.4);
            border-color: #EC4899;
            transform: scale(1.05);
        }
        .char-emoji { font-size: 50px; margin-bottom: 8px; }
        .char-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
        .char-skill { font-size: 12px; color: #FCD34D; }

        /* 触控按钮 */
        #touch {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 150;
        }
        .tbtn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: 3px solid rgba(255,255,255,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            pointer-events: auto;
            user-select: none;
            touch-action: manipulation;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .tbtn:active { background: rgba(255,255,255,0.9); transform: scale(0.92); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        #touch {
            display: none;
            justify-content: space-between;
            padding: 0 20px;
        }

        #hint {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            display: none;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: pop 0.5s ease-out;
        }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #mathPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 300;
        }
        #mathPanel h3 { color: #333; margin-bottom: 15px; font-size: 22px; }
        .math-ans {
            width: 60px;
            height: 50px;
            margin: 5px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #f5576c;
            color: white;
            cursor: pointer;
        }
        .math-ans:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="cvs"></canvas>

        <div id="ui">
            <span>⭐ <span id="score">0</span></span>
            <span id="muteBtn" style="cursor:pointer;font-size:20px;" onclick="toggleMute()">🔊</span>
            <span>🏆 <span id="highScore">0</span></span>
        </div>

        <div id="hint"></div>

        <div id="mathPanel">
            <h3 id="mathQ">1 + 1 = ?</h3>
            <div id="mathBtns"></div>
        </div>

        <!-- 开始界面 -->
        <div id="start">
            <h1>🎮 数学小恶魔</h1>
            <p style="margin-bottom: 20px; font-size: 14px; text-align: center; line-height: 1.6;">
                选择游戏模式开始冒险！<br>
                向上跳跃或数字消消乐
            </p>
            <button onclick="showCustomize()">🏃 纵向跳跃</button>
            <button onclick="startPlatformer()">🏰 横版闯关</button>
            <button onclick="startElimination()">🧩 数字消消乐</button>
        </div>

        <!-- 角色选择 -->
        <div id="customize">
            <h2>🎮 选择蛋仔角色</h2>
            <div class="character-grid">
                <div class="character-card active" onclick="selectCharacter('yellow', this)">
                    <div class="char-emoji">🟡</div>
                    <div class="char-name">小黄蛋</div>
                    <div class="char-skill">平衡型</div>
                </div>
                <div class="character-card" onclick="selectCharacter('pink', this)">
                    <div class="char-emoji">🩷</div>
                    <div class="char-name">小粉蛋</div>
                    <div class="char-skill">跳跃+</div>
                </div>
                <div class="character-card" onclick="selectCharacter('blue', this)">
                    <div class="char-emoji">🔵</div>
                    <div class="char-name">小蓝蛋</div>
                    <div class="char-skill">速度+</div>
                </div>
                <div class="character-card" onclick="selectCharacter('black', this)">
                    <div class="char-emoji">⚫</div>
                    <div class="char-name">小黑蛋</div>
                    <div class="char-skill">重量+</div>
                </div>
            </div>
            <button onclick="startGame()">🚀 开始游戏</button>
        </div>

        <!-- 消消乐目标显示 -->
        <div id="elimTarget" style="position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); padding: 10px 30px; border-radius: 20px; display: none; z-index: 100;">
            <div style="font-size: 14px; color: #666;">目标</div>
            <div id="targetNum" style="font-size: 36px; font-weight: bold; color: #f5576c;">10</div>
        </div>

        <!-- 游戏结束 -->
        <div id="over">
            <h1 id="endTitle">💥 掉下去了!</h1>
            <p style="font-size: 20px; margin: 15px;">得分: <span id="finalScore">0</span></p>
            <p style="font-size: 14px; color: #FCD34D;">最高: <span id="finalHigh">0</span></p>
            <div style="margin-top: 20px;">
                <button onclick="restart()">🔄 再玩一次</button>
                <button class="btn-small" onclick="backToMenu()">← 主菜单</button>
            </div>
        </div>

        <!-- 触控按钮 -->
        <div id="touch">
            <div style="display: flex; gap: 20px;">
                <div class="tbtn" id="btnLeft">⬅️</div>
                <div class="tbtn" id="btnRight">➡️</div>
            </div>
            <div class="tbtn" id="btnJump" style="background: rgba(255,200,0,0.6); border-color: rgba(255,220,100,0.9);">⬆️</div>
        </div>
    </div>

<script>
const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
// preview canvas 已移除，相关功能禁用
let previewCtx = null;

// ==================== 音效系统 ====================
const AudioSys = {
    ctx: null,
    bgmOsc: null,
    bgmGain: null,
    isMuted: false,

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },

    // 播放跳跃音效 - 短促上升音
    playJump() {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);

        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.1);
    },

    // 播放落地/撞击音效 - 低沉短音
    playLand() {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'square';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);

        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.08);
    },

    // 播放收集金币音效 - 清脆高音
    playCoin() {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, this.ctx.currentTime);
        osc.frequency.setValueAtTime(1600, this.ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);

        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.15);
    },

    // 播放获得道具音效 - 上升琶音
    playPowerUp() {
        if (this.isMuted || !this.ctx) return;
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
        notes.forEach((freq, i) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            osc.type = 'square';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.05);
            gain.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + i * 0.05 + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.05 + 0.1);

            osc.start(this.ctx.currentTime + i * 0.05);
            osc.stop(this.ctx.currentTime + i * 0.05 + 0.1);
        });
    },

    // 播放变身音效 - 特殊效果音
    playTransform() {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);

        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.3);
    },

    // 播放火箭冲刺音效
    playRocket() {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + 0.5);

        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.5);
    },

    // 播放失败音效 - 下降音
    playFail() {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);

        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.5);
    },

    // 播放胜利/通关音效 - 庆祝和弦
    playWin() {
        if (this.isMuted || !this.ctx) return;
        const chords = [
            [523.25, 659.25, 783.99],  // C major
            [659.25, 783.99, 987.77],  // E minor
            [783.99, 987.77, 1174.66], // G major
            [1046.50, 1318.51, 1567.98] // C major high
        ];

        chords.forEach((chord, i) => {
            chord.forEach(freq => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.2);
                gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + i * 0.2 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.2 + 0.4);

                osc.start(this.ctx.currentTime + i * 0.2);
                osc.stop(this.ctx.currentTime + i * 0.2 + 0.4);
            });
        });
    },

    // 播放按钮点击音效
    playClick() {
        if (this.isMuted || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);

        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.05);
    },

    // 背景音乐 - 简单循环旋律
    startBGM() {
        if (this.isMuted || !this.ctx || this.bgmOsc) return;
        // 使用简单的鼓点节奏代替复杂旋律，避免单调
        this.playBeat();
    },

    playBeat() {
        if (this.isMuted || !this.ctx || state !== 'play') return;

        // 低音鼓点
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.frequency.setValueAtTime(100, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);

        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.1);

        // 每0.5秒一个节拍
        setTimeout(() => this.playBeat(), 500);
    },

    stopBGM() {
        this.bgmOsc = null;
    },

    toggleMute() {
        this.isMuted = !this.isMuted;
        return this.isMuted;
    }
};

// ==================== 视觉特效系统 ====================
const Effects = {
    shake: 0,
    flash: 0,
    floatingTexts: [],
    screenFlashColor: null,

    // 屏幕震动
    addShake(amount) {
        this.shake = Math.max(this.shake, amount);
    },

    // 屏幕闪烁
    addFlash(color, duration) {
        this.screenFlashColor = color;
        this.flash = duration;
    },

    // 添加浮动文字
    addFloatingText(text, x, y, color = '#FFD700') {
        this.floatingTexts.push({
            text, x, y, color,
            vy: -2,
            life: 40,
            scale: 1
        });
    },

    update() {
        // 震动衰减
        if (this.shake > 0) this.shake *= 0.9;
        if (this.shake < 0.5) this.shake = 0;

        // 闪烁衰减
        if (this.flash > 0) this.flash--;

        // 更新浮动文字
        this.floatingTexts = this.floatingTexts.filter(ft => {
            ft.y += ft.vy;
            ft.vy *= 0.95;
            ft.life--;
            ft.scale = 1 + (40 - ft.life) * 0.02;
            return ft.life > 0;
        });
    },

    apply(ctx) {
        // 应用震动
        if (this.shake > 0) {
            const dx = (Math.random() - 0.5) * this.shake;
            const dy = (Math.random() - 0.5) * this.shake;
            ctx.translate(dx, dy);
        }
    },

    draw(ctx) {
        // 绘制屏幕闪烁
        if (this.flash > 0 && this.screenFlashColor) {
            ctx.save();
            ctx.globalAlpha = this.flash / 10 * 0.3;
            ctx.fillStyle = this.screenFlashColor;
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            ctx.restore();
        }

        // 绘制浮动文字
        this.floatingTexts.forEach(ft => {
            ctx.save();
            ctx.translate(ft.x, ft.y);
            ctx.scale(ft.scale, ft.scale);
            ctx.globalAlpha = ft.life / 40;
            ctx.fillStyle = ft.color;
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(ft.text, 0, 0);
            ctx.fillText(ft.text, 0, 0);
            ctx.restore();
        });
    }
};

// 设置画布大小
function resize() {
    const game = document.getElementById('game');
    cvs.width = game.clientWidth;
    cvs.height = game.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// 游戏状态
let state = 'start';
let score = 0, highScore = localStorage.getItem('mathDemonHigh') || 0;
let keys = {};
let camera = 0; // 相机高度

// 角色配置 - 蛋仔角色
let config = {
    character: 'yellow', // yellow, pink, blue, black
    jumpPower: -12,
    speed: 5,
    weight: 1
};

// 游戏对象
let player;
let platforms = [];
let gifts = []; // 礼物盒
let items = []; // 道具
let particles = []; // 粒子效果

// 道具类型 - 丰富多样
const ITEM_TYPES = {
    SUNFLOWER: { emoji: '🌻', score: 50, effect: 'score', desc: '向日葵 +50分' },
    MUSHROOM: { emoji: '🍄', score: 0, effect: 'grow', desc: '蘑菇 变大!' },
    STAR: { emoji: '⭐', score: 100, effect: 'invincible', desc: '星星 无敌!' },
    COIN: { emoji: '🪙', score: 30, effect: 'score', desc: '金币 +30分' },
    DIAMOND: { emoji: '💎', score: 80, effect: 'score', desc: '钻石 +80分' },
    HAMBURGER: { emoji: '🍔', score: 20, effect: 'heal', desc: '汉堡 回血!' },
    ICE_CREAM: { emoji: '🍦', score: 40, effect: 'slow', desc: '冰淇淋 减速' },
    ROCKET: { emoji: '🚀', score: 0, effect: 'boost', desc: '火箭 冲刺!' },
    MAGNET: { emoji: '🧲', score: 0, effect: 'magnet', desc: '磁铁 吸金币' },
    MATH: { emoji: '📚', score: 100, effect: 'math', desc: '数学题 +100分' }
};

// ==================== 界面控制 ====================
function showCustomize() {
    AudioSys.init();
    AudioSys.playClick();
    document.getElementById('start').style.display = 'none';
    document.getElementById('customize').style.display = 'flex';

// ==================== 游戏类 ====================
class Player {
    constructor() {
        this.x = cvs.width / 2;
        this.y = cvs.height - 70; // 站在平台上方 (平台在cvs.height-50, 半径20)
        this.vx = 0;
        this.vy = 0;
        this.r = 20;
        this.baseR = 20;
        this.grounded = true; // 初始时站在地面上
        this.growTime = 0; // 变大剩余时间
        this.invincible = 0; // 无敌时间
        this.magnetTime = 0; // 磁铁时间
        this.trail = []; // 跳跃拖尾轨迹
        this.jumpCooldown = 0; // 跳跃冷却，防止连续跳跃
    }

    update() {
        // 重力 - 根据重量调整
        this.vy += 0.6 * config.weight;

        // 移动 - 使用角色速度
        if (keys['ArrowLeft']) this.vx = -config.speed;
        else if (keys['ArrowRight']) this.vx = config.speed;
        else this.vx *= 0.8;

        this.x += this.vx;
        this.y += this.vy;

        // 边界
        if (this.x < this.r) this.x = this.r;
        if (this.x > cvs.width - this.r) this.x = cvs.width - this.r;

        // 道具效果倒计时
        if (this.growTime > 0) {
            this.growTime--;
            this.r = this.baseR * 1.5;
        } else {
            this.r = this.baseR;
        }
        if (this.invincible > 0) this.invincible--;
        if (this.magnetTime > 0) this.magnetTime--;

        // 磁铁效果 - 吸引道具
        if (this.magnetTime > 0) {
            for (let item of items) {
                const dx = this.x - item.x;
                const dy = (this.y - camera) - (item.y - camera);
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150 && dist > 10) {
                    item.x += dx * 0.05;
                    item.y += dy * 0.05;
                }
            }
        }

        // 检查掉落
        if (this.y > camera + cvs.height + 100) {
            gameOver();
        }

        // 跳跃冷却递减（coyote time - 离开平台后短暂时间仍可跳跃）
        if (this.jumpCooldown > 0) this.jumpCooldown--;

        // 更新跳跃拖尾
        if (!this.grounded && Math.abs(this.vy) > 2) {
            this.trail.push({x: this.x, y: this.y - camera, alpha: 0.6});
        }
        this.trail = this.trail.filter(t => {
            t.alpha -= 0.05;
            return t.alpha > 0;
        });
    }

    jump() {
        // 可以跳跃的条件：在地面上，或者有跳跃冷却（coyote time）
        if ((this.grounded || this.jumpCooldown > 0) && this.vy >= 0) {
            this.vy = config.jumpPower;
            this.grounded = false;
            this.jumpCooldown = 0; // 使用掉跳跃机会
            AudioSys.playJump();
            // 跳跃时产生灰尘粒子
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(this.x, this.y + this.r, 'rgba(200,200,200,0.5)'));
            }
        }
    }

    draw() {
        const screenY = this.y - camera;
        if (screenY < -50 || screenY > cvs.height + 50) return;

        ctx.save();

        // 绘制跳跃拖尾
        this.trail.forEach((t, i) => {
            ctx.fillStyle = `rgba(255, 255, 255, ${t.alpha * 0.3})`;
            ctx.beginPath();
            ctx.arc(t.x, t.y, this.r * (0.5 + i * 0.02), 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.translate(this.x, screenY);

        // 无敌闪烁效果
        if (this.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
            ctx.globalAlpha = 0.5;
        }

        // 磁铁效果光环
        if (this.magnetTime > 0) {
            ctx.strokeStyle = 'rgba(255,215,0,0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, this.r + 8, 0, Math.PI*2);
            ctx.stroke();
        }

        // 根据角色类型绘制不同颜色的蛋仔
        let bodyColor1, bodyColor2;
        switch(config.character) {
            case 'yellow':
                bodyColor1 = '#FFD700'; bodyColor2 = '#FFA500';
                break;
            case 'pink':
                bodyColor1 = '#FFB6C1'; bodyColor2 = '#FF69B4';
                break;
            case 'blue':
                bodyColor1 = '#87CEEB'; bodyColor2 = '#4169E1';
                break;
            case 'black':
                bodyColor1 = '#696969'; bodyColor2 = '#2F4F4F';
                break;
            default:
                bodyColor1 = '#FFD700'; bodyColor2 = '#FFA500';
        }

        // 身体（蛋仔风格 - 更圆润）
        const g = ctx.createRadialGradient(-5, -8, 0, 0, 0, this.r);
        g.addColorStop(0, bodyColor1);
        g.addColorStop(1, bodyColor2);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(0, 2, this.r, 0, Math.PI*2);
        ctx.fill();

        // 高光（让球体更有光泽）
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.ellipse(-8, -8, 8, 5, -0.5, 0, Math.PI*2);
        ctx.fill();

        // 眼睛（蛋仔风格 - 更大更可爱）
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.ellipse(-7, -2, 7, 8, 0, 0, Math.PI*2);
        ctx.ellipse(7, -2, 7, 8, 0, 0, Math.PI*2);
        ctx.fill();

        // 瞳孔
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(-7, -2, 4, 0, Math.PI*2);
        ctx.arc(7, -2, 4, 0, Math.PI*2);
        ctx.fill();

        // 高光
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(-5, -4, 2, 0, Math.PI*2);
        ctx.arc(9, -4, 2, 0, Math.PI*2);
        ctx.fill();

        // 腮红
        ctx.fillStyle = 'rgba(255,182,193,0.6)';
        ctx.beginPath();
        ctx.arc(-12, 5, 4, 0, Math.PI*2);
        ctx.arc(12, 5, 4, 0, Math.PI*2);
        ctx.fill();

        // 微笑
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 6, 4, 0.2, Math.PI - 0.2);
        ctx.stroke();

        ctx.restore();
    }
}

class Platform {
    constructor(x, y, w, type = 'static') {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = 15;
        this.type = type; // static, moving
        this.moveSpeed = type === 'moving' ? 2 : 0;
        this.moveRange = 80;
        this.startX = x;
        this.dir = 1;
    }

    update() {
        if (this.type === 'moving') {
            this.x += this.moveSpeed * this.dir;
            if (this.x > this.startX + this.moveRange || this.x < this.startX - this.moveRange) {
                this.dir *= -1;
            }
        }
    }

    draw() {
        const screenY = this.y - camera;
        if (screenY < -50 || screenY > cvs.height + 50) return;

        // 马里奥风格的云朵平台 - 更圆润可爱
        ctx.fillStyle = 'white';
        ctx.strokeStyle = '#E0E0E0';
        ctx.lineWidth = 2;

        const w = this.w;
        const h = 25;
        const x = this.x;

        // 绘制云朵的多个圆弧组成
        ctx.beginPath();
        // 左边圆弧
        ctx.arc(x + 20, screenY + 15, 15, Math.PI * 0.8, Math.PI * 1.5);
        // 中间大圆弧
        ctx.arc(x + w/2, screenY + 10, 20, Math.PI * 0.9, Math.PI * 2.1);
        // 右边圆弧
        ctx.arc(x + w - 20, screenY + 15, 15, Math.PI * 1.5, Math.PI * 2.2);
        // 底部连接
        ctx.lineTo(x + w - 20, screenY + 25);
        ctx.arc(x + w - 20, screenY + 20, 5, 0, Math.PI);
        ctx.lineTo(x + 20, screenY + 25);
        ctx.arc(x + 20, screenY + 20, 5, 0, Math.PI);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // 云朵内部阴影效果
        ctx.fillStyle = '#F5F5F5';
        ctx.beginPath();
        ctx.ellipse(x + w/2, screenY + 18, w/2 - 15, 6, 0, 0, Math.PI*2);
        ctx.fill();

        // 移动平台的彩虹装饰
        if (this.type === 'moving') {
            const colors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF', '#9B59B6'];
            colors.forEach((color, i) => {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x + 25 + i * (w - 50)/4, screenY + 12, 5, 0, Math.PI*2);
                ctx.fill();
            });

            // 移动箭头提示
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(this.dir > 0 ? '▶' : '◀', x + w/2, screenY - 5);
        }
    }
}

class GiftBox {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 35;
        this.h = 35;
        this.hit = false;
        this.type = this.randomType();
        this.bounce = 0;
    }

    randomType() {
        const rand = Math.random();
        if (rand < 0.12) return 'SUNFLOWER';
        if (rand < 0.20) return 'MUSHROOM';
        if (rand < 0.28) return 'STAR';
        if (rand < 0.40) return 'COIN';
        if (rand < 0.50) return 'DIAMOND';
        if (rand < 0.58) return 'HAMBURGER';
        if (rand < 0.65) return 'ICE_CREAM';
        if (rand < 0.72) return 'ROCKET';
        if (rand < 0.80) return 'MAGNET';
        return 'MATH';
    }

    update() {
        this.bounce += 0.1;
    }

    draw() {
        const screenY = this.y - camera;
        if (screenY < -50 || screenY > cvs.height + 50) return;

        const bounceY = Math.sin(this.bounce) * 3;
        const cx = this.x + this.w/2;
        const cy = screenY + bounceY + this.h/2;

        if (!this.hit) {
            // 绘制礼物盒 - 圆形带丝带效果
            ctx.fillStyle = '#F59E0B';
            ctx.beginPath();
            ctx.arc(cx, cy, 20, 0, Math.PI*2);
            ctx.fill();

            // 丝带
            ctx.fillStyle = '#DC2626';
            ctx.fillRect(cx - 20, cy - 4, 40, 8);
            ctx.fillRect(cx - 4, cy - 20, 8, 40);

            // 蝴蝶结
            ctx.fillStyle = '#DC2626';
            ctx.beginPath();
            ctx.arc(cx, cy - 15, 8, 0, Math.PI*2);
            ctx.fill();
        } else {
            // 已开启 - 半透明圆形
            ctx.fillStyle = 'rgba(156, 163, 175, 0.5)';
            ctx.beginPath();
            ctx.arc(cx, cy, 20, 0, Math.PI*2);
            ctx.fill();

            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✓', cx, cy);
        }
    }
}

class Item {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.vy = -3;
        this.life = 60;
    }

    update() {
        this.y += this.vy;
        this.vy += 0.1;
        this.life--;
    }

    draw() {
        const screenY = this.y - camera;
        if (screenY < -50 || screenY > cvs.height + 50) return;

        ctx.globalAlpha = this.life / 60;
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(ITEM_TYPES[this.type].emoji, this.x, screenY);
        ctx.globalAlpha = 1;
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 30;
        this.color = color;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2;
        this.life--;
    }

    draw() {
        const screenY = this.y - camera;
        ctx.globalAlpha = this.life / 30;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, screenY, 6, 6);
        ctx.globalAlpha = 1;
    }
}

// ==================== 游戏逻辑 ====================
function init() {
    player = new Player();
    platforms = [];
    gifts = [];
    items = [];
    particles = [];
    camera = 0;
    score = 0;

    // 初始平台
    platforms.push(new Platform(cvs.width/2 - 60, cvs.height - 50, 120, 'static'));

    // 生成关卡
    generateLevel();

    updateUI();
}

function generateLevel() {
    let y = cvs.height - 150;
    while (y > -5000) {
        const x = Math.random() * (cvs.width - 120) + 20;
        const w = Math.random() * 40 + 100; // 平台加长到100-140
        const type = Math.random() < 0.25 ? 'moving' : 'static';

        platforms.push(new Platform(x, y, w, type));

        // 70%概率生成礼物盒
        if (Math.random() < 0.6) {
            gifts.push(new GiftBox(x + w/2 - 17, y - 45));
        }

        y -= Math.random() * 50 + 90; // 平台间距
    }
}

function update() {
    if (state !== 'play') return;

    player.update();

    // 相机跟随（向上）
    const targetCam = player.y - cvs.height * 0.6;
    if (targetCam < camera) {
        camera = targetCam;
    }

    // 平台碰撞
    player.grounded = false;
    for (let p of platforms) {
        p.update();
        // 严格碰撞条件：只有站在平台表面才算
        if (player.vy >= -1 && // 下落或轻微上升时
            player.x > p.x - player.r &&
            player.x < p.x + p.w + player.r &&
            player.y + player.r >= p.y - 5 && // 平台表面上方5像素内
            player.y + player.r <= p.y + 5) { // 平台表面下方5像素内（防止穿透）
            player.y = p.y - player.r; // 精确站在平台上
            player.vy = 0;
            player.grounded = true;
        }
    }

    // 礼物盒碰撞（从下方顶上去）- 圆形碰撞检测
    for (let g of gifts) {
        g.update();
        const gcx = g.x + g.w/2;
        const gcy = g.y + g.h/2;
        const dist = Math.sqrt((player.x - gcx)**2 + (player.y - player.r - gcy)**2);
        if (!g.hit &&
            player.vy < 0 &&
            dist < 35) {
            hitGift(g);
        }
    }

    // 道具收集
    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        item.update();

        const dx = player.x - item.x;
        const dy = (player.y - camera) - (item.y - camera);
        if (Math.sqrt(dx*dx + dy*dy) < player.r + 15) {
            collectItem(item.type);
            items.splice(i, 1);
            continue;
        }

        if (item.life <= 0) items.splice(i, 1);
    }

    // 粒子更新
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    // 动态生成新平台
    const topPlatform = platforms[platforms.length - 1];
    if (topPlatform && topPlatform.y - camera > -200) {
        generateMorePlatforms(topPlatform.y - 150);
    }

    // 清理远处的平台
    platforms = platforms.filter(p => p.y - camera < cvs.height + 200);
    gifts = gifts.filter(g => g.y - camera < cvs.height + 200);
}

function generateMorePlatforms(startY) {
    let y = startY;
    for (let i = 0; i < 10; i++) {
        const x = Math.random() * (cvs.width - 80) + 40;
        const w = Math.random() * 40 + 60;
        const type = Math.random() < 0.35 ? 'moving' : 'static';
        platforms.push(new Platform(x, y, w, type));

        if (Math.random() < 0.7) {
            gifts.push(new GiftBox(x + w/2 - 17, y - 45));
        }

        y -= Math.random() * 60 + 80;
    }
}

function hitGift(gift) {
    gift.hit = true;
    player.vy = 3; // 稍微反弹
    AudioSys.playCoin(); // 开启盒子音效

    // 屏幕轻微震动
    Effects.addShake(5);

    // 产生粒子
    for (let i = 0; i < 8; i++) {
        particles.push(new Particle(gift.x + 17, gift.y + 17, '#FFD700'));
    }

    const type = gift.type;

    if (type === 'MATH') {
        showMathQuestion();
    } else {
        // 产生道具
        items.push(new Item(gift.x + 17, gift.y, type));
        showHint(ITEM_TYPES[type].emoji + ' ' + (ITEM_TYPES[type].score > 0 ? '+' + ITEM_TYPES[type].score : ''));
    }
}

function collectItem(type) {
    const item = ITEM_TYPES[type];

    if (item.effect === 'score') {
        score += item.score;
        showHint(item.emoji + ' +' + item.score);
        AudioSys.playCoin();
        Effects.addFloatingText('+' + item.score, player.x, player.y - 50);
        updateUI();
    } else if (item.effect === 'grow') {
        player.growTime = 300; // 5秒变大
        showHint('🍄 蘑菇！变大了！');
        AudioSys.playTransform();
        Effects.addShake(8);
        Effects.addFlash('#FF69B4', 10);
    } else if (item.effect === 'invincible') {
        player.invincible = 300; // 5秒无敌
        showHint('⭐ 星星！无敌状态！');
        AudioSys.playPowerUp();
        Effects.addShake(5);
        Effects.addFlash('#FFD700', 15);
    } else if (item.effect === 'heal') {
        // 汉堡回血 - 给额外生命保护
        player.invincible = 180; // 3秒保护
        showHint('🍔 汉堡！恢复体力！');
        AudioSys.playPowerUp();
        Effects.addFloatingText('♥', player.x, player.y - 60, '#FF6B6B');
    } else if (item.effect === 'slow') {
        // 冰淇淋减速所有物品下落
        items.forEach(i => i.vy *= 0.5);
        showHint('🍦 冰淇淋！减速中...');
        AudioSys.playCoin();
        Effects.addFlash('#87CEEB', 10);
    } else if (item.effect === 'boost') {
        // 火箭冲刺向上
        player.vy = -20;
        showHint('🚀 火箭！冲刺！');
        AudioSys.playRocket();
        Effects.addShake(10);
        Effects.addFlash('#FF4500', 20);
        // 火箭尾焰粒子
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle(player.x, player.y + 30, '#FF4500'));
        }
    } else if (item.effect === 'magnet') {
        // 磁铁效果 - 自动吸引附近金币
        player.magnetTime = 300; // 5秒磁铁
        showHint('🧲 磁铁！吸引金币！');
        AudioSys.playPowerUp();
        Effects.addFlash('#DAA520', 10);
    }
}

// ==================== 数学题 ====================
let currentMath = null;

function showMathQuestion() {
    state = 'math';

    const a = Math.floor(Math.random() * 10) + 1;
    const b = Math.floor(Math.random() * 10) + 1;
    const ans = a + b;
    currentMath = ans;

    document.getElementById('mathQ').textContent = `${a} + ${b} = ?`;

    // 生成选项
    const btns = document.getElementById('mathBtns');
    btns.innerHTML = '';

    let options = [ans];
    while (options.length < 3) {
        const wrong = ans + Math.floor(Math.random() * 10) - 5;
        if (wrong > 0 && wrong !== ans && !options.includes(wrong)) {
            options.push(wrong);
        }
    }
    options.sort(() => Math.random() - 0.5);

    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'math-ans';
        btn.textContent = opt;
        btn.onclick = () => answerMath(opt);
        btns.appendChild(btn);
    });

    document.getElementById('mathPanel').style.display = 'block';
}

function answerMath(ans) {
    document.getElementById('mathPanel').style.display = 'none';
    state = 'play';

    if (ans === currentMath) {
        score += 100;
        showHint('✅ 正确！+100');
    } else {
        showHint('❌ 错误！');
    }
    updateUI();
}

function showHint(text) {
    const h = document.getElementById('hint');
    h.textContent = text;
    h.style.display = 'block';
    setTimeout(() => h.style.display = 'none', 1500);
}

// ==================== 绘制 ====================
function draw() {
    // 清空画布
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    // 绘制云朵背景
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    const cloudOffset = camera * 0.15;
    for (let [x, y, r] of [[50,100,25], [150,80,30], [250,120,20], [350,90,28]]) {
        ctx.beginPath();
        ctx.arc(x, y - cloudOffset % 1000, r, 0, Math.PI*2);
        ctx.fill();
    }

    // 绘制游戏对象
    for (let p of platforms) p.draw();
    for (let g of gifts) g.draw();
    for (let i of items) i.draw();
    for (let p of particles) p.draw();
    if (player) player.draw();

    // 绘制高度
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    const height = Math.max(0, Math.floor((cvs.height - 50 - player.y) / 10));
    ctx.fillText('⬆️ ' + height + 'm', cvs.width/2, 80);
}

function loop() {
    if (state === 'play' && !platformerMode) {
        update();
        Effects.update();
        ctx.save();
        Effects.apply(ctx);
        draw();
        Effects.draw(ctx);
        ctx.restore();
    }
    requestAnimationFrame(loop);
}

// ==================== 消消乐模式 ====================
let elimMode = false;
let elimTarget = 10;
let elimScore = 0;
let elimItems = []; // 掉落的物品
let elimSelected = []; // 已选中的数字
let elimTimer = 0;
let elimSpeed = 1.5; // 下落速度
let elimSpawnTimer = 0;
let elimHighScore = localStorage.getItem('elimHigh') || 0;

// 特殊物品配置
const SPECIAL_ITEMS = {
    MINE: { emoji: '💣', type: 'mine', score: -50 },
    BURGER: { emoji: '🍔', type: 'food', score: 30 },
    CLOUD: { emoji: '☁️', type: 'slow', score: 0 },
    FREEZE: { emoji: '❄️', type: 'freeze', score: 0 },
    LIGHTNING: { emoji: '⚡', type: 'speed', score: 0 } // 闪电加速
};

function startElimination() {
    AudioSys.init();
    AudioSys.playClick();
    setTimeout(() => AudioSys.startBGM(), 500);
    elimMode = true;
    state = 'play';
    elimTarget = Math.floor(Math.random() * 6) + 5; // 5-10
    elimScore = 0;
    elimItems = [];
    elimSelected = [];
    elimTimer = 0;
    elimSpeed = 1.5;
    elimSpawnTimer = 0;

    document.getElementById('start').style.display = 'none';
    document.getElementById('elimTarget').style.display = 'block';
    document.getElementById('targetNum').textContent = elimTarget;
    document.getElementById('ui').style.display = 'flex';
    document.getElementById('touch').style.display = 'none';

    elimLoop();
}

function elimLoop() {
    if (state !== 'play' || !elimMode) return;

    elimUpdate();
    elimDraw();

    requestAnimationFrame(elimLoop);
}

function elimUpdate() {
    elimTimer++;

    // 生成新物品
    elimSpawnTimer++;
    if (elimSpawnTimer > 90) { // 每1.5秒生成一波
        elimSpawnItems();
        elimSpawnTimer = 0;
        // 逐渐加速
        if (elimSpeed < 4) elimSpeed += 0.05;
    }

    // 更新物品位置
    for (let i = elimItems.length - 1; i >= 0; i--) {
        let item = elimItems[i];

        // 云朵有浮动效果
        if (item.special === 'CLOUD') {
            item.y += elimSpeed * 0.5;
            item.x += Math.sin(elimTimer / 30) * 0.5;
        } else if (item.frozen) {
            item.y += elimSpeed * 0.3; // 冰冻减速
        } else {
            item.y += elimSpeed;
        }

        // 移除超出屏幕的物品
        if (item.y > cvs.height + 50) {
            elimItems.splice(i, 1);
            continue;
        }

        // 冰冻倒计时
        if (item.freezeTime) {
            item.freezeTime--;
            if (item.freezeTime <= 0) item.frozen = false;
        }
    }

    // 清理已消除的物品
    elimItems = elimItems.filter(item => !item.cleared);
}

function elimSpawnItems() {
    const cols = 4;
    const colWidth = cvs.width / cols;

    for (let i = 0; i < cols; i++) {
        // 80%概率生成数字，20%概率生成特殊物品
        const rand = Math.random();

        if (rand < 0.15) {
            // 地雷
            elimItems.push(createSpecialItem(i * colWidth + colWidth/2, 'MINE'));
        } else if (rand < 0.25) {
            // 汉堡
            elimItems.push(createSpecialItem(i * colWidth + colWidth/2, 'BURGER'));
        } else if (rand < 0.32) {
            // 云朵
            elimItems.push(createSpecialItem(i * colWidth + colWidth/2, 'CLOUD'));
        } else if (rand < 0.42) {
            // 冰冻
            elimItems.push(createSpecialItem(i * colWidth + colWidth/2, 'FREEZE'));
        } else if (rand < 0.46) {
            // 闪电加速
            elimItems.push(createSpecialItem(i * colWidth + colWidth/2, 'LIGHTNING'));
        } else {
            // 数字 0-10
            const num = Math.floor(Math.random() * 11);
            elimItems.push({
                x: i * colWidth + colWidth/2,
                y: -50 - Math.random() * 50,
                value: num,
                type: 'number',
                selected: false,
                cleared: false
            });
        }
    }
}

function createSpecialItem(x, type) {
    return {
        x: x,
        y: -50 - Math.random() * 50,
        special: type,
        emoji: SPECIAL_ITEMS[type].emoji,
        type: 'special',
        cleared: false
    };
}

function elimDraw() {
    // 背景
    ctx.fillStyle = '#E8F4FF';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    // 绘制网格线
    ctx.strokeStyle = 'rgba(0,0,0,0.05)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cvs.width/4, 0);
        ctx.lineTo(i * cvs.width/4, cvs.height);
        ctx.stroke();
    }

    // 绘制物品
    for (let item of elimItems) {
        if (item.cleared) continue;

        if (item.type === 'number') {
            // 数字气泡
            ctx.fillStyle = item.selected ? '#4ade80' : '#F472B6';
            ctx.beginPath();
            ctx.arc(item.x, item.y, 30, 0, Math.PI*2);
            ctx.fill();

            // 选中边框
            if (item.selected) {
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // 数字
            ctx.fillStyle = 'white';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.value, item.x, item.y);
        } else {
            // 特殊物品
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 冰冻效果
            if (item.frozen) {
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#87CEEB';
                ctx.beginPath();
                ctx.arc(item.x, item.y, 35, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.fillText(item.emoji, item.x, item.y);
            ctx.globalAlpha = 1;
        }
    }

    // 绘制已选中的数字提示
    if (elimSelected.length > 0) {
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        let sum = elimSelected.reduce((a, b) => a + b.value, 0);
        let text = elimSelected.map(s => s.value).join(' + ');
        if (elimSelected.length === 1) text += ' + ?';
        ctx.fillText(text + ' = ' + sum, cvs.width/2, 130);
    }

    // 绘制分数
    ctx.fillStyle = '#333';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('💎 ' + elimScore, 15, 35);
    ctx.textAlign = 'right';
    ctx.fillText('🏆 ' + elimHighScore, cvs.width - 15, 35);
}

// 消消乐点击处理
cvs.addEventListener('click', handleElimClick);
cvs.addEventListener('touchstart', handleElimTouch, { passive: false });

function handleElimTouch(e) {
    if (!elimMode || state !== 'play') return;
    e.preventDefault();

    const touch = e.touches[0];
    const rect = cvs.getBoundingClientRect();
    const x = (touch.clientX - rect.left) * (cvs.width / rect.width);
    const y = (touch.clientY - rect.top) * (cvs.height / rect.height);

    processElimClick(x, y);
}

function handleElimClick(e) {
    if (!elimMode || state !== 'play') return;

    const rect = cvs.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (cvs.width / rect.width);
    const y = (e.clientY - rect.top) * (cvs.height / rect.height);

    processElimClick(x, y);
}

function processElimClick(x, y) {
    for (let item of elimItems) {
        if (item.cleared) continue;

        const dist = Math.sqrt((x - item.x)**2 + (y - item.y)**2);
        if (dist < 35) {
            if (item.type === 'special') {
                // 处理特殊物品
                handleSpecialItem(item);
            } else {
                // 处理数字
                handleNumberClick(item);
            }
            return;
        }
    }
}

function handleSpecialItem(item) {
    const special = SPECIAL_ITEMS[item.special];

    if (item.special === 'MINE') {
        // 地雷扣分
        elimScore += special.score;
        showHint('💣 砰！ -50');
        elimEndGame();
    } else if (item.special === 'BURGER') {
        // 汉堡加分
        elimScore += special.score;
        showHint('🍔 美味！ +' + special.score);
    } else if (item.special === 'CLOUD') {
        // 云朵减速所有物品
        elimItems.forEach(i => i.y -= 100);
        showHint('☁️ 减速！');
    } else if (item.special === 'FREEZE') {
        // 冰冻所有物品5秒
        elimItems.forEach(i => {
            i.frozen = true;
            i.freezeTime = 300; // 5秒
        });
        showHint('❄️ 冰冻！');
    } else if (item.special === 'LIGHTNING') {
        // 闪电加速 - 临时提升全局速度
        elimSpeed = Math.min(elimSpeed + 2, 6);
        showHint('⚡ 加速！');
        AudioSys.playRocket();
    }

    item.cleared = true;
}

function handleNumberClick(item) {
    // 如果已选中，取消选择
    if (item.selected) {
        item.selected = false;
        elimSelected = elimSelected.filter(s => s !== item);
        return;
    }

    // 最多选2个
    if (elimSelected.length >= 2) {
        elimSelected.forEach(s => s.selected = false);
        elimSelected = [];
    }

    // 选中当前
    item.selected = true;
    elimSelected.push(item);

    // 检查是否达到目标
    if (elimSelected.length === 2) {
        const sum = elimSelected[0].value + elimSelected[1].value;
        if (sum === elimTarget) {
            // 消除成功
            elimSelected.forEach(s => {
                s.cleared = true;
                s.selected = false;
            });
            elimSelected = [];
            elimScore += 100;
            showHint('✅ 消除！+100');

            // 更换目标数字
            setTimeout(() => {
                elimTarget = Math.floor(Math.random() * 6) + 5;
                document.getElementById('targetNum').textContent = elimTarget;
            }, 500);
        } else {
            // 错误
            showHint('❌ ' + sum + ' ≠ ' + elimTarget);
            setTimeout(() => {
                elimSelected.forEach(s => s.selected = false);
                elimSelected = [];
            }, 500);
        }
    }
}

function elimEndGame() {
    state = 'over';
    elimMode = false;

    if (elimScore > elimHighScore) {
        elimHighScore = elimScore;
        localStorage.setItem('elimHigh', elimHighScore);
        document.getElementById('endTitle').textContent = '🎉 新纪录!';
    } else {
        document.getElementById('endTitle').textContent = '游戏结束';
    }

    document.getElementById('finalScore').textContent = elimScore;
    document.getElementById('finalHigh').textContent = elimHighScore;
    document.getElementById('elimTarget').style.display = 'none';
    document.getElementById('over').style.display = 'flex';
}

// ==================== 横版闯关模式（马里奥风格）====================
let platformerMode = false;
let platPlayer;
let platCamera = 0;
let platLevelLength = 3000;
let platEnemies = [];
let platTraps = [];
let platCoins = [];
let platGoal = null;
let platPlatforms = [];
let platHighScore = localStorage.getItem('platHigh') || 0;

// 陷阱类型
const TRAP_TYPES = {
    FIRE: { emoji: '🔥', width: 40, height: 60 },
    GATE: { emoji: '🚪', width: 50, height: 80 }
};

// 敌人AI
class PlatEnemy {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 30;
        this.h = 30;
        this.speed = 1.5;
        this.dir = -1;
        this.patrolStart = x - 80;
        this.patrolEnd = x + 80;
    }

    update() {
        this.x += this.speed * this.dir;
        if (this.x <= this.patrolStart || this.x >= this.patrolEnd) {
            this.dir *= -1;
        }
    }

    draw() {
        const screenX = this.x - platCamera;
        if (screenX < -50 || screenX > cvs.width + 50) return;

        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.dir < 0 ? '👹' : '👺', screenX + this.w/2, this.y + this.h);
    }
}

// 陷阱（火焰/闸门）
class PlatTrap {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.timer = 0;
        this.active = true;
        this.cycle = type === 'FIRE' ? 180 : 300; // 火焰3秒循环，闸门5秒
        this.dangerTime = type === 'FIRE' ? 120 : 180; // 危险持续时间
    }

    update() {
        this.timer++;
        if (this.timer >= this.cycle) this.timer = 0;

        // 火焰：大部分时间危险，短暂安全
        // 闸门：大部分时间关闭（安全），短暂开启（危险，需要快速通过）
        if (this.type === 'FIRE') {
            this.active = this.timer < this.dangerTime;
        } else {
            this.active = this.timer >= this.cycle - this.dangerTime;
        }
    }

    draw() {
        const screenX = this.x - platCamera;
        if (screenX < -100 || screenX > cvs.width + 100) return;

        const trap = TRAP_TYPES[this.type];

        if (this.type === 'FIRE') {
            // 火焰效果
            if (this.active) {
                const flicker = Math.sin(Date.now() / 50) * 5;
                ctx.font = `${trap.height + flicker}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('🔥', screenX + trap.width/2, this.y + trap.height);

                // 危险提示
                ctx.fillStyle = 'rgba(255,0,0,0.3)';
                ctx.fillRect(screenX - 5, this.y, trap.width + 10, trap.height + 10);
            } else {
                // 安全状态
                ctx.font = '20px Arial';
                ctx.fillText('✓', screenX + trap.width/2, this.y + 30);
            }
        } else if (this.type === 'GATE') {
            // 闸门
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(screenX, this.y, trap.width, trap.height);

            if (this.active) {
                // 门开 - 红色警告
                ctx.fillStyle = 'rgba(255,0,0,0.5)';
                ctx.fillRect(screenX, this.y, trap.width, trap.height);
                ctx.fillStyle = 'white';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('快跑!', screenX + trap.width/2, this.y - 10);
            } else {
                // 门关 - 安全
                ctx.fillStyle = '#654321';
                ctx.fillRect(screenX + 5, this.y + 5, trap.width - 10, trap.height - 10);
                ctx.fillStyle = '#4ADE80';
                ctx.font = '12px Arial';
                ctx.fillText('安全', screenX + trap.width/2, this.y + trap.height/2);
            }
        }
    }
}

// 金币
class PlatCoin {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.collected = false;
        this.bounce = Math.random() * Math.PI * 2;
    }

    update() {
        this.bounce += 0.1;
    }

    draw() {
        if (this.collected) return;
        const screenX = this.x - platCamera;
        if (screenX < -30 || screenX > cvs.width + 30) return;

        const bounceY = Math.sin(this.bounce) * 3;
        ctx.font = '25px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🪙', screenX, this.y + bounceY);
    }
}

// 横版玩家
class PlatPlayer {
    constructor() {
        this.x = 50;
        this.y = cvs.height - 150;
        this.vx = 0;
        this.vy = 0;
        this.w = 25;
        this.h = 25;
        this.grounded = false;
        this.dead = false;
    }

    update() {
        if (this.dead) return;

        // 移动 - 降低速度到3
        if (keys['ArrowLeft']) this.vx = -3;
        else if (keys['ArrowRight']) this.vx = 3;
        else this.vx *= 0.8;

        // 重力
        this.vy += 0.6;

        this.x += this.vx;
        this.y += this.vy;

        // 边界
        if (this.x < 0) { this.x = 0; this.vx = 0; }
        if (this.x > platLevelLength) { this.x = platLevelLength; this.vx = 0; }
        if (this.y > cvs.height) platGameOver();

        // 平台碰撞
        this.grounded = false;
        for (let p of platPlatforms) {
            if (this.vy > 0 &&
                this.x + this.w > p.x &&
                this.x < p.x + p.w &&
                this.y + this.h > p.y &&
                this.y + this.h < p.y + 25) {
                this.y = p.y - this.h;
                this.vy = 0;
                this.grounded = true;
            }
        }
    }

    jump() {
        if (this.grounded && !this.dead) {
            this.vy = -11;
            this.grounded = false;
        }
    }

    draw() {
        if (this.dead) return;
        const screenX = this.x - platCamera;
        if (screenX < -50 || screenX > cvs.width + 50) return;

        // 绘制角色
        ctx.save();
        ctx.translate(screenX + this.w/2, this.y + this.h/2);

        // 根据角色类型绘制不同颜色
        let bodyColor1, bodyColor2;
        switch(config.character) {
            case 'yellow':
                bodyColor1 = '#FFD700'; bodyColor2 = '#FFA500';
                break;
            case 'pink':
                bodyColor1 = '#FFB6C1'; bodyColor2 = '#FF69B4';
                break;
            case 'blue':
                bodyColor1 = '#87CEEB'; bodyColor2 = '#4169E1';
                break;
            case 'black':
                bodyColor1 = '#696969'; bodyColor2 = '#2F4F4F';
                break;
            default:
                bodyColor1 = '#FFD700'; bodyColor2 = '#FFA500';
        }

        // 身体
        const g = ctx.createRadialGradient(-5, -5, 0, 0, 0, this.w);
        g.addColorStop(0, bodyColor1);
        g.addColorStop(1, bodyColor2);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(0, 0, this.w, 0, Math.PI*2);
        ctx.fill();

        // 装饰
        ctx.fillStyle = '#8B5CF6';
        if (config.hair === 'horns') {
            ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(-15, -28); ctx.lineTo(-5, -18); ctx.fill();
            ctx.beginPath(); ctx.moveTo(10, -15); ctx.lineTo(15, -28); ctx.lineTo(5, -18); ctx.fill();
        } else if (config.hair === 'bow') {
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath(); ctx.arc(-8, -20, 6, 0, Math.PI*2); ctx.arc(8, -20, 6, 0, Math.PI*2); ctx.fill();
        } else if (config.hair === 'crown') {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(-12, -15); ctx.lineTo(-8, -25); ctx.lineTo(0, -18);
            ctx.lineTo(8, -25); ctx.lineTo(12, -15);
            ctx.fill();
        }

        // 眼睛
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(-7, -2, 5, 0, Math.PI*2); ctx.arc(7, -2, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(-7, -2, 2.5, 0, Math.PI*2); ctx.arc(7, -2, 2.5, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }
}

function startPlatformer() {
    AudioSys.init();
    AudioSys.playClick();
    setTimeout(() => AudioSys.startBGM(), 500);
    platformerMode = true;
    state = 'play';
    score = 0;
    platCamera = 0;

    document.getElementById('start').style.display = 'none';
    document.getElementById('ui').style.display = 'flex';
    document.getElementById('touch').style.display = 'flex';

    platInitLevel();
    platLoop();
}

function platInitLevel() {
    platPlayer = new PlatPlayer();
    platEnemies = [];
    platTraps = [];
    platCoins = [];
    platPlatforms = [];

    // 生成地面平台
    let x = 0;
    while (x < platLevelLength) {
        const w = Math.random() * 60 + 80;
        const gap = x === 0 ? 0 : Math.random() * 40 + 30; // 第一块没有空隙
        x += gap;

        const y = cvs.height - 50 - Math.random() * 100;
        platPlatforms.push({ x, y, w, h: 20 });

        // 随机生成内容
        if (x > 200 && Math.random() < 0.4) {
            // 敌人
            platEnemies.push(new PlatEnemy(x + w/2, y - 30));
        }
        if (x > 300 && Math.random() < 0.3) {
            // 陷阱 - 火焰或闸门
            const type = Math.random() < 0.5 ? 'FIRE' : 'GATE';
            platTraps.push(new PlatTrap(x + w/2, y - TRAP_TYPES[type].height, type));
        }
        if (Math.random() < 0.5) {
            // 金币
            platCoins.push(new PlatCoin(x + w/2, y - 50));
        }

        x += w;
    }

    // 终点旗帜
    platGoal = { x: platLevelLength + 50, y: cvs.height - 150 };
}

function platUpdate() {
    if (state !== 'play' || !platformerMode) return;

    platPlayer.update();

    // 相机跟随
    platCamera = platPlayer.x - cvs.width * 0.3;
    if (platCamera < 0) platCamera = 0;
    if (platCamera > platLevelLength - cvs.width) platCamera = platLevelLength - cvs.width;

    // 更新敌人
    for (let e of platEnemies) {
        e.update();
        // 碰撞检测
        if (!platPlayer.dead &&
            platPlayer.x < e.x + e.w &&
            platPlayer.x + platPlayer.w > e.x &&
            platPlayer.y < e.y + e.h &&
            platPlayer.y + platPlayer.h > e.y) {
            platGameOver();
        }
    }

    // 更新陷阱
    for (let t of platTraps) {
        t.update();
        // 碰撞检测
        if (!platPlayer.dead && t.active &&
            platPlayer.x < t.x + TRAP_TYPES[t.type].width &&
            platPlayer.x + platPlayer.w > t.x &&
            platPlayer.y < t.y + TRAP_TYPES[t.type].height &&
            platPlayer.y + platPlayer.h > t.y) {
            platGameOver();
        }
    }

    // 更新金币
    for (let c of platCoins) {
        c.update();
        if (!c.collected &&
            platPlayer.x < c.x + 15 &&
            platPlayer.x + platPlayer.w > c.x - 15 &&
            platPlayer.y < c.y + 15 &&
            platPlayer.y + platPlayer.h > c.y - 15) {
            c.collected = true;
            score += 50;
            updateUI();
        }
    }

    // 检查到达终点
    if (platPlayer.x >= platGoal.x) {
        platWin();
    }
}

function platDraw() {
    // 背景
    const gradient = ctx.createLinearGradient(0, 0, 0, cvs.height);
    gradient.addColorStop(0, '#4A90E2');
    gradient.addColorStop(1, '#87CEEB');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    // 远景云朵
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 5; i++) {
        const cx = (i * 200 - platCamera * 0.3) % (cvs.width + 200);
        ctx.beginPath();
        ctx.arc(cx, 100 + i * 30, 40 + i * 10, 0, Math.PI*2);
        ctx.fill();
    }

    // 平台
    for (let p of platPlatforms) {
        const screenX = p.x - platCamera;
        if (screenX < -100 || screenX > cvs.width + 100) continue;

        // 草地平台
        ctx.fillStyle = '#4ADE80';
        ctx.fillRect(screenX, p.y, p.w, p.h);
        ctx.fillStyle = '#22C55E';
        ctx.fillRect(screenX, p.y + p.h - 5, p.w, 5);
    }

    // 终点旗帜
    const goalScreenX = platGoal.x - platCamera;
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(goalScreenX, platGoal.y, 5, 60);
    ctx.fillStyle = '#FF6B6B';
    ctx.beginPath();
    ctx.moveTo(goalScreenX + 5, platGoal.y);
    ctx.lineTo(goalScreenX + 35, platGoal.y + 15);
    ctx.lineTo(goalScreenX + 5, platGoal.y + 30);
    ctx.fill();

    // 游戏对象
    for (let c of platCoins) c.draw();
    for (let t of platTraps) t.draw();
    for (let e of platEnemies) e.draw();
    platPlayer.draw();

    // 进度提示
    const progress = Math.floor((platPlayer.x / platLevelLength) * 100);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`进度: ${progress}%`, cvs.width/2, 80);
}

function platLoop() {
    if (state !== 'play' || !platformerMode) return;
    platUpdate();
    platDraw();
    requestAnimationFrame(platLoop);
}

function platGameOver() {
    platPlayer.dead = true;
    state = 'over';
    platformerMode = false;

    document.getElementById('endTitle').textContent = '💀 游戏结束';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalHigh').textContent = platHighScore;
    document.getElementById('over').style.display = 'flex';
}

function platWin() {
    state = 'over';
    platformerMode = false;

    if (score > platHighScore) {
        platHighScore = score;
        localStorage.setItem('platHigh', platHighScore);
        document.getElementById('endTitle').textContent = '🎉 通关新纪录!';
    } else {
        document.getElementById('endTitle').textContent = '🏆 通关成功!';
    }

    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalHigh').textContent = platHighScore;
    document.getElementById('over').style.display = 'flex';
}

// 初始化显示
updateUI();
</script>
