// ==================== 优化后的游戏循环 ====================
function updatePlatformer(timestamp) {
    if (state !== 'play') return;

    if (!lastTime) lastTime = timestamp;
    const deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    const clampedDelta = Math.min(deltaTime, 50);

    frameCount++;

    player.update();

    const maxCam = level === 1 ? 14700 : (level === 2 ? 19700 : 24700);
    cam = Math.max(0, Math.min(player.x-200, maxCam));

    for (let c of coins) {
        if (!c.get && Math.hypot(player.x-c.x, player.y-c.y) < 30) {
            c.get = true; candies++; score += (ITEM_TYPES[c.type]?.score || 10);
            AudioSys.playCoin(); updateUI();
        }
    }

    for (let item of items) {
        if (!item.collected && Math.hypot(player.x-item.x, player.y-item.y) < 35) {
            item.collected = true;
            collectItem(item.type);
        }
    }

    for (let item of items) item.update();

    for (let e of enemies) {
        e.update();
        if (!e.dead && Math.hypot(player.x-e.x, player.y-e.y) < 30) {
            if (player.invincible > 0) {
                e.dead = true;
                score += 50;
                AudioSys.playCoin();
            } else if (player.isBig) {
                player.isBig = false;
                player.invincible = 120;
                AudioSys.playFail();
            } else {
                AudioSys.playFail();
                restart();
                return;
            }
        }
    }

    // 更新炮弹
    for (let b of bullets) b.update();
    // 移除死亡炮弹
    bullets = bullets.filter(b => !b.dead);

    for (let q of questions) {
        if (!q.done && Math.hypot(player.x-q.x, player.y-q.y) < 40) {
            // 30%概率直接出道具，70%概率出算术题
            if (Math.random() < 0.3 && !q.itemSpawned) {
                const item = new Item(q.x, q.y, q.itemType);
                item.vy = -8;
                item.vx = (Math.random() - 0.5) * 2;
                items.push(item);
                q.itemSpawned = true;
                q.done = true;

                // 更新解锁进度（只在全解锁模式下计数）
                if (requireAllBoxes) {
                    unlockedBoxes++;
                    updateProgressBar();
                }

                showHint(q.itemType === 'MUSHROOM' ? '🍄 蘑菇!' :
                         q.itemType === 'STAR' ? '⭐ 星星!' :
                         q.itemType === 'SUNFLOWER' ? '🌻 向日葵!' :
                         q.itemType === 'COIN' ? '🪙 金币!' : '💎 钻石!');
            } else {
                showQ(q);
            }
        }
    }

    // 特殊变身箱子碰撞检测
    if (specialTransformBox && !specialTransformBox.done) {
        if (Math.hypot(player.x - specialTransformBox.x, player.y - specialTransformBox.y) < 45) {
            specialTransformBox.done = true;
            player.isTransformed = true;
            player.transformTimer = 600; // 10秒 (60fps * 10)
            AudioSys.playTransform();
            showHint('⚡ 变身为炫蓝雷霆！');
        }
    }

    // 过关检查
    checkWinCondition();
}

function checkWinCondition() {
    const dx = Math.abs(player.x - flag.x);
    const dy = Math.abs(player.y - flag.y);

    // 使用原来的碰撞检测范围：x方向40，y方向60
    if (dx < 40 && dy < 60) {
        // 检查是否需要解锁所有箱子
        if (requireAllBoxes && unlockedBoxes < totalBoxes) {
            showHint(`❌ 还需要解锁 ${totalBoxes - unlockedBoxes} 个箱子!`);
            return;
        }

        if (level < 3) {
            level++; score += 100;
            AudioSys.playWin();
            initPlatformer();
        } else {
            state = 'over';
            AudioSys.playWin();
            showVictoryScreen();
        }
    }
}

function drawPlatformer() {
    ctx.fillStyle = '#87CEEB'; ctx.fillRect(0,0,cvs.width,cvs.height);

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const clouds = [[100,80,30],[300,120,40],[500,60,25],[700,100,35]];
    for (let i = 0; i < clouds.length; i++) {
        const [x, y, r] = clouds[i];
        ctx.beginPath();
        ctx.arc(x - (cam * 0.3) % (cvs.width + 200) + i*200, y, r, 0, Math.PI*2);
        ctx.fill();
    }

    // 地面
    const levelLength = level === 1 ? 15000 : (level === 2 ? 20000 : 25000);
    ctx.fillStyle = '#4ADE80'; ctx.fillRect(0-cam,450,levelLength,10);
    ctx.fillStyle = '#D97706'; ctx.fillRect(0-cam,460,levelLength,90);

    ctx.fillStyle = '#8B5CF6';
    for (let b of blocks.slice(1)) ctx.fillRect(b[0]-cam,b[1],b[2],b[3]);

    for (let item of items) item.draw();
    for (let c of coins) c.draw();
    for (let e of enemies) e.draw();
    for (let b of bullets) b.draw();
    for (let q of questions) q.draw();

    // 绘制特殊变身箱子
    if (specialTransformBox) specialTransformBox.draw();

    // 旗帜 - 如果强制解锁模式且箱子未全开，显示锁定
    const isLocked = requireAllBoxes && unlockedBoxes < totalBoxes;

    ctx.fillStyle = '#8B4513';
    ctx.fillRect(flag.x-cam, flag.y, 8, 100);

    if (isLocked) {
        // 锁定状态的旗帜
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.moveTo(flag.x-cam+8, flag.y);
        ctx.lineTo(flag.x-cam+50, flag.y+20);
        ctx.lineTo(flag.x-cam+8, flag.y+40);
        ctx.fill();

        // 锁定图标
        ctx.font = '30px Arial';
        ctx.fillText('🔒', flag.x-cam+25, flag.y+70);
    } else {
        // 正常旗帜
        ctx.fillStyle = '#FF6B6B';
        ctx.beginPath();
        ctx.moveTo(flag.x-cam+8, flag.y);
        ctx.lineTo(flag.x-cam+50, flag.y+20);
        ctx.lineTo(flag.x-cam+8, flag.y+40);
        ctx.fill();
    }

    player.draw();
}

// 提示系统
let hintTimer = null;
function showHint(text) {
    const existing = document.getElementById('hint');
    if (existing) existing.remove();

    const hint = document.createElement('div');
    hint.id = 'hint';
    hint.style.cssText = 'position:absolute;top:30%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:15px 30px;border-radius:25px;font-size:24px;z-index:150;animation:slideDown 0.3s;';
    hint.textContent = text;
    document.getElementById('game').appendChild(hint);

    if (hintTimer) clearTimeout(hintTimer);
    hintTimer = setTimeout(() => {
        if (hint.parentNode) hint.remove();
    }, 1500);
}

function showQ(block) {
    state = 'q';

    // 对于图形比较题，显示更丰富的界面
    if (block.q.type === 'compare' && block.q.compare) {
        const { count1, count2, shape1, shape2 } = block.q.compare;
        let displayText = '';
        for (let i = 0; i < count1; i++) displayText += shape1;
        displayText += ' ○ ';
        for (let i = 0; i < count2; i++) displayText += shape2;
        document.getElementById('qtext').innerHTML = `<div style="font-size:24px">${displayText}</div>`;
    } else {
        document.getElementById('qtext').textContent = block.q.text;
    }

    const btns = document.getElementById('btns'); btns.innerHTML = '';
    block.q.opts.forEach(opt => {
        const b = document.createElement('button'); b.className = 'ans'; b.textContent = opt;
        b.onclick = () => answer(block, opt);
        btns.appendChild(b);
    });
    document.getElementById('panel').style.display = 'block';
}

function answer(block, sel) {
    document.getElementById('panel').style.display = 'none';
    state = 'play';
    if (sel === block.q.ans) {
        block.done = true; score += 50; candies += 2;

        // 更新解锁进度
        if (requireAllBoxes) {
            unlockedBoxes++;
            updateProgressBar();
        }

        AudioSys.playCoin(); updateUI();
        if (!block.itemSpawned) {
            const item = new Item(block.x, block.y, block.itemType);
            item.vy = -8;
            item.vx = (Math.random() - 0.5) * 2;
            items.push(item);
            block.itemSpawned = true;
            showHint(block.itemType === 'MUSHROOM' ? '🍄 蘑菇!' :
                     block.itemType === 'STAR' ? '⭐ 星星!' :
                     block.itemType === 'SUNFLOWER' ? '🌻 向日葵!' :
                     block.itemType === 'COIN' ? '🪙 金币!' : '💎 钻石!');
        }
    } else {
        AudioSys.playFail();
        showHint('❌ 答错了!');
    }
}

function collectItem(type) {
    const item = ITEM_TYPES[type];
    if (item.effect === 'score') {
        score += item.score; AudioSys.playCoin();
    } else if (item.effect === 'grow') {
        player.isBig = true; AudioSys.playTransform();
    } else if (item.effect === 'invincible') {
        player.invincible = 300; AudioSys.playTransform();
    }
}

// ==================== 消消乐 ====================
function startElimination() {
    AudioSys.init(); AudioSys.playClick();
    if (elimAnimId) cancelAnimationFrame(elimAnimId);
    if (platformerAnimId) cancelAnimationFrame(platformerAnimId);
    gameMode = 'elimination';
    document.getElementById('start').style.display = 'none';
    document.getElementById('gameUI').style.display = 'none';
    document.getElementById('elimUI').style.display = 'inline';
    document.getElementById('elimTarget').style.display = 'block';
    document.getElementById('touch').classList.add('elim-mode');
    document.getElementById('progressBar').style.display = 'none';
    state = 'play'; elimScore = 0; elimItems = []; elimSelected = [];
    elimTimer = 0; elimSpeed = 1.5; elimSpawnTimer = 0;
    elimTarget = Math.floor(Math.random() * 6) + 5;
    document.getElementById('elimTargetNum').textContent = elimTarget;
    document.getElementById('targetNum').textContent = elimTarget;
    elimLoop();
}

function elimLoop() {
    if ((state !== 'play' && state !== 'q') || gameMode !== 'elimination') return;
    elimUpdate(); elimDraw();
    elimAnimId = requestAnimationFrame(elimLoop);
}

function elimUpdate() {
    elimTimer++;
    elimSpawnTimer++;
    if (elimSpawnTimer > 90) {
        elimSpawnItems(); elimSpawnTimer = 0;
        if (elimSpeed < 4) elimSpeed += 0.05;
    }
    for (let i = elimItems.length - 1; i >= 0; i--) {
        let item = elimItems[i];
        if (item.special === 'CLOUD') { item.y += elimSpeed * 0.5; item.x += Math.sin(elimTimer/30)*0.5; }
        else if (item.frozen) item.y += elimSpeed * 0.3;
        else item.y += elimSpeed;
        if (item.y > cvs.height + 50) elimItems.splice(i, 1);
        if (item.freezeTime) { item.freezeTime--; if (item.freezeTime <= 0) item.frozen = false; }
    }
    elimItems = elimItems.filter(item => !item.cleared);
}

function elimSpawnItems() {
    const cols = 4, colWidth = cvs.width / cols;
    for (let i = 0; i < cols; i++) {
        const rand = Math.random();
        if (rand < 0.15) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'MINE',emoji:'💣',type:'special',cleared:false});
        else if (rand < 0.25) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'CLOUD',emoji:'☁️',type:'special',cleared:false});
        else if (rand < 0.32) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'FREEZE',emoji:'❄️',type:'special',cleared:false});
        else if (rand < 0.38) elimItems.push({x:i*colWidth+colWidth/2,y:-50,special:'LIGHTNING',emoji:'⚡',type:'special',cleared:false});
        else {
            const num = Math.floor(Math.random() * 11);
            elimItems.push({x:i*colWidth+colWidth/2,y:-50,value:num,type:'number',selected:false,cleared:false});
        }
    }
}

function elimDraw() {
    ctx.fillStyle = '#E8F4FF'; ctx.fillRect(0,0,cvs.width,cvs.height);
    ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) { ctx.beginPath(); ctx.moveTo(i*cvs.width/4,0); ctx.lineTo(i*cvs.width/4,cvs.height); ctx.stroke(); }
    for (let item of elimItems) {
        if (item.cleared) continue;
        if (item.type === 'number') {
            ctx.fillStyle = item.selected ? '#4ade80' : '#F472B6';
            ctx.beginPath(); ctx.arc(item.x, item.y, 30, 0, Math.PI*2); ctx.fill();
            if (item.selected) { ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.stroke(); }
            ctx.fillStyle = 'white'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(item.value, item.x, item.y);
        } else {
            ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            if (item.frozen) { ctx.globalAlpha = 0.7; ctx.fillStyle = '#87CEEB'; ctx.beginPath(); ctx.arc(item.x, item.y, 35, 0, Math.PI*2); ctx.fill(); }
            ctx.fillText(item.emoji, item.x, item.y); ctx.globalAlpha = 1;
        }
    }
    if (elimSelected.length > 0) {
        ctx.fillStyle = '#4ade80'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
        let sum = elimSelected.reduce((a,b)=>a+b.value,0);
        let text = elimSelected.map(s=>s.value).join(' + ');
        if (elimSelected.length === 1) text += ' + ?';
        ctx.fillText(text + ' = ' + sum, cvs.width/2, 130);
    }
    ctx.fillStyle = '#333'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'left';
    ctx.fillText('💎 ' + elimScore, 15, 35);
    for (let i = elimEffects.length - 1; i >= 0; i--) {
        let eff = elimEffects[i];
        eff.life--;
        eff.y -= 1;
        eff.scale += 0.01;
        if (eff.life <= 0) { elimEffects.splice(i, 1); continue; }
        ctx.save();
        ctx.translate(eff.x, eff.y);
        ctx.scale(eff.scale, eff.scale);
        ctx.globalAlpha = eff.life / 60;
        ctx.fillStyle = eff.color || (eff.text.includes('PERFECT') ? '#FF69B4' : eff.text.includes('GREAT') ? '#FFD700' : '#4ade80');
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'white';
        ctx.shadowBlur = 10;
        ctx.fillText(eff.text, 0, 0);
        ctx.restore();
    }
}

function elimClick(x, y) {
    for (let item of elimItems) {
        if (item.cleared) continue;
        const dist = Math.sqrt((x-item.x)**2 + (y-item.y)**2);
        if (dist < 35) {
            if (item.type === 'special') elimHandleSpecial(item);
            else elimHandleNumber(item);
            return;
        }
    }
}

function elimHandleSpecial(item) {
    if (item.special === 'MINE') {
        elimScore -= 50;
        elimEffects.push({x: item.x, y: item.y, text: 'BOOM!', life: 40, scale: 1, color: '#FF0000'});
        elimEndGame();
    }
    else if (item.special === 'CLOUD') {
        elimItems.forEach(i=>i.y-=100);
        elimEffects.push({x: cvs.width/2, y: cvs.height/2, text: 'SLOW!', life: 50, scale: 1.2, color: '#87CEEB'});
        AudioSys.playCoin();
    }
    else if (item.special === 'FREEZE') {
        elimItems.forEach(i=>{i.frozen=true;i.freezeTime=300;});
        elimEffects.push({x: cvs.width/2, y: cvs.height/2, text: 'FREEZE!', life: 50, scale: 1.2, color: '#00CED1'});
        AudioSys.playTransform();
    }
    else if (item.special === 'LIGHTNING') {
        elimSpeed = Math.min(elimSpeed+2, 6);
        elimEffects.push({x: cvs.width/2, y: cvs.height/2, text: 'SPEED UP!', life: 50, scale: 1.2, color: '#FFD700'});
        AudioSys.playTransform();
    }
    item.cleared = true;
}

let elimEffects = [];

function elimHandleNumber(item) {
    if (item.selected) { item.selected = false; elimSelected = elimSelected.filter(s=>s!==item); }
    else if (elimSelected.length < 2) { item.selected = true; elimSelected.push(item); }
    if (elimSelected.length === 2) {
        const sum = elimSelected[0].value + elimSelected[1].value;
        if (sum === elimTarget) {
            const midX = (elimSelected[0].x + elimSelected[1].x) / 2;
            const midY = (elimSelected[0].y + elimSelected[1].y) / 2;
            elimSelected.forEach(s=>s.cleared=true);
            elimScore += sum * 10;
            const praises = ['GOOD!', 'GREAT!', 'PERFECT!', 'AWESOME!', 'EXCELLENT!'];
            const praise = praises[Math.floor(Math.random() * praises.length)];
            elimEffects.push({x: midX, y: midY, text: praise, life: 60, scale: 1});
            AudioSys.speakPraise(praise);
            if (Math.random() > 0.5) {
                elimEffects.push({x: midX, y: midY - 40, text: '+' + (sum * 10), life: 40, scale: 0.8, color: '#FFD700'});
            }
            elimTarget = Math.floor(Math.random()*6)+5;
            document.getElementById('elimTargetNum').textContent = elimTarget;
            document.getElementById('targetNum').textContent = elimTarget;
            AudioSys.playCoin();
        } else {
            const midX = (elimSelected[0].x + elimSelected[1].x) / 2;
            const midY = (elimSelected[0].y + elimSelected[1].y) / 2;
            elimEffects.push({x: midX, y: midY, text: 'TRY AGAIN!', life: 40, scale: 0.8, color: '#FF6B6B'});
            AudioSys.playFail();
        }
        elimSelected.forEach(s=>s.selected=false); elimSelected = [];
    }
}

function elimEndGame() {
    state = 'over'; gameMode = '';
    document.getElementById('endTitle').textContent = '💣 游戏结束';
    document.getElementById('final').textContent = elimScore;
    document.getElementById('over').style.display = 'flex';
    document.getElementById('elimTarget').style.display = 'none';
}

// ==================== 马戏团跳火圈游戏 ====================
class CircusPlayer {
    constructor(animal) {
        this.animal = animal;
        this.x = 150;
        this.y = 400;
        this.vy = 0;
        this.width = 60;
        this.height = 60;
        this.grounded = true;
        this.jumpPower = -18 * animal.jump;
        this.runSpeed = 5 * animal.speed;
        this.animationFrame = 0;
    }

    jump() {
        if (this.grounded) {
            this.vy = this.jumpPower;
            this.grounded = false;
            AudioSys.playJump();
        }
    }

    update() {
        this.animationFrame++;
        // 自动向前奔跑
        circusDistance += this.runSpeed * 0.1;

        // 重力
        this.vy += 0.8;
        this.y += this.vy;

        // 地面检测
        if (this.y > 400) {
            this.y = 400;
            this.vy = 0;
            this.grounded = true;
        }
    }

    draw(ctx) {
        ctx.save();

        // 奔跑动画 - 身体上下起伏
        const bounce = this.grounded ? Math.sin(this.animationFrame * 0.3) * 5 : 0;

        // 绘制动物
        ctx.translate(this.x, this.y + bounce);

        // 根据动物类型绘制不同外观
        this.drawAnimal(ctx);

        ctx.restore();
    }

    drawAnimal(ctx) {
        const { emoji, color } = this.animal;

        // 绘制阴影
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(0, 45, 30, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 身体跳动动画
        const legOffset = this.grounded ? Math.sin(this.animationFrame * 0.3) * 3 : 0;

        // 后腿
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(-15 + legOffset, 20, 12, 18, -0.3, 0, Math.PI * 2);
        ctx.fill();

        // 前腿
        ctx.beginPath();
        ctx.ellipse(15 - legOffset, 20, 12, 18, 0.3, 0, Math.PI * 2);
        ctx.fill();

        // 身体
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(0, 0, 35, 30, 0, 0, Math.PI * 2);
        ctx.fill();

        // 身体高光
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(-10, -10, 15, 10, -0.5, 0, Math.PI * 2);
        ctx.fill();

        // 绘制emoji表情
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 0, -5);

        // 如果是跳跃状态，绘制跳跃特效
        if (!this.grounded) {
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-20, 40);
            ctx.quadraticCurveTo(0, 50, 20, 40);
            ctx.stroke();
        }
    }
}

class FireRing {
    constructor(x, y, isQuestion = true) {
        this.x = x;
        this.y = y || 320; // 火圈中心离地高度（垂直方向），默认320
        this.radius = 45; // 火圈半径
        this.passed = false;
        this.isQuestion = isQuestion;
        this.question = isQuestion ? generateCircusQuestion() : null;
        this.animationFrame = 0;
        this.questionShown = false;
        this.answered = false;
        this.correct = false;
        this.passingThrough = false; // 是否正在穿过火圈
    }

    update() {
        this.animationFrame++;
        // 火圈随场景移动
        this.x -= circusPlayer.runSpeed;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        // 火焰动画
        const flameOffset = Math.sin(this.animationFrame * 0.2) * 3;

        // 外圈火焰 - 垂直圆形火圈
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2 + this.animationFrame * 0.05;
            const radius = this.radius + 8 + Math.sin(this.animationFrame * 0.3 + i) * 4;
            const fx = Math.cos(angle) * radius;
            const fy = Math.sin(angle) * radius;

            // 火焰渐变
            const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, 14);
            grad.addColorStop(0, '#FFD700');
            grad.addColorStop(0.4, '#FF8C00');
            grad.addColorStop(0.8, '#FF4500');
            grad.addColorStop(1, 'rgba(255,69,0,0)');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(fx, fy + flameOffset * 0.5, 14, 0, Math.PI * 2);
            ctx.fill();
        }

        // 火圈金属支架（左右两侧）
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(-this.radius, 0);
        ctx.lineTo(-this.radius - 15, 140);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(this.radius, 0);
        ctx.lineTo(this.radius + 15, 140);
        ctx.stroke();

        // 火圈内圈（空心）
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius - 8, 0, Math.PI * 2);
        ctx.fill();

        // 火圈内边框
        ctx.strokeStyle = '#FF6347';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius - 5, 0, Math.PI * 2);
        ctx.stroke();

        // 火圈外边框
        ctx.strokeStyle = '#FF4500';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius + 3, 0, Math.PI * 2);
        ctx.stroke();

        // 如果已回答正确，显示绿色勾
        if (this.answered && this.correct) {
            ctx.fillStyle = '#4ade80';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 5;
            ctx.fillText('✓', 0, 0);
            ctx.shadowBlur = 0;
        }

        // 如果已回答错误，显示红色叉
        if (this.answered && !this.correct) {
            ctx.fillStyle = '#FF4444';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 5;
            ctx.fillText('✗', 0, 0);
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    }

    checkCollision(player) {
        // 检查玩家是否从火圈中间穿过
        const dx = this.x - player.x;
        const dy = this.y - (player.y - 25); // 玩家中心点
        const distance = Math.sqrt(dx * dx + dy * dy);

        // 玩家在火圈圆形范围内（内圈）
        return distance < (this.radius - 15) && !this.passed;
    }

    checkApproaching(player) {
        // 检查是否接近火圈需要出题（距离火圈一定距离时）
        const dx = this.x - player.x;
        const dy = this.y - (player.y - 25);
        const distance = Math.sqrt(dx * dx + dy * dy);

        // 接近火圈但还没到，需要出题
        return distance < 250 && distance > this.radius && this.x > player.x - 50;
    }
}

// 生成马戏团算术题
function generateCircusQuestion() {
    const ops = ['+', '-'];
    const op = ops[Math.floor(Math.random() * ops.length)];
    let a, b, ans;

    if (op === '+') {
        a = Math.floor(Math.random() * 10) + 1;
        b = Math.floor(Math.random() * 10) + 1;
        ans = a + b;
    } else {
        a = Math.floor(Math.random() * 10) + 5;
        b = Math.floor(Math.random() * a);
        ans = a - b;
    }

    return { q: `${a} ${op} ${b} = ?`, ans: ans };
}

// 初始化马戏团游戏
function initCircus() {
    circusDistance = 0;
    circusSpeed = 0;
    circusRings = [];
    circusQuestionActive = false;
    currentRing = null;

    // 生成火圈 - 不同高度，增加挑战性
    let ringX = 800;
    const ringSpacing = 600;
    const totalRings = Math.floor(circusTargetDistance / ringSpacing);

    // 火圈高度选项：低(容易)、中(需要跳跃)、高(需要大跳)
    const ringHeights = [360, 320, 280, 240];

    for (let i = 0; i < totalRings; i++) {
        // 随机选择火圈高度
        const height = ringHeights[Math.floor(Math.random() * ringHeights.length)];
        circusRings.push(new FireRing(ringX, height, true));
        ringX += ringSpacing + Math.random() * 200;
    }
}

// 开始马戏团游戏
function startCircusGame() {
    if (!selectedCircusAnimal) return;

    AudioSys.playClick();
    document.getElementById('circusSelect').style.display = 'none';
    document.getElementById('gameUI').style.display = 'inline';

    // 隐藏其他UI
    document.getElementById('elimUI').style.display = 'none';

    gameMode = 'circus';
    state = 'play';

    // 创建玩家
    circusPlayer = new CircusPlayer(selectedCircusAnimal);

    // 初始化游戏
    initCircus();

    // 开始游戏循环
    circusLoop();
}

// 马戏团游戏循环
function circusLoop() {
    if ((state !== 'play' && state !== 'q') || gameMode !== 'circus') return;

    updateCircus();
    drawCircus();

    circusAnimId = requestAnimationFrame(circusLoop);
}

// 更新马戏团游戏
function updateCircus() {
    if (circusQuestionActive) return;

    // 更新玩家
    circusPlayer.update();

    // 更新火圈
    for (let ring of circusRings) {
        ring.update();

        // 检查是否接近火圈需要出题（使用新的检测方法）
        if (!ring.passed && !ring.questionShown && ring.checkApproaching(circusPlayer)) {
            ring.questionShown = true;
            currentRing = ring;
            showCircusQuestion(ring);
        }

        // 检查是否成功穿过火圈（玩家必须从火圈中间穿过）
        if (!ring.passed && ring.answered && ring.correct && ring.checkCollision(circusPlayer)) {
            ring.passed = true;
            ring.passingThrough = true;
            // 播放成功穿过音效
            AudioSys.playCoin();
        }

        // 如果已经回答正确但没从中间穿过，火圈移到身后也算通过
        if (!ring.passed && ring.answered && ring.correct && ring.x < circusPlayer.x - 80) {
            ring.passed = true;
        }

        // 如果回答了但没答对，且已经错过火圈，游戏结束
        if (!ring.passed && ring.answered && !ring.correct && ring.x < circusPlayer.x - 80) {
            circusGameOver(false);
            return;
        }
    }

    // 移除已离开屏幕的火圈
    circusRings = circusRings.filter(r => r.x > -100);

    // 检查是否到达终点
    if (circusDistance >= circusTargetDistance) {
        circusWin();
    }
}

// 绘制马戏团游戏
function drawCircus() {
    const ctx = document.getElementById('cvs').getContext('2d');
    const w = cvs.width, h = cvs.height;

    // 绘制背景 - 马戏团主题
    const gradient = ctx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, '#FF6B6B');
    gradient.addColorStop(0.5, '#FFE66D');
    gradient.addColorStop(1, '#FFA07A');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);

    // 绘制条纹帐篷效果
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for (let i = 0; i < 10; i++) {
        const x = (i * 80 - circusDistance * 0.5) % (w + 100) - 50;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + 40, 0);
        ctx.lineTo(x + 20, h);
        ctx.lineTo(x - 20, h);
        ctx.closePath();
        ctx.fill();
    }

    // 绘制地面
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, 460, w, 140);

    // 地面纹理
    ctx.fillStyle = '#A0522D';
    for (let i = 0; i < w / 50 + 1; i++) {
        const x = (i * 50 - circusDistance) % (w + 50);
        ctx.fillRect(x, 460, 25, 140);
    }

    // 绘制进度条背景
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(20, 20, w - 40, 20);

    // 绘制进度
    const progress = Math.min(circusDistance / circusTargetDistance, 1);
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(20, 20, (w - 40) * progress, 20);

    // 进度条边框
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.strokeRect(20, 20, w - 40, 20);

    // 绘制终点标志
    const finishX = 20 + (w - 40) - 15;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(finishX, 15);
    ctx.lineTo(finishX + 15, 22);
    ctx.lineTo(finishX, 29);
    ctx.fill();

    // 绘制火圈
    for (let ring of circusRings) {
        if (ring.x > -100 && ring.x < w + 100) {
            ring.draw(ctx);
        }
    }

    // 绘制玩家
    circusPlayer.draw(ctx);

    // 绘制距离显示
    ctx.fillStyle = 'white';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(`🏃 距离: ${Math.floor(circusDistance)}m / ${circusTargetDistance}m`, 20, 70);
    ctx.shadowBlur = 0;

    // 绘制操作提示
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText('🔥 跳起来从火圈中间穿过去！🔥', w / 2, h - 35);
    ctx.font = '14px Arial';
    ctx.fillText('点击屏幕或按空格键跳跃', w / 2, h - 15);
    ctx.shadowBlur = 0;
}

// 生成选项
function generateCircusOptions(correct) {
    const options = [correct];
    while (options.length < 4) {
        const wrong = correct + Math.floor(Math.random() * 10) - 5;
        if (wrong !== correct && wrong >= 0 && !options.includes(wrong)) {
            options.push(wrong);
        }
    }
    // 打乱顺序
    return options.sort(() => Math.random() - 0.5);
}

// 回答问题
function answerCircusQuestion(answer, correct, btn) {
    const modal = document.getElementById('circusQuestionModal');
    const isCorrect = answer === correct;

    if (isCorrect) {
        btn.style.background = 'linear-gradient(145deg, #4ade80, #22c55e)';
        AudioSys.playCoin();

        currentRing.answered = true;
        currentRing.correct = true;

        setTimeout(() => {
            modal.remove();
            circusQuestionActive = false;
            state = 'play';
        }, 500);
    } else {
        btn.style.background = 'linear-gradient(145deg, #FF4444, #DC2626)';
        AudioSys.playFail();

        currentRing.answered = true;
        currentRing.correct = false;

        setTimeout(() => {
            modal.remove();
            circusGameOver(false);
        }, 500);
    }
}

function startPlatformer() {

    document.getElementById('touch').classList.remove('elim-mode');
    level = 1; score = 0; candies = 0;
    state = 'play'; initPlatformer();
    lastTime = 0;
    frameCount = 0;
    loop();
}

function loop(timestamp) {
    if ((state !== 'play' && state !== 'q') || gameMode !== 'platformer') return;

    updatePlatformer(timestamp);
    drawPlatformer();

    platformerAnimId = requestAnimationFrame(loop);
}

function restart() {
    document.getElementById('over').style.display = 'none';
    if (elimAnimId) cancelAnimationFrame(elimAnimId);
    if (platformerAnimId) cancelAnimationFrame(platformerAnimId);
    lastTime = 0;
    frameCount = 0;
    // 重置键盘状态，防止按键残留导致加速
    keys = {};
    // 重置所有按键
    ['ArrowLeft', 'ArrowRight', 'Space', 'KeyF'].forEach(k => keys[k] = false);
    if (gameMode === 'platformer') {
        level = 1; score = 0; candies = 0;
        // 确保玩家速度被重置
        if (player) {
            player.vx = 0;
            player.vy = 0;
            player.isTransformed = false;
            player.transformTimer = 0;
        }
        initPlatformer();
        state = 'play';
        loop();
    }
    else if (gameMode === 'elimination') { elimScore = 0; elimItems = []; elimSelected = []; elimSpeed = 1.5; elimTarget = Math.floor(Math.random()*6)+5; document.getElementById('elimTargetNum').textContent = elimTarget; document.getElementById('targetNum').textContent = elimTarget; state = 'play'; elimLoop(); }
    else if (gameMode === 'circus') { restartCircus(); }
}

function win() {
    if (level < 3) {
        level++; score += 100;
        AudioSys.playWin();
        initPlatformer();
    } else {
        state = 'over';
        AudioSys.playWin();
        showVictoryScreen();
    }
}

// 发射炮弹函数
function fireBullet() {
    if (state !== 'play' || gameMode !== 'platformer' || !player) return;

    const now = Date.now();
    if (now - lastFireTime < FIRE_COOLDOWN) return; // 冷却中

    lastFireTime = now;

    // 确定发射方向（根据玩家移动方向，默认向右）
    const direction = player.vx < 0 ? -1 : 1;

    // 创建炮弹（从玩家前方发射）
    const bullet = new Bullet(
        player.x + direction * 30,
        player.y,
        direction
    );
    bullets.push(bullet);

    AudioSys.playFire();
}

document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        e.preventDefault();
        if (state === 'play' && gameMode === 'platformer' && player) {
            player.jump();
        }
        // 马戏团模式跳跃
        if (state === 'play' && gameMode === 'circus' && circusPlayer) {
            circusPlayer.jump();
        }
    }
    // F键发射炮弹
    if (e.code === 'KeyF') {
        e.preventDefault();
        fireBullet();
    }
    if (e.code === 'Escape') { if (state === 'play') pauseGame(); else if (state === 'pause') resumeGame(); }
});
document.addEventListener('keyup', e => keys[e.code] = false);

// 触控
function touch(id, key, isJump, isFire) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => {
        e.preventDefault();
        keys[key] = true;
        if (isJump && state === 'play' && gameMode === 'platformer' && player) player.jump();
        if (isJump && state === 'play' && gameMode === 'circus' && circusPlayer) circusPlayer.jump();
        if (isFire) fireBullet();
    });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
}
touch('l', 'ArrowLeft', false, false);
touch('r', 'ArrowRight', false, false);
touch('j', 'Space', true, false);
touch('f', 'KeyF', false, true);

// 画布点击 - 消消乐和马戏团模式
cvs.addEventListener('click', e => {
    if (gameMode === 'elimination' && state === 'play') {
        const rect = cvs.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (cvs.width / rect.width);
        const y = (e.clientY - rect.top) * (cvs.height / rect.height);
        elimClick(x, y);
    }
    // 马戏团模式点击跳跃
    if (gameMode === 'circus' && state === 'play' && circusPlayer) {
        circusPlayer.jump();
    }
});

// 自适应
function setMobileViewport() {
    if (window.innerWidth <= 768) {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        cvs.width = window.innerWidth;
        cvs.height = vh;
        document.getElementById('game').style.height = vh + 'px';
    }
}
setMobileViewport();
window.addEventListener('resize', setMobileViewport);
if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setMobileViewport);
}
</script>
